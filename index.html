<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>terminal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #0d0d0d;
color: #b0b0b0;
font-family: 'Courier New', Courier, monospace;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 40px;
}

.terminal {
font-size: clamp(14px, 2vw, 18px);
line-height: 1.8;
width: 32ch;
}

.line {
white-space: pre;
height: 1.8em;
}

.cursor {
display: inline-block;
width: 0.55em;
height: 1.15em;
background: #b0b0b0;
vertical-align: text-bottom;
animation: blink 1s step-end infinite;
}

@keyframes blink {
0%, 100% { opacity: 1; }
50% { opacity: 0; }
}
</style>

</head>
<body>

<div class="terminal" id="terminal">
  <div class="line" id="line-0"></div>
  <div class="line" id="line-1"></div>
  <div class="line" id="line-2"></div>
  <div class="line" id="line-3"></div>
  <div class="line" id="line-4"></div>
</div>

<script>
  const lines = [
    '> matt polkiewicz',
    '  software engineer',
    '',
    '  m.polkiewicz@gmail.com',
    '  linkedin.com/in/polkiewicz',
  ];

  const CHAR_SPEED = 30;
  const LINE_PAUSE = 300;

  function createCursor() {
    const c = document.createElement('span');
    c.className = 'cursor';
    return c;
  }

  function typeLine(el, text, cursor) {
    return new Promise(resolve => {
      el.appendChild(cursor);
      let i = 0;
      function next() {
        if (i >= text.length) {
          setTimeout(resolve, LINE_PAUSE);
          return;
        }
        cursor.before(document.createTextNode(text[i]));
        i++;
        setTimeout(next, CHAR_SPEED + Math.random() * 15);
      }
      next();
    });
  }

  async function run() {
    await new Promise(r => setTimeout(r, 600));
    const cursor = createCursor();

    for (let i = 0; i < lines.length; i++) {
      const el = document.getElementById('line-' + i);
      if (lines[i] === '') {
        el.appendChild(cursor);
        await new Promise(r => setTimeout(r, LINE_PAUSE));
      } else {
        await typeLine(el, lines[i], cursor);
      }
    }
  }

  run();
</script>

</body>
</html>
