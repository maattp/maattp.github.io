name: Deploy Worker

on:
  push:
    branches: [master]
    paths:
      - "worker/**"
      - "apps/75hard/index.html" # the mirror test reads the app's inline JS
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # 22.18+ strips TS types without the experimental flag warning;
          # the flag below keeps it explicit and works on 22.6+
          node-version: "22"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (day-boundary / finalize engine)
        run: node --experimental-strip-types test/hard.test.mjs

      - name: Client-server mirror guard
        run: node --experimental-strip-types test/hard-mirror.test.mjs

      - name: Web Push crypto round-trip
        run: node --experimental-strip-types test/push.test.mjs

      - name: Mahjong engine tests
        run: node test/core.test.mjs && node test/edge.test.mjs

      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
