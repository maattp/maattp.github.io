<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="apple-touch-icon" href="../icon.png">
    <title>Glide</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }
        #game {
            display: block;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* ---- HUD ---- */
        #hud {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 14px);
            left: 0; right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 2px 8px rgba(0,0,0,0.55);
        }
        #score {
            font-size: 54px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        #ringHud {
            margin-top: 6px;
            font-size: 15px;
            font-weight: 600;
            color: #ffe08a;
            letter-spacing: 0.5px;
        }
        #hud.hidden { display: none; }

        /* ---- Overlays ---- */
        .screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: env(safe-area-inset-top) 28px env(safe-area-inset-bottom);
            background: radial-gradient(ellipse at 50% 35%, rgba(30,40,90,0.35), rgba(8,8,22,0.78));
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .screen.hidden { display: none; }
        .title {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 6px;
            text-shadow: 0 4px 24px rgba(120,180,255,0.45);
        }
        .glider-emoji { font-size: 52px; margin-bottom: 10px; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4)); }
        .subtitle {
            font-size: 16px;
            color: #b8c4e0;
            line-height: 1.5;
            max-width: 320px;
            margin-bottom: 28px;
        }
        .subtitle b { color: #fff; }
        .btn {
            pointer-events: auto;
            font-size: 20px;
            font-weight: 700;
            color: #0a1024;
            background: linear-gradient(135deg, #ffd86b, #ff9e4a);
            border: none;
            border-radius: 999px;
            padding: 16px 48px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255,160,80,0.4);
            transition: transform 0.12s ease;
        }
        .btn:active { transform: scale(0.94); }
        .stat-row {
            display: flex;
            gap: 36px;
            margin: 18px 0 30px;
        }
        .stat { display: flex; flex-direction: column; gap: 4px; }
        .stat .label { font-size: 13px; color: #8e9bc0; text-transform: uppercase; letter-spacing: 1px; }
        .stat .value { font-size: 40px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }
        .stat .value.gold { color: #ffd86b; }
        #newBest {
            font-size: 15px;
            font-weight: 700;
            color: #ffd86b;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }
        #newBest.hidden { display: none; }
        .gameover-title { font-size: 40px; font-weight: 800; color: #fff; margin-bottom: 4px; }
        #tiltNote {
            margin-top: 22px;
            font-size: 13px;
            color: #7c88ac;
            max-width: 300px;
            line-height: 1.5;
        }
        #buildTag {
            margin-top: 16px;
            font-size: 11px;
            letter-spacing: 0.5px;
            color: #4a5675;
            font-variant-numeric: tabular-nums;
        }
        .back {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 10px);
            left: calc(env(safe-area-inset-left) + 14px);
            z-index: 11;
            pointer-events: auto;
            text-decoration: none;
            font-size: 26px;
            color: rgba(255,255,255,0.85);
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <a href="../" class="back" id="backBtn">‹</a>

    <div id="hud" class="hidden">
        <div id="score">0</div>
        <div id="ringHud">◎ 0</div>
    </div>

    <!-- Start -->
    <div class="screen" id="startScreen">
        <div class="glider-emoji">🛩️</div>
        <div class="title">GLIDE</div>
        <div class="subtitle">
            Soar through the canyon. <b>Tilt your phone left to climb,
            right to dive.</b> Thread the narrowing cave, fly through
            golden rings for bonus points, and watch for updrafts that
            shove you skyward.
        </div>
        <button class="btn" id="startBtn">Take Off</button>
        <div id="tiltNote"></div>
        <div id="buildTag">build 6 · updrafts</div>
    </div>

    <!-- Game over -->
    <div class="screen hidden" id="overScreen">
        <div class="gameover-title">Crashed</div>
        <div id="newBest" class="hidden">★ NEW BEST ★</div>
        <div class="stat-row">
            <div class="stat"><span class="label">Score</span><span class="value" id="finalScore">0</span></div>
            <div class="stat"><span class="label">Best</span><span class="value gold" id="bestScore">0</span></div>
        </div>
        <button class="btn" id="retryBtn">Fly Again</button>
    </div>

    <script>
    (function () {
        'use strict';

        // ---------------------------------------------------------------
        //  Setup
        // ---------------------------------------------------------------
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const dom = {
            hud: document.getElementById('hud'),
            score: document.getElementById('score'),
            ringHud: document.getElementById('ringHud'),
            startScreen: document.getElementById('startScreen'),
            overScreen: document.getElementById('overScreen'),
            startBtn: document.getElementById('startBtn'),
            retryBtn: document.getElementById('retryBtn'),
            finalScore: document.getElementById('finalScore'),
            bestScore: document.getElementById('bestScore'),
            newBest: document.getElementById('newBest'),
            tiltNote: document.getElementById('tiltNote'),
        };

        let W = 0, H = 0, DPR = 1;
        function resize() {
            DPR = Math.min(window.devicePixelRatio || 1, 2);
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = Math.round(W * DPR);
            canvas.height = Math.round(H * DPR);
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
            buildStars();
            buildClouds();
            buildBirds();
            buildAmbient();
            buildVignette();
            buildNoise();
        }
        window.addEventListener('resize', resize);

        // ---------------------------------------------------------------
        //  Constants / tuning
        // ---------------------------------------------------------------
        const BEST_KEY = 'glide.best';
        const RING_SPACING = 900;     // world px between rings
        const RING_RADIUS = 46;
        const RING_BONUS = 25;
        const TILT_RANGE = 38;        // degrees of tilt for full deflection
        const CYCLE_DIST = 22000;     // world px for one full day/night cycle (slow, majestic)
        // vertical flight model (gravity-based so the glider naturally sinks)
        const GRAVITY = 0.22;         // constant downward accel
        const LIFT = 0.70;            // upward accel at full back-tilt
        const AIR_DRAG = 0.93;        // velocity damping -> glider inertia
        const MAX_CLIMB = 8;          // max upward speed (px/frame)
        const MAX_DIVE = 9;           // max downward speed (px/frame)
        // updrafts — occasional columns of rising air that shove the glider up
        const UPDRAFT_FORCE = 0.42;   // upward accel inside a column (vs GRAVITY 0.22)
        const UPDRAFT_MIN_GAP = 1700; // min world px between updrafts
        const UPDRAFT_MAX_GAP = 4200; // max world px between updrafts
        const UPDRAFT_MIN_W = 80;     // narrowest column
        const UPDRAFT_MAX_W = 175;    // widest column

        // ---------------------------------------------------------------
        //  Game state
        // ---------------------------------------------------------------
        let state = 'menu';           // 'menu' | 'playing' | 'dead'
        let distance = 0;             // world px travelled
        let speed = 0;                // horizontal px/frame
        let gliderY = 0;             // screen-space y of glider
        let gliderVY = 0;             // vertical velocity
        let gliderX = 0;             // fixed screen x of glider
        let tilt = 0;                 // -1..1 (computed from device)
        let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0;
        let ringsHit = 0;
        let ringPoints = 0;
        let rings = [];               // {wx, y, collected, pulse}
        let nextRingWX = 0;
        let updrafts = [];            // {wx, w, phase} columns of rising air
        let nextUpdraftWX = 0;
        let inUpdraft = 0;            // 0..1 strength of updraft currently lifting glider
        let trail = [];               // glider trail points
        let particles = [];           // crash debris
        let shakeT = 0;
        let lastFlash = 0;            // ring flash timer

        // input sources
        let neutralGamma = null;
        let tiltActive = false;
        let keyTilt = 0;
        let pointerTilt = 0;          // last-resort drag fallback

        // ---------------------------------------------------------------
        //  Math helpers
        // ---------------------------------------------------------------
        const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
        const lerp = (a, b, t) => a + (b - a) * t;
        function lerpColor(c1, c2, t) {
            return [
                Math.round(lerp(c1[0], c2[0], t)),
                Math.round(lerp(c1[1], c2[1], t)),
                Math.round(lerp(c1[2], c2[2], t)),
            ];
        }
        const rgb = (c) => 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')';

        // ---------------------------------------------------------------
        //  Cave terrain — pure functions of world-x
        // ---------------------------------------------------------------
        // Vertical center of the channel at a given world-x.
        function channelCenter(wx) {
            const c = 0.5
                + 0.16 * Math.sin(wx * 0.00130)
                + 0.09 * Math.sin(wx * 0.00310 + 1.3)
                + 0.045 * Math.sin(wx * 0.00720 + 2.7);
            return clamp(c, 0.30, 0.70) * H;
        }
        // Half-height of the open channel. Shrinks with distance to ramp difficulty.
        function channelHalf(dist) {
            const startH = H * 0.34;
            const minH = H * 0.135;
            const shrink = clamp(dist / 26000, 0, 1);
            // small "breathing" so it tightens and loosens on the way down
            const breathe = 1 + 0.10 * Math.sin(dist * 0.00055);
            return Math.max(minH, lerp(startH, minH, shrink)) * breathe;
        }
        function topAt(wx, dist) { return channelCenter(wx) - channelHalf(dist); }
        function botAt(wx, dist) { return channelCenter(wx) + channelHalf(dist); }

        // ---------------------------------------------------------------
        //  Day / night cycle
        // ---------------------------------------------------------------
        // Each keyframe is a full vertical gradient (zenith -> upper -> lower ->
        // horizon) plus how dark the sky is (stars) and how warm the light is
        // (dawn/dusk bloom). Interpolating these slowly fades dusk into night
        // into dawn into day.
        const SKY = [
            // dawn — indigo night yielding to a rose-gold horizon
            { at: 0.00, stops: [[34, 38, 82], [86, 70, 130], [214, 124, 140], [255, 180, 142]], dark: 0.58, warm: 0.60 },
            // sunrise — cool blue overhead, molten gold at the horizon
            { at: 0.13, stops: [[56, 92, 158], [120, 140, 196], [255, 182, 120], [255, 230, 158]], dark: 0.14, warm: 0.90 },
            // day — clean deep azure
            { at: 0.28, stops: [[46, 120, 206], [92, 162, 226], [156, 204, 242], [208, 236, 251]], dark: 0.00, warm: 0.08 },
            // golden hour — warm amber wash climbing the sky
            { at: 0.44, stops: [[64, 106, 182], [150, 156, 206], [255, 198, 134], [255, 230, 176]], dark: 0.10, warm: 0.82 },
            // dusk — violet zenith, fiery coral horizon
            { at: 0.57, stops: [[46, 36, 94], [128, 60, 122], [240, 108, 96], [255, 150, 92]], dark: 0.44, warm: 1.00 },
            // twilight — deep navy with a dim ember band
            { at: 0.72, stops: [[20, 22, 60], [54, 44, 96], [118, 66, 108], [186, 98, 100]], dark: 0.84, warm: 0.55 },
            // night — near-black, a faint cool glow at the horizon
            { at: 0.86, stops: [[5, 7, 28], [11, 15, 44], [20, 26, 62], [40, 48, 92]], dark: 1.00, warm: 0.06 },
            // back to dawn (seam)
            { at: 1.00, stops: [[34, 38, 82], [86, 70, 130], [214, 124, 140], [255, 180, 142]], dark: 0.58, warm: 0.60 },
        ];
        const STOP_POS = [0, 0.42, 0.72, 1];
        function cycleAt(dist) {
            const p = ((dist / CYCLE_DIST) % 1 + 1) % 1;
            return (p + 0.20) % 1; // open on a bright morning
        }
        function skyState(dist) {
            const p = cycleAt(dist);
            let i = 0;
            while (i < SKY.length - 1 && p > SKY[i + 1].at) i++;
            const a = SKY[i], b = SKY[i + 1];
            const t = (p - a.at) / (b.at - a.at);
            const stops = a.stops.map((c, k) => lerpColor(c, b.stops[k], t));
            return {
                p: p,
                stops: stops,
                top: stops[0],
                bot: stops[3],
                dark: lerp(a.dark, b.dark, t),
                warm: lerp(a.warm, b.warm, t),
            };
        }
        // Where the sun (day half) or moon (night half) sits, and its arc progress.
        function celestialPos(sky) {
            // sun owns most of the cycle so dusk shows a low setting sun;
            // the moon takes the deep-night stretch.
            const isDay = sky.p < 0.6;
            const local = isDay ? (sky.p / 0.6) : ((sky.p - 0.6) / 0.4);
            return {
                isDay: isDay,
                local: local,
                x: local * W,
                y: H * 0.66 - Math.sin(local * Math.PI) * H * 0.52,
            };
        }

        // ---------------------------------------------------------------
        //  Stars
        // ---------------------------------------------------------------
        let stars = [];
        let shootingStar = null;
        function buildStars() {
            stars = [];
            const n = Math.round((W * H) / 6500);
            for (let i = 0; i < n; i++) {
                const big = Math.random() < 0.10;
                const tint = Math.random();
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H * 0.82,
                    r: big ? Math.random() * 1.5 + 1.2 : Math.random() * 1.0 + 0.25,
                    tw: Math.random() * Math.PI * 2,
                    sp: 0.4 + Math.random() * 1.7,
                    hue: tint < 0.28 ? [196, 212, 255] : (tint < 0.5 ? [255, 240, 214] : [255, 255, 255]),
                });
            }
        }

        // ---------------------------------------------------------------
        //  Atmosphere — clouds, birds, ambient motes, aurora, vignette, grain
        // ---------------------------------------------------------------
        let clouds = [];
        function buildClouds() {
            clouds = [];
            // two depth layers: far (small, faint, slow) and near (big, bold)
            const span = W + 460;
            const make = (count, layer, yLo, yHi, scaleLo, scaleHi, speed) => {
                for (let i = 0; i < count; i++) {
                    const sc = scaleLo + Math.random() * (scaleHi - scaleLo);
                    const puffs = [];
                    const np = 4 + Math.floor(Math.random() * 3);
                    for (let j = 0; j < np; j++) {
                        puffs.push({
                            dx: (Math.random() - 0.5) * 120 * sc,
                            dy: (Math.random() - 0.4) * 26 * sc,
                            r: (26 + Math.random() * 26) * sc,
                        });
                    }
                    clouds.push({
                        layer: layer,
                        x0: Math.random() * span,
                        y: (yLo + Math.random() * (yHi - yLo)) * H,
                        sc: sc,
                        speed: speed,
                        puffs: puffs,
                    });
                }
            };
            make(3, 0, 0.10, 0.42, 0.5, 0.85, 0.045);   // far
            make(3, 1, 0.16, 0.52, 0.9, 1.35, 0.11);     // near
            clouds.sort((a, b) => a.layer - b.layer);
        }

        let birds = [];
        function buildBirds() {
            birds = [];
            const flocks = 2 + Math.floor(Math.random() * 2);
            for (let f = 0; f < flocks; f++) {
                const n = 4 + Math.floor(Math.random() * 5);
                const members = [];
                for (let i = 0; i < n; i++) {
                    members.push({
                        ox: (Math.random() - 0.5) * 80 - i * 9,
                        oy: (Math.random() - 0.5) * 36 + Math.abs(i - n / 2) * 5,
                        ph: Math.random() * Math.PI * 2,
                        sz: 4 + Math.random() * 3,
                    });
                }
                birds.push({
                    x0: Math.random() * (W + 300),
                    y: (0.18 + Math.random() * 0.3) * H,
                    speed: 0.16 + Math.random() * 0.1,
                    flap: 4 + Math.random() * 3,
                    members: members,
                });
            }
        }

        let ambient = [];
        function buildAmbient() {
            ambient = [];
            const n = Math.round((W * H) / 26000);
            for (let i = 0; i < n; i++) {
                ambient.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1.8 + 0.6,
                    drift: 0.2 + Math.random() * 0.5,
                    sway: Math.random() * Math.PI * 2,
                    swaySp: 0.4 + Math.random() * 0.9,
                    tw: Math.random() * Math.PI * 2,
                });
            }
        }

        let vignetteGrad = null;
        function buildVignette() {
            const g = ctx.createRadialGradient(W / 2, H * 0.46, H * 0.34, W / 2, H * 0.5, H * 0.82);
            g.addColorStop(0, 'rgba(0,0,0,0)');
            g.addColorStop(0.7, 'rgba(0,0,0,0)');
            g.addColorStop(1, 'rgba(6,6,16,0.42)');
            vignetteGrad = g;
        }

        let noisePattern = null;
        function buildNoise() {
            const size = 96;
            const nc = document.createElement('canvas');
            nc.width = size; nc.height = size;
            const nctx = nc.getContext('2d');
            const img = nctx.createImageData(size, size);
            for (let i = 0; i < img.data.length; i += 4) {
                const v = (Math.random() * 255) | 0;
                img.data[i] = v; img.data[i + 1] = v; img.data[i + 2] = v;
                img.data[i + 3] = 255;
            }
            nctx.putImageData(img, 0, 0);
            noisePattern = ctx.createPattern(nc, 'repeat');
        }

        // ---------------------------------------------------------------
        //  Drawing
        // ---------------------------------------------------------------
        function drawSky(sky) {
            // multi-stop vertical gradient — the spectacular backdrop
            const g = ctx.createLinearGradient(0, 0, 0, H);
            for (let k = 0; k < sky.stops.length; k++) {
                g.addColorStop(STOP_POS[k], rgb(sky.stops[k]));
            }
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);

            // atmospheric horizon bloom — a warm wash centred on the sun that
            // swells at dawn/dusk and melts away by midday/midnight
            if (sky.warm > 0.02) {
                const cx = celestialPos(sky).x;
                const hy = H * 0.78;
                const hc = sky.stops[3];
                const a0 = 0.46 * sky.warm;
                const bloom = ctx.createRadialGradient(cx, hy, 0, cx, hy, H * 0.95);
                bloom.addColorStop(0, 'rgba(' + hc[0] + ',' + hc[1] + ',' + hc[2] + ',' + a0 + ')');
                bloom.addColorStop(0.45, 'rgba(' + hc[0] + ',' + hc[1] + ',' + hc[2] + ',' + (a0 * 0.32) + ')');
                bloom.addColorStop(1, 'rgba(' + hc[0] + ',' + hc[1] + ',' + hc[2] + ',0)');
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = bloom;
                ctx.fillRect(0, 0, W, H);
                ctx.restore();
            }

            // stars fade in with darkness
            if (sky.dark > 0.04) {
                const now = performance.now() / 1000;
                for (const s of stars) {
                    const tw = 0.5 + 0.5 * Math.sin(now * s.sp + s.tw);
                    ctx.globalAlpha = sky.dark * (0.3 + 0.7 * tw);
                    ctx.fillStyle = 'rgb(' + s.hue[0] + ',' + s.hue[1] + ',' + s.hue[2] + ')';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                drawShootingStar(sky, now);
            }
        }

        function drawShootingStar(sky, now) {
            if (sky.dark < 0.6) { shootingStar = null; return; }
            if (!shootingStar && Math.random() < 0.005) {
                shootingStar = {
                    x: Math.random() * W * 0.6 + W * 0.1,
                    y: Math.random() * H * 0.28 + 16,
                    vx: 7 + Math.random() * 4,
                    vy: 2.5 + Math.random() * 2,
                    life: 1,
                };
            }
            if (shootingStar) {
                const s = shootingStar;
                s.x += s.vx; s.y += s.vy; s.life -= 0.022;
                if (s.life <= 0 || s.x > W + 60) { shootingStar = null; return; }
                const a = clamp(s.life, 0, 1) * sky.dark;
                const tx = s.x - s.vx * 7, ty = s.y - s.vy * 7;
                const grad = ctx.createLinearGradient(s.x, s.y, tx, ty);
                grad.addColorStop(0, 'rgba(255,255,255,' + a + ')');
                grad.addColorStop(1, 'rgba(180,200,255,0)');
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(tx, ty);
                ctx.stroke();
                ctx.restore();
            }
        }

        function drawCelestial(sky) {
            const c = celestialPos(sky);
            const x = c.x, y = c.y;
            ctx.save();
            if (c.isDay) {
                // sun — swells and reddens toward the golden hours
                const warm = sky.warm;
                const r = 30 + warm * 14;
                const gr = r * (4 + warm * 3.5);
                const glow = ctx.createRadialGradient(x, y, 0, x, y, gr);
                glow.addColorStop(0, 'rgba(255,242,202,' + (0.42 + warm * 0.3) + ')');
                glow.addColorStop(0.4, 'rgba(255,206,150,' + (0.18 + warm * 0.26) + ')');
                glow.addColorStop(1, 'rgba(255,196,140,0)');
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = glow;
                ctx.beginPath(); ctx.arc(x, y, gr, 0, Math.PI * 2); ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                const core = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
                core.addColorStop(0, '#fffdf4');
                core.addColorStop(0.55, '#fff0c8');
                core.addColorStop(1, rgb(lerpColor([255, 228, 168], [255, 168, 110], warm)));
                ctx.fillStyle = core;
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
            } else {
                const r = 26;
                const gr = r * 4.5;
                const glow = ctx.createRadialGradient(x, y, 0, x, y, gr);
                glow.addColorStop(0, 'rgba(214,224,255,0.42)');
                glow.addColorStop(0.5, 'rgba(182,198,255,0.13)');
                glow.addColorStop(1, 'rgba(182,198,255,0)');
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = glow;
                ctx.beginPath(); ctx.arc(x, y, gr, 0, Math.PI * 2); ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                // moon disc
                const md = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.2, x, y, r);
                md.addColorStop(0, '#fdfdff');
                md.addColorStop(1, '#c6cfec');
                ctx.fillStyle = md;
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                // craters
                ctx.fillStyle = 'rgba(150,160,196,0.4)';
                ctx.beginPath(); ctx.arc(x - r * 0.28, y - r * 0.1, r * 0.18, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + r * 0.22, y + r * 0.26, r * 0.12, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + r * 0.05, y - r * 0.32, r * 0.08, 0, Math.PI * 2); ctx.fill();
                // soft terminator shading, clipped to the disc so it never bleeds into the sky
                ctx.save();
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();
                const term = ctx.createRadialGradient(x - r * 0.5, y - r * 0.5, r * 0.3, x + r * 0.45, y + r * 0.45, r * 1.5);
                term.addColorStop(0, 'rgba(120,132,170,0)');
                term.addColorStop(1, 'rgba(120,132,170,0.45)');
                ctx.fillStyle = term;
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
            ctx.restore();
        }

        // Aurora — shimmering ribbons of light high in the night sky
        function drawAurora(sky) {
            if (sky.dark < 0.55) return;
            const a = (sky.dark - 0.55) / 0.45;     // fades in through twilight->night
            const now = performance.now() / 1000;
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            const bands = [
                { col: [90, 245, 185], yb: 0.30, amp: 30, fr: 0.011, sp: 0.18, w: 78, al: 0.30 },
                { col: [130, 150, 255], yb: 0.38, amp: 38, fr: 0.008, sp: -0.13, w: 96, al: 0.24 },
                { col: [205, 120, 235], yb: 0.25, amp: 24, fr: 0.014, sp: 0.22, w: 60, al: 0.22 },
            ];
            for (const band of bands) {
                ctx.beginPath();
                for (let x = 0; x <= W; x += 12) {
                    const y = band.yb * H
                        + Math.sin(x * band.fr + now * band.sp) * band.amp
                        + Math.sin(x * band.fr * 2.7 + now * band.sp * 1.6) * band.amp * 0.4;
                    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                // vertical curtain via a tall gradient stroke
                const c = band.col;
                const grad = ctx.createLinearGradient(0, band.yb * H - band.w, 0, band.yb * H + band.w);
                grad.addColorStop(0, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0)');
                grad.addColorStop(0.5, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (band.al * a) + ')');
                grad.addColorStop(1, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0)');
                ctx.strokeStyle = grad;
                ctx.lineWidth = band.w;
                ctx.stroke();
            }
            ctx.restore();
        }

        // God rays — soft volumetric shafts from the sun at the golden hours
        function drawGodRays(sky) {
            const c = celestialPos(sky);
            if (!c.isDay || sky.warm < 0.35) return;
            const a = (sky.warm - 0.35) / 0.65;
            const hc = sky.stops[3];
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.translate(c.x, c.y);
            const rays = 9;
            for (let i = 0; i < rays; i++) {
                const ang = (i / rays) * Math.PI * 2 + performance.now() / 9000;
                const len = H * (0.5 + 0.25 * Math.sin(i * 1.7));
                const wide = 0.06 + 0.03 * Math.sin(i * 2.3);
                ctx.save();
                ctx.rotate(ang);
                const grad = ctx.createLinearGradient(0, 0, len, 0);
                grad.addColorStop(0, 'rgba(' + hc[0] + ',' + hc[1] + ',' + hc[2] + ',' + (0.10 * a) + ')');
                grad.addColorStop(1, 'rgba(' + hc[0] + ',' + hc[1] + ',' + hc[2] + ',0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(len, -len * wide);
                ctx.lineTo(len, len * wide);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
            ctx.restore();
        }

        // Volumetric parallax clouds, lit on top and shaded beneath, tinted by the sky
        function drawClouds(sky) {
            const span = W + 460;
            // lit (top) and shaded (base) cloud colours derived from the current sky
            let lit = lerpColor([255, 255, 255], sky.stops[3], sky.warm * 0.55);
            lit = lerpColor(lit, [56, 62, 96], sky.dark * 0.78);
            let shade = lerpColor([168, 170, 192], sky.stops[1], 0.45);
            shade = lerpColor(shade, [24, 28, 52], sky.dark * 0.82);
            const baseAlpha = lerp(0.92, 0.55, sky.dark);
            for (const cl of clouds) {
                let sx = ((cl.x0 - distance * cl.speed) % span + span) % span - 230;
                const layerA = baseAlpha * (cl.layer === 0 ? 0.55 : 1);
                for (const pf of cl.puffs) {
                    const b = clamp(0.5 + pf.dy / (30 * cl.sc), 0, 1); // upper puffs lit, lower shaded
                    const col = lerpColor(lit, shade, b);
                    const px = sx + pf.dx, py = cl.y + pf.dy;
                    const g = ctx.createRadialGradient(px, py - pf.r * 0.2, pf.r * 0.15, px, py, pf.r);
                    g.addColorStop(0, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + layerA + ')');
                    g.addColorStop(0.7, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (layerA * 0.5) + ')');
                    g.addColorStop(1, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0)');
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(px, py, pf.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Distant drifting flocks of birds
        function drawBirds(sky) {
            const col = lerpColor([60, 64, 86], [10, 12, 28], sky.dark);
            const now = performance.now() / 1000;
            const span = W + 300;
            ctx.save();
            ctx.strokeStyle = rgb(col);
            ctx.globalAlpha = lerp(0.5, 0.28, sky.dark);
            ctx.lineWidth = 1.6;
            ctx.lineCap = 'round';
            for (const fl of birds) {
                const fx = ((fl.x0 - distance * fl.speed) % span + span) % span - 150;
                for (const m of fl.members) {
                    const x = fx + m.ox;
                    const y = fl.y + m.oy + Math.sin(now * 0.5 + m.ph) * 6;
                    const w = m.sz, up = Math.sin(now * fl.flap + m.ph) * 0.5 + 0.5; // 0..1 wing beat
                    const lift = up * w * 0.7;
                    ctx.beginPath();
                    ctx.moveTo(x - w, y + lift);
                    ctx.quadraticCurveTo(x - w * 0.4, y - lift * 0.6, x, y);
                    ctx.quadraticCurveTo(x + w * 0.4, y - lift * 0.6, x + w, y + lift);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // Floating ambient motes — dust in daylight, glowing embers/fireflies at night
        function drawAmbient(sky) {
            const now = performance.now() / 1000;
            const warmC = lerpColor([255, 224, 150], [255, 150, 90], sky.warm);
            const dayC = [255, 255, 255];
            const col = lerpColor(dayC, warmC, clamp(sky.warm + sky.dark * 0.6, 0, 1));
            const glow = sky.dark > 0.5;               // fireflies twinkle at night
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            for (const m of ambient) {
                m.x -= m.drift * (0.6 + speed * 0.04);
                m.x += Math.sin(now * m.swaySp + m.sway) * 0.3;
                if (m.x < -6) { m.x = W + 6; m.y = Math.random() * H; }
                let a = 0.25;
                if (glow) a = 0.15 + 0.45 * (0.5 + 0.5 * Math.sin(now * 2.2 + m.tw));
                ctx.globalAlpha = a * (glow ? 1 : 0.5);
                ctx.fillStyle = 'rgb(' + col[0] + ',' + col[1] + ',' + col[2] + ')';
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawVignette() {
            if (vignetteGrad) {
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, W, H);
            }
        }

        function drawGrain() {
            if (!noisePattern) return;
            ctx.save();
            ctx.globalAlpha = 0.028;
            ctx.fillStyle = noisePattern;
            ctx.fillRect(0, 0, W, H);
            ctx.restore();
        }

        // Distant parallax mountain ridges with atmospheric haze for depth
        function drawHills(sky) {
            const haze = sky.bot; // horizon colour the far ridges dissolve into
            const earth = lerpColor([48, 50, 80], [20, 22, 42], sky.dark);
            // farthest -> nearest; far ridges fade most into the haze
            const layers = [
                { speed: 0.08, base: 0.68, amp: 0.05, freq: 0.0011, haze: 0.78, ph: 0.0 },
                { speed: 0.17, base: 0.76, amp: 0.07, freq: 0.0018, haze: 0.52, ph: 2.1 },
                { speed: 0.32, base: 0.85, amp: 0.10, freq: 0.0027, haze: 0.26, ph: 4.3 },
            ];
            for (const L of layers) {
                const off = distance * L.speed;
                const base = lerpColor(earth, haze, L.haze * (1 - sky.dark * 0.45));
                const topY = H * (L.base - L.amp - 0.05);
                const grd = ctx.createLinearGradient(0, topY, 0, H);
                grd.addColorStop(0, rgb(lerpColor(base, haze, 0.3)));
                grd.addColorStop(1, rgb(lerpColor(base, [10, 11, 26], 0.35 + sky.dark * 0.3)));
                ctx.fillStyle = grd;
                ctx.beginPath();
                ctx.moveTo(0, H);
                for (let x = 0; x <= W; x += 10) {
                    const wx = x + off;
                    const y = H * L.base
                        - Math.sin(wx * L.freq + L.ph) * H * L.amp
                        - Math.sin(wx * L.freq * 2.3 + 1.1) * H * L.amp * 0.4
                        - Math.sin(wx * L.freq * 5.1 + 0.5) * H * L.amp * 0.15;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(W, H);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawCave(sky) {
            const step = 10;
            // terrain colours shift darker at night
            const lightCol = lerpColor([118, 94, 72], [38, 42, 68], sky.dark);
            const darkCol = lerpColor([56, 42, 32], [12, 14, 30], sky.dark);
            // the rim catches sky light — warm at dawn/dusk, cool at night
            let rimCol = lerpColor([176, 146, 114], [66, 74, 116], sky.dark);
            rimCol = lerpColor(rimCol, sky.stops[3], sky.warm * 0.55);
            const glowCol = lerpColor(sky.stops[3], [255, 240, 220], 0.2);

            const edge = (yAt) => {
                // wide soft glow first, then a crisp lit rim
                ctx.lineJoin = 'round';
                ctx.strokeStyle = 'rgba(' + glowCol[0] + ',' + glowCol[1] + ',' + glowCol[2] + ',' + (0.12 + sky.warm * 0.22) + ')';
                ctx.lineWidth = 9;
                ctx.beginPath();
                for (let x = 0; x <= W; x += step) {
                    const y = yAt(distance + x, distance);
                    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.strokeStyle = rgb(rimCol);
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                for (let x = 0; x <= W; x += step) {
                    const y = yAt(distance + x, distance);
                    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            };

            // ----- top terrain -----
            const gTop = ctx.createLinearGradient(0, 0, 0, H * 0.55);
            gTop.addColorStop(0, rgb(darkCol));
            gTop.addColorStop(1, rgb(lightCol));
            ctx.fillStyle = gTop;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            for (let x = 0; x <= W; x += step) ctx.lineTo(x, topAt(distance + x, distance));
            ctx.lineTo(W, 0);
            ctx.closePath();
            ctx.fill();
            edge(topAt);

            // ----- bottom terrain -----
            const gBot = ctx.createLinearGradient(0, H * 0.45, 0, H);
            gBot.addColorStop(0, rgb(lightCol));
            gBot.addColorStop(1, rgb(darkCol));
            ctx.fillStyle = gBot;
            ctx.beginPath();
            ctx.moveTo(0, H);
            for (let x = 0; x <= W; x += step) ctx.lineTo(x, botAt(distance + x, distance));
            ctx.lineTo(W, H);
            ctx.closePath();
            ctx.fill();
            edge(botAt);
        }

        function drawRings(sky) {
            const now = performance.now();
            for (const r of rings) {
                const sx = r.wx - distance;
                if (sx < -RING_RADIUS * 2 || sx > W + RING_RADIUS * 2) continue;
                if (r.collected) continue;
                // gentle rotation about the vertical axis -> perspective ellipse
                const spin = Math.sin(now / 900 + r.wx * 0.7);
                const sxScale = 0.42 + 0.58 * Math.abs(spin); // 0.42 (edge-on) .. 1 (face-on)
                const bob = Math.sin(now / 600 + r.wx) * 4;
                ctx.save();
                ctx.translate(sx, r.y + bob);

                // outer glow (additive)
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                const glow = ctx.createRadialGradient(0, 0, RING_RADIUS * 0.45, 0, 0, RING_RADIUS * 1.5);
                glow.addColorStop(0, 'rgba(255,224,130,0)');
                glow.addColorStop(0.72, 'rgba(255,206,96,0.4)');
                glow.addColorStop(1, 'rgba(255,200,90,0)');
                ctx.fillStyle = glow;
                ctx.beginPath(); ctx.arc(0, 0, RING_RADIUS * 1.5, 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                ctx.scale(sxScale, 1);
                // metallic torus band: gradient across the ring thickness
                const band = ctx.createLinearGradient(0, -RING_RADIUS, 0, RING_RADIUS);
                band.addColorStop(0, '#fff0b8');
                band.addColorStop(0.5, '#ffc24a');
                band.addColorStop(1, '#e8932a');
                ctx.lineWidth = 9;
                ctx.strokeStyle = band;
                ctx.beginPath(); ctx.arc(0, 0, RING_RADIUS, 0, Math.PI * 2); ctx.stroke();
                // bright inner highlight
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = 'rgba(255,255,255,0.85)';
                ctx.beginPath(); ctx.arc(0, 0, RING_RADIUS - 4.5, 0, Math.PI * 2); ctx.stroke();
                ctx.restore();

                // sparkle that races around the rim
                const sa = now / 360 + r.wx;
                const sxp = Math.cos(sa) * RING_RADIUS * sxScale;
                const syp = Math.sin(sa) * RING_RADIUS;
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.translate(sx, r.y + bob);
                const spark = ctx.createRadialGradient(sxp, syp, 0, sxp, syp, 9);
                spark.addColorStop(0, 'rgba(255,255,255,0.95)');
                spark.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = spark;
                ctx.beginPath(); ctx.arc(sxp, syp, 9, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        function drawTrail() {
            if (trail.length < 2) return;
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            for (let i = 1; i < trail.length; i++) {
                const f = i / trail.length;            // 0 (oldest) -> 1 (newest, at tail)
                const g = Math.round(214 + 40 * f);
                const b = Math.round(170 + 70 * f);
                ctx.strokeStyle = 'rgba(255,' + g + ',' + b + ',' + (f * f * 0.55) + ')';
                ctx.lineWidth = f * 7 + 0.6;
                ctx.beginPath();
                ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
                ctx.lineTo(trail[i].x, trail[i].y);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawGlider(sky) {
            const angle = clamp(gliderVY * 0.05, -0.62, 0.62);
            // warm light tint for lit upper surfaces (picks up dawn/dusk colour)
            const lit = sky ? lerpColor([255, 255, 255], sky.stops[3], sky.warm * 0.4) : [255, 255, 255];
            const litStr = rgb(lit);
            const outline = 'rgba(38,46,76,0.5)';

            ctx.save();
            ctx.translate(gliderX, gliderY);
            ctx.rotate(angle);
            ctx.scale(1.04, 1.04);

            // --- warm aura (heroic glow, strongest at dawn/dusk) ---
            if (sky) {
                const aura = ctx.createRadialGradient(0, 0, 6, 0, 0, 54);
                aura.addColorStop(0, 'rgba(' + lit[0] + ',' + lit[1] + ',' + lit[2] + ',' + (0.10 + sky.warm * 0.16) + ')');
                aura.addColorStop(1, 'rgba(' + lit[0] + ',' + lit[1] + ',' + lit[2] + ',0)');
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = aura;
                ctx.beginPath(); ctx.arc(0, 0, 54, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            // === FAR WING (behind the fuselage, swept up-and-back, in shade) ===
            const farWing = ctx.createLinearGradient(0, 0, -30, -24);
            farWing.addColorStop(0, '#9aa6c6');
            farWing.addColorStop(1, '#6e7aa0');
            ctx.fillStyle = farWing;
            ctx.strokeStyle = outline;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(8, -3);
            ctx.quadraticCurveTo(-8, -13, -27, -25);     // leading edge to tip
            ctx.quadraticCurveTo(-33, -27.5, -32, -22.5); // winglet
            ctx.quadraticCurveTo(-18, -14, -3, -1);       // trailing edge to root
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // === FUSELAGE: sleek pod-and-boom ===
            const body = ctx.createLinearGradient(0, -8, 0, 9);
            body.addColorStop(0, litStr);
            body.addColorStop(0.4, '#eef2fb');
            body.addColorStop(1, '#93a4c8');
            ctx.fillStyle = body;
            ctx.strokeStyle = outline;
            ctx.lineWidth = 1.1;
            ctx.beginPath();
            ctx.moveTo(38, 1);
            ctx.quadraticCurveTo(30, -4, 14, -7);      // nose to cockpit shoulder
            ctx.quadraticCurveTo(-8, -7, -28, -3);     // slender upper boom
            ctx.quadraticCurveTo(-36, -2.5, -41, -1);  // to the tail tip
            ctx.quadraticCurveTo(-36, 0.8, -28, 2);    // lower boom
            ctx.quadraticCurveTo(-6, 8, 10, 8);        // belly pod
            ctx.quadraticCurveTo(28, 6.5, 38, 1);      // belly back to nose
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // sporty accent stripe along the flank
            const stripe = ctx.createLinearGradient(30, 0, -22, 0);
            stripe.addColorStop(0, '#ff8a3c');
            stripe.addColorStop(1, '#ff5566');
            ctx.fillStyle = stripe;
            ctx.beginPath();
            ctx.moveTo(30, 2.4);
            ctx.quadraticCurveTo(4, 4.2, -24, 0.8);
            ctx.quadraticCurveTo(2, 5.6, 30, 4.2);
            ctx.closePath();
            ctx.fill();

            // === T-TAIL: swept vertical fin + horizontal stabiliser on top ===
            ctx.fillStyle = '#cfd8f1';
            ctx.strokeStyle = outline;
            ctx.lineWidth = 0.9;
            ctx.beginPath();
            ctx.moveTo(-29, -2);
            ctx.lineTo(-40, -13);
            ctx.lineTo(-35.5, -13);
            ctx.lineTo(-24, -1);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = litStr;
            ctx.beginPath();
            ctx.moveTo(-45, -13);
            ctx.quadraticCurveTo(-38, -15.2, -32, -12.6);
            ctx.quadraticCurveTo(-38.5, -11.6, -45, -12.4);
            ctx.closePath();
            ctx.fill();

            // === NEAR WING (hero: long, slender, swept down-and-back, lit) ===
            const wing = ctx.createLinearGradient(6, 0, -30, 26);
            wing.addColorStop(0, litStr);
            wing.addColorStop(0.6, '#dde5f7');
            wing.addColorStop(1, '#aebbe0');
            ctx.fillStyle = wing;
            ctx.strokeStyle = outline;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(10, -1);
            ctx.quadraticCurveTo(-6, 12, -28, 26);       // leading edge to tip
            ctx.quadraticCurveTo(-34, 28.5, -33, 23.5);  // rounded winglet
            ctx.quadraticCurveTo(-16, 14, -2, 2);        // trailing edge to root
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            // crisp lit leading edge
            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(10, -1);
            ctx.quadraticCurveTo(-6, 12, -28, 26);
            ctx.stroke();

            // === CANOPY: glass bubble with a reflection streak ===
            const glass = ctx.createLinearGradient(0, -9, 0, -1);
            glass.addColorStop(0, '#d2ecff');
            glass.addColorStop(0.5, '#5f93cc');
            glass.addColorStop(1, '#264a78');
            ctx.fillStyle = glass;
            ctx.strokeStyle = 'rgba(40,60,90,0.55)';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(25, -2);
            ctx.quadraticCurveTo(23, -8.5, 11, -9.2);
            ctx.quadraticCurveTo(1, -9, -0.5, -3.5);
            ctx.quadraticCurveTo(13, -2.6, 25, -2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.72)';
            ctx.beginPath();
            ctx.moveTo(19, -4.5);
            ctx.quadraticCurveTo(14, -7.6, 7, -7);
            ctx.quadraticCurveTo(13, -5.6, 19, -4.5);
            ctx.closePath();
            ctx.fill();

            // nose tip highlight
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath();
            ctx.ellipse(34, -0.5, 2.6, 1.4, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // Updrafts — columns of rising air, telegraphed with cool wispy streaks
        function drawUpdrafts(sky) {
            if (!updrafts.length) return;
            const now = performance.now() / 1000;
            for (const u of updrafts) {
                const sx = u.wx - distance;            // left edge in screen space
                if (sx > W || sx + u.w < 0) continue;
                const top = topAt(u.wx + u.w * 0.5, distance);
                const bot = botAt(u.wx + u.w * 0.5, distance);
                ctx.save();
                // soft vertical glow band so the player can see it coming
                const band = ctx.createLinearGradient(sx, 0, sx + u.w, 0);
                band.addColorStop(0, 'rgba(150,210,255,0)');
                band.addColorStop(0.5, 'rgba(180,225,255,0.18)');
                band.addColorStop(1, 'rgba(150,210,255,0)');
                ctx.fillStyle = band;
                ctx.fillRect(sx, top, u.w, bot - top);
                // rising wispy streaks
                ctx.globalCompositeOperation = 'lighter';
                ctx.strokeStyle = 'rgba(200,235,255,0.34)';
                ctx.lineWidth = 1.6;
                const streaks = 6;
                for (let i = 0; i < streaks; i++) {
                    const fx = sx + u.w * ((i + 0.5) / streaks);
                    const rise = ((now * 70 + i * 53 + u.phase * 40) % (bot - top));
                    const y = bot - rise;
                    const wob = Math.sin(now * 2 + i + u.phase) * 7;
                    ctx.beginPath();
                    ctx.moveTo(fx, y);
                    ctx.quadraticCurveTo(fx + wob, y - 24, fx, y - 48);
                    ctx.globalAlpha = clamp(rise / (bot - top), 0, 1) * (1 - rise / (bot - top)) * 4;
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
                ctx.restore();
            }
        }

        function drawParticles() {
            for (const p of particles) {
                ctx.globalAlpha = clamp(p.life, 0, 1);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ---------------------------------------------------------------
        //  Update
        // ---------------------------------------------------------------
        function spawnRingsAhead() {
            const horizon = distance + W + RING_RADIUS * 2;
            while (nextRingWX < horizon) {
                const y = channelCenter(nextRingWX);
                rings.push({ wx: nextRingWX, y: y, collected: false });
                nextRingWX += RING_SPACING;
            }
            // drop rings well behind us
            rings = rings.filter(r => r.wx - distance > -RING_RADIUS * 3);
        }

        function spawnUpdraftsAhead() {
            const horizon = distance + W + 200;
            while (nextUpdraftWX < horizon) {
                const w = UPDRAFT_MIN_W + Math.random() * (UPDRAFT_MAX_W - UPDRAFT_MIN_W);
                updrafts.push({ wx: nextUpdraftWX, w: w, phase: Math.random() * Math.PI * 2 });
                nextUpdraftWX += UPDRAFT_MIN_GAP + Math.random() * (UPDRAFT_MAX_GAP - UPDRAFT_MIN_GAP);
            }
            // drop columns once fully behind us
            updrafts = updrafts.filter(u => u.wx + u.w - distance > -50);
        }

        function currentTilt() {
            if (tiltActive) return tilt;
            if (keyTilt !== 0) return keyTilt;
            return pointerTilt;
        }

        function updatePlaying(dt) {
            // accelerate slowly over time
            speed = lerp(speed, 4.6 + Math.min(distance / 9000, 3.4), 0.02);
            distance += speed;

            // vertical physics: gravity always pulls down; tilting back adds lift.
            // Neutral = gentle glide-down, tilt back = climb, tilt forward = fast dive.
            // This gives symmetric up/down authority and makes descending feel natural.
            const t = currentTilt();
            gliderVY += GRAVITY - t * LIFT;
            // updrafts: a column of rising air shoves the glider upward
            const gwxNow = distance + gliderX;
            inUpdraft = 0;
            for (const u of updrafts) {
                if (gwxNow >= u.wx && gwxNow <= u.wx + u.w) {
                    // smooth edges so entering/leaving isn't a hard jolt
                    const edge = Math.min(gwxNow - u.wx, u.wx + u.w - gwxNow);
                    const ramp = clamp(edge / 40, 0, 1);
                    gliderVY -= UPDRAFT_FORCE * ramp;
                    inUpdraft = Math.max(inUpdraft, ramp);
                }
            }
            gliderVY *= AIR_DRAG;
            gliderVY = clamp(gliderVY, -MAX_CLIMB, MAX_DIVE);
            gliderY += gliderVY;

            // trail (vapor from the tail) — older puffs drift back with the world
            for (let k = 0; k < trail.length; k++) trail[k].x -= speed;
            trail.push({ x: gliderX - 20, y: gliderY + 2 });
            if (trail.length > 26) trail.shift();

            spawnRingsAhead();
            spawnUpdraftsAhead();

            // ring collection
            const gwx = distance + gliderX;
            for (const r of rings) {
                if (r.collected) continue;
                const dx = r.wx - gwx;
                const dy = r.y - gliderY;
                if (Math.abs(dx) < RING_RADIUS && Math.abs(dy) < RING_RADIUS &&
                    (dx * dx + dy * dy) < RING_RADIUS * RING_RADIUS) {
                    r.collected = true;
                    ringsHit++;
                    ringPoints += RING_BONUS;
                    lastFlash = 1;
                    if (navigator.vibrate) navigator.vibrate(15);
                }
            }
            if (lastFlash > 0) lastFlash -= 0.06;

            // collision with cave
            const top = topAt(gwx, distance);
            const bot = botAt(gwx, distance);
            const r = 9;
            if (gliderY - r < top || gliderY + r > bot) {
                die();
                return;
            }

            // HUD
            const sc = Math.floor(distance / 30) + ringPoints;
            dom.score.textContent = sc;
            dom.ringHud.textContent = '◎ ' + ringsHit;
        }

        function updateParticles() {
            for (const p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.35;
                p.life -= 0.018;
            }
            particles = particles.filter(p => p.life > 0);
            if (shakeT > 0) shakeT -= 0.05;
        }

        // ---------------------------------------------------------------
        //  Main loop
        // ---------------------------------------------------------------
        function frame() {
            requestAnimationFrame(frame);

            if (state === 'playing') updatePlaying();
            if (state === 'dead') {
                distance += speed * 0.4; // keep scrolling a touch on the death screen
                updateParticles();
            }

            const sky = skyState(distance);

            ctx.save();
            if (shakeT > 0) {
                ctx.translate((Math.random() - 0.5) * shakeT * 18, (Math.random() - 0.5) * shakeT * 18);
            }

            drawSky(sky);          // gradient + horizon bloom + stars + shooting star
            drawAurora(sky);       // night ribbons of light
            drawGodRays(sky);      // golden-hour shafts
            drawCelestial(sky);    // sun / moon
            drawClouds(sky);       // lit volumetric clouds
            drawBirds(sky);        // distant flocks
            drawHills(sky);        // hazy parallax ridges
            drawCave(sky);         // the canyon
            drawUpdrafts(sky);     // columns of rising air
            drawRings(sky);
            drawAmbient(sky);      // foreground motes / fireflies

            if (state !== 'dead') {
                drawTrail();
                drawGlider(sky);
            }
            drawParticles();

            ctx.restore();

            // screen-space finishing passes (do not shake)
            drawVignette();
            drawGrain();

            // ring pickup flash
            if (lastFlash > 0) {
                ctx.fillStyle = 'rgba(255,225,140,' + (lastFlash * 0.25) + ')';
                ctx.fillRect(0, 0, W, H);
            }
        }

        // ---------------------------------------------------------------
        //  State transitions
        // ---------------------------------------------------------------
        function resetGame() {
            distance = 0;
            speed = 4.6;
            gliderX = Math.round(W * 0.30);
            gliderY = channelCenter(gliderX);
            gliderVY = 0;
            ringsHit = 0;
            ringPoints = 0;
            rings = [];
            nextRingWX = RING_SPACING;
            updrafts = [];
            nextUpdraftWX = UPDRAFT_MIN_GAP + Math.random() * (UPDRAFT_MAX_GAP - UPDRAFT_MIN_GAP);
            inUpdraft = 0;
            trail = [];
            particles = [];
            shakeT = 0;
            lastFlash = 0;
            neutralGamma = null; // recalibrate tilt to current hold
            dom.score.textContent = '0';
            dom.ringHud.textContent = '◎ 0';
        }

        function startPlaying() {
            resetGame();
            state = 'playing';
            dom.startScreen.classList.add('hidden');
            dom.overScreen.classList.add('hidden');
            dom.hud.classList.remove('hidden');
        }

        function die() {
            state = 'dead';
            shakeT = 1;
            if (navigator.vibrate) navigator.vibrate([40, 30, 60]);
            // debris
            for (let i = 0; i < 22; i++) {
                particles.push({
                    x: gliderX, y: gliderY,
                    vx: (Math.random() - 0.5) * 9,
                    vy: (Math.random() - 0.5) * 9 - 2,
                    r: Math.random() * 3 + 1.5,
                    life: 1,
                    color: Math.random() < 0.5 ? '#f4f6ff' : '#ff9e4a',
                });
            }
            const sc = Math.floor(distance / 30) + ringPoints;
            const isBest = sc > best;
            if (isBest) {
                best = sc;
                localStorage.setItem(BEST_KEY, String(best));
            }
            dom.finalScore.textContent = sc;
            dom.bestScore.textContent = best;
            dom.newBest.classList.toggle('hidden', !isBest);
            dom.hud.classList.add('hidden');
            setTimeout(() => { dom.overScreen.classList.remove('hidden'); }, 700);
        }

        // ---------------------------------------------------------------
        //  Input
        // ---------------------------------------------------------------
        function onOrientation(e) {
            if (e.gamma == null) return;
            tiltActive = true;
            if (neutralGamma == null) neutralGamma = e.gamma;
            // On iOS portrait, tilting the phone's left side down makes gamma
            // go negative; we want that to climb, so negate. (tilt left = up)
            const rel = e.gamma - neutralGamma;
            tilt = clamp(-rel / TILT_RANGE, -1, 1);
        }

        let tiltListenerAdded = false;
        function addTiltListener() {
            if (!tiltListenerAdded) {
                window.addEventListener('deviceorientation', onOrientation);
                tiltListenerAdded = true;
            }
        }
        async function requestTilt() {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') { addTiltListener(); return true; }
                    return false;
                } catch (err) { return false; }
            } else {
                addTiltListener();
                return true;
            }
        }

        // keyboard fallback (desktop testing)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w') keyTilt = 1;
            if (e.key === 'ArrowDown' || e.key === 's') keyTilt = -1;
            if (e.code === 'Space' && state !== 'playing') {
                e.preventDefault();
                if (state === 'menu') dom.startBtn.click();
                else dom.retryBtn.click();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'ArrowDown' || e.key === 's') keyTilt = 0;
        });

        // pointer fallback (drag up/down) — only used if no tilt & no keys
        let dragging = false, dragStartY = 0;
        function pointerDown(y) { dragging = true; dragStartY = y; }
        function pointerMove(y) {
            if (!dragging) return;
            pointerTilt = clamp((dragStartY - y) / 90, -1, 1);
        }
        function pointerUp() { dragging = false; pointerTilt = 0; }
        canvas.addEventListener('touchstart', (e) => { pointerDown(e.touches[0].clientY); }, { passive: true });
        canvas.addEventListener('touchmove', (e) => { pointerMove(e.touches[0].clientY); }, { passive: true });
        canvas.addEventListener('touchend', pointerUp, { passive: true });
        canvas.addEventListener('mousedown', (e) => pointerDown(e.clientY));
        window.addEventListener('mousemove', (e) => pointerMove(e.clientY));
        window.addEventListener('mouseup', pointerUp);

        async function begin() {
            await requestTilt();
            startPlaying();
        }
        dom.startBtn.addEventListener('click', begin);
        dom.retryBtn.addEventListener('click', begin);

        // auto game-over if app is backgrounded mid-flight
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && state === 'playing') die();
        });

        // ---------------------------------------------------------------
        //  Boot
        // ---------------------------------------------------------------
        function detectTiltSupport() {
            const hasOrientation = ('DeviceOrientationEvent' in window);
            if (!hasOrientation) {
                dom.tiltNote.textContent = 'No motion sensor detected — use ↑ / ↓ keys or drag up/down to fly.';
            } else if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                dom.tiltNote.textContent = 'Tap “Take Off” to allow motion access. Hold the phone comfortably — that becomes level.';
            } else {
                dom.tiltNote.textContent = 'Hold the phone comfortably when you take off — that becomes your level position.';
            }
        }

        resize();
        detectTiltSupport();
        gliderX = Math.round(W * 0.30);
        gliderY = H * 0.5;
        requestAnimationFrame(frame);
    })();
    </script>
</body>
</html>
