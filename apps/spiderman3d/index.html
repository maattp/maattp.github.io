  @media (display-mode: standalone) {

<script type="module">
import * as THREE from 'three';

const BOOT_T0 = performance.now();   // city gen + scene build cost, exposed as __dbg.bootMs

const VERSION = 5;
// the version badge lives ONLY on the title screen (user decision, V5)
document.getElementById('tver').textContent = 'V' + VERSION;

// ---------------------------------------------------------------------------
// TUNING — these constants are coupled. G / JUMP_V set leap height (~4.5 m).
// REEL injects the swing's energy: raise it and terminal speed (bounded by
// DRAG_K → ~62 m/s) rises with it. ANCHOR_R bounds rope length, and the
// anchor scorer's ideal length (LEN_IDEAL) must stay well inside ANCHOR_R or
// every attach saturates the penalty. The Manhattan grid (ST=80 m streets,
// AV=272 m avenues) keeps roof anchors within ANCHOR_R along any corridor —
// if you change the grid or these radii, re-run the bot sweep. Central Park
// is deliberately unswingable open ground.
// ---------------------------------------------------------------------------
const SDT       = 1 / 120;   // sim step (120 Hz: rope constraint stays stable at 60 m/s)
const G         = 25;        // gravity, m/s^2 (super-heroic, not Earth)
const RUN       = 12;        // base auto-run speed, m/s
const RUN_DECEL = 5;         // landing momentum bleeds to RUN at this rate
const JUMP_V    = 15;        // web-leap vertical impulse (~4.5 m — enough to engage a street-start swing)
const DRAG_K    = 0.0065;    // quadratic air drag  (terminal ~ sqrt(G/K) ≈ 62 m/s)
const REEL      = 4.0;       // rope shortens while held, m/s (energy injection)
const PUMP      = 14;        // swing pump: forward accel while roped & slow, m/s^2
const PUMP_MAX  = 18;        // pump fades to zero at this speed
const HANG_SNAP = 1.5;       // s of dead-hang (speed < 3) before the web snaps
const AIR_STEER = 16;        // lateral accel from full tilt while airborne, m/s^2
const TURN_RATE = 2.4;       // grounded heading turn at full tilt, rad/s
const ANCHOR_R  = 85;        // max web reach
const LEN_IDEAL = 38;        // anchor scorer's sweet-spot rope length
const MIN_ELEV  = 0.30;      // rad — anchors below this elevation angle are unswingable
const COYOTE    = 10;        // steps of jump grace after running off an edge

// --- deterministic rand -----------------------------------------------------
const seed = +(new URLSearchParams(location.search).get('seed') || 7);
function mulberry32(a) { return function() {
  a |= 0; a = a + 0x6D2B79F5 | 0;
  let t = Math.imul(a ^ a >>> 15, 1 | a);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
const rand = mulberry32(seed);

// ---------------------------------------------------------------------------
// CITY — rough real Manhattan. Battery at the south (z = Z0), Inwood at the
// north; +z is uptown, +x is east. Real scale: ~21.6 km long, ~3.7 km at the
// widest (14th St). Real grid: avenues (N-S corridors) every ~272 m, streets
// (E-W) every ~80 m. Neighborhood skylines via nbhHeight(). Individual
// buildings are invented; scale and layout follow the real island.
// All collision is AABB (bx0..bx1, bz0..bz1, h); anchors = roof corners +
// long-edge midpoints, spatially hashed.
// ---------------------------------------------------------------------------
const ISLAND_L = 21600;               // Battery → Inwood, meters
const Z0 = -ISLAND_L / 2;             // z of the southern tip (the Battery)
const AV = 272, AV_W = 30;            // avenue pitch / width
const ST = 80,  ST_W = 18;            // street pitch / width
const kmN = z => (z - Z0) / 1000;     // km north of the Battery
const zk  = t => Z0 + t * 1000;       // inverse

// width & centerline profiles (piecewise-linear over km-from-Battery).
// The island widens to 14th St, tapers uptown, and drifts east going north.
const W_PTS = [[0, 500], [0.5, 1400], [1, 2200], [2, 3100], [3, 3700], [5, 3500],
  [6, 3400], [8, 2900], [10, 2700], [12, 2400], [14, 2100], [15.5, 1800],
  [17, 1600], [19, 1400], [20.5, 900], [21.3, 400], [21.6, 120]];
const C_PTS = [[0, 0], [4, 50], [6, 200], [9, 450], [12, 700], [15, 900], [18, 1050], [21.6, 1200]];
function pw(pts, t) {
  if (t <= pts[0][0]) return pts[0][1];
  for (let i = 1; i < pts.length; i++) if (t <= pts[i][0]) {
    const p0 = pts[i - 1], p1 = pts[i];
    return p0[1] + (p1[1] - p0[1]) * (t - p0[0]) / (p1[0] - p0[0]);
  }
  return pts[pts.length - 1][1];
}
const widthAt  = z => pw(W_PTS, kmN(z));
const centerAt = z => pw(C_PTS, kmN(z));
function insideIsland(x, z) {
  const t = kmN(z);
  if (t < 0 || t > 21.6) return false;
  return Math.abs(x - centerAt(z)) <= widthAt(z) / 2;
}

// Parks: rectangles [t0, t1] km × x-range (computed at the park's mid-z), plus
// the two shore strips handled functionally in inPark(). No buildings inside.
const PARKS = [];
function addPark(t0, t1, dx0, dx1) {
  const c = centerAt(zk((t0 + t1) / 2));
  PARKS.push({ x0: c + dx0, x1: c + dx1, z0: zk(t0), z1: zk(t1) });
  return PARKS[PARKS.length - 1];
}
const CENTRAL_PARK = addPark(8.7, 12.8, -420, 420);   // 59th → 110th
// Battery Park: wide bounds are for building placement only (insideIsland
// already gates blocks); the LAWN is drawn shoreline-clipped below, so the
// generic rectangle renderer must skip this entry.
const BATTERY = addPark(0, 0.35, -2000, 2000);
BATTERY.noLawn = true;
addPark(3.55, 3.78, -140, 120);                       // Washington Square
addPark(3.05, 3.25, 560, 780);                        // Tompkins Square
addPark(4.15, 4.32, -40, 150);                        // Union Square
addPark(4.7, 4.92, -60, 160);                         // Madison Square
addPark(7.3, 7.48, -260, -40);                        // Bryant Park
function inPark(x, z) {
  for (const p of PARKS) if (x > p.x0 && x < p.x1 && z > p.z0 && z < p.z1) return true;
  const t = kmN(z), c = centerAt(z), w = widthAt(z);
  if (t > 9.5 && t < 14.5 && x < c - w / 2 + 170) return true;   // Riverside Park (west shore)
  if (t > 2.6 && t < 4.2 && x > c + w / 2 - 140) return true;    // East River Park
  return false;
}

// Neighborhood skyline band: t = km north of the Battery, e = east-west
// position in [-1 west, +1 east] across the island at that latitude. The band
// also decides the BLOCK FABRIC: base ≤ 26 → rowhouse street walls,
// base ≤ 55 (no supertall chance) → mid-rise frontages, else office slabs.
function nbhBand(t, e) {
  let base = 20, varr = 40, superChance = 0, superMin = 0, superVar = 0;
  if (t < 1.3)       { base = 60; varr = 170; superChance = 0.05; superMin = 240; superVar = 180; } // Financial District
  else if (t < 2.3)  { base = 28; varr = 55; }                                   // Tribeca / Civic Center
  else if (t < 4.0)  { base = 15; varr = 32; }                                   // SoHo / Village / LES
  else if (t < 5.1)  { base = 35; varr = 85;
    if (e < -0.5 && t > 4.5) { base = 110; varr = 220; } }                       // Flatiron; Hudson Yards to the west
  else if (t < 6.5)  { base = 45; varr = 100; }                                  // Chelsea / Gramercy / Murray Hill
  else if (t < 8.8)  { base = 70; varr = 210;                                    // Midtown canyon
    superChance = t > 7.0 ? 0.05 : 0.02; superMin = 300; superVar = 220;
    if (t > 8.5) { superChance = 0.07; superVar = 170; } }                       // Billionaires' Row (57th)
  else if (t < 12.8) { base = 38; varr = 75;
    if (Math.abs(e) > 0.28 && Math.abs(e) < 0.6) { base = 55; varr = 110; } }    // UES/UWS park-front walls
  else if (t < 15.6) { base = 20; varr = 42; }                                   // Harlem / Morningside
  else if (t < 19.2) { base = 24; varr = 48; }                                   // Washington Heights
  else               { base = 14; varr = 28; }                                   // Inwood
  return { base, varr, superChance, superMin, superVar };
}
function nbhHeight(band) {
  const r = rand();
  let h = band.base + r * r * band.varr;
  if (rand() < band.superChance) h = band.superMin + rand() * band.superVar;
  return Math.min(540, Math.max(10, h));
}

// Broadway — the one street that breaks the grid. Its path is defined in
// island-relative e (like nbhBand): down the spine through SoHo, then the
// famous diagonal cutting west past Union/Madison/Herald/Times Squares to
// Columbus Circle, up the west side, and back to the spine in Inwood.
// Buildings are never placed within its corridor.
const BWAY_PTS = [[0.3, 0], [2, -0.03], [3.9, 0.03], [4.8, 0.05], [5.6, 0], [7, -0.08],
  [8.75, -0.2], [10, -0.5], [12.8, -0.5], [15, -0.35], [17, -0.2], [19, -0.08], [21.3, 0]];
const BWAY_HALF = 14;   // corridor half-width, m
function bwayXAt(z) {
  const t = kmN(z);
  if (t < 0.3 || t > 21.3) return null;
  return centerAt(z) + pw(BWAY_PTS, t) * widthAt(z) / 2;
}

const buildings = [];   // {x0,x1,z0,z1,h,cx,cz}
const anchors = [];     // THREE.Vector3 roof points
const blocks = [];      // {x0,x1,z0,z1} — for sidewalk plinths

// anchors float just OUTSIDE the roof corners/edges — a straight rope to a
// fresh anchor must never graze its own building (the LOS + wrap tests treat
// all boxes uniformly because of this). o must stay comfortably above SHRINK:
// o - SHRINK is the float-safety gap.
let grpId = 0;   // one visual identity (facade color) per placed building, shared by its wedge slices
function addBuilding(x0, x1, z0, z1, h, small, grp, rings = true) {
  const cx = (x0 + x1) / 2, cz = (z0 + z1) / 2;
  buildings.push({ x0, x1, z0, z1, h, cx, cz, grp });
  const o = 0.5, ay = h + 0.15;
  anchors.push(
    new THREE.Vector3(x0 - o, ay, z0 - o), new THREE.Vector3(x1 + o, ay, z0 - o),
    new THREE.Vector3(x0 - o, ay, z1 + o), new THREE.Vector3(x1 + o, ay, z1 + o));
  // rowhouses share party walls, so corners alone give a dense parapet line;
  // bigger footprints also get long-edge midpoints
  if (!small) anchors.push(new THREE.Vector3(cx, ay, z0 - o), new THREE.Vector3(cx, ay, z1 + o));
  // tall buildings also take webs on their FACES — otherwise supertall
  // canyons (roofs above ANCHOR_R) would be unswingable from the street.
  // The 55 m ring is the guarantee: always inside ANCHOR_R from street level,
  // whatever the tower's height (proportional-only rings left dead zones).
  // rings=false on all but the widest wedge slice — slicing must never
  // multiply a tower's ring set (placeBuilding enforces one per building).
  if (rings && x1 - x0 >= 25)
    for (const lvl of h > 220 ? [55, h * 0.45, h * 0.75]
                   : h > 90 ? (h * 0.55 > 70 ? [55, h * 0.55] : [55]) : [])
      anchors.push(
        new THREE.Vector3(cx, lvl, z0 - o), new THREE.Vector3(cx, lvl, z1 + o),
        new THREE.Vector3(x0 - o, lvl, cz), new THREE.Vector3(x1 + o, lvl, cz));
}
// Placement front door: buildings crossing Broadway aren't dropped — they're
// carved into stair-stepped axis-aligned slices that track the diagonal, so
// crossing blocks end in Flatiron-style prows while every collision/rope
// invariant (AABB-only world) stays intact. Slices share the parent's grp so
// they render as one building.
function placeBuilding(x0, x1, z0, z1, h, small) {
  // no building may touch a park — partial rows stop cleanly at the park line
  if (inPark(x0, z0) || inPark(x1, z0) || inPark(x0, z1) || inPark(x1, z1) ||
      inPark((x0 + x1) / 2, (z0 + z1) / 2)) return;
  const g = grpId++;
  const bwA = bwayXAt(z0), bwB = bwayXAt(z1);
  if (bwA === null || bwB === null ||
      x1 < Math.min(bwA, bwB) - BWAY_HALF || x0 > Math.max(bwA, bwB) + BWAY_HALF) {
    addBuilding(x0, x1, z0, z1, h, small, g);
    return;
  }
  const N = Math.max(2, Math.min(5, Math.round((z1 - z0) / 7)));
  const slices = [];
  for (let i = 0; i < N; i++) {
    const sz0 = z0 + (i / N) * (z1 - z0), sz1 = z0 + ((i + 1) / N) * (z1 - z0);
    const bw = bwayXAt((sz0 + sz1) / 2);
    const L1 = Math.min(x1, bw - BWAY_HALF), R0 = Math.max(x0, bw + BWAY_HALF);
    if (L1 - x0 >= 4) slices.push([x0, L1, sz0, sz1]);   // west-of-Broadway slice
    if (x1 - R0 >= 4) slices.push([R0, x1, sz0, sz1]);   // east-of-Broadway slice
  }
  // exactly ONE face-ring set per crossing building: the widest slice keeps
  // it (preserves the 55 m street-reach guarantee at the corridor without
  // multiplying rings once per z-strip)
  let widest = -1, wbest = 0;
  slices.forEach((s, i) => { if (s[1] - s[0] > wbest) { wbest = s[1] - s[0]; widest = i; } });
  slices.forEach((s, i) => addBuilding(s[0], s[1], s[2], s[3], h, true, g, i === widest));
}

(function genCity() {
  const rows = Math.floor(ISLAND_L / ST);
  for (let k = -8; k <= 12; k++) {
    const bx0 = k * AV + AV_W / 2, bx1 = (k + 1) * AV - AV_W / 2;
    for (let j = 0; j < rows; j++) {
      const bz0 = Z0 + j * ST + ST_W / 2, bz1 = Z0 + (j + 1) * ST - ST_W / 2;
      const cz = (bz0 + bz1) / 2, bcx = (bx0 + bx1) / 2;
      // the whole block must be on land (shore aprons read as waterfront
      // highways — realistic). Parks clip PER BUILDING below, not per block:
      // dropping any park-touching block left a ~240 m empty apron around
      // every park, erasing the CPW/5th Ave park-front walls.
      if (!insideIsland(bx0, bz0) || !insideIsland(bx1, bz0) ||
          !insideIsland(bx0, bz1) || !insideIsland(bx1, bz1)) continue;
      if (inPark(bcx, cz)) continue;   // block core inside a park
      blocks.push({ x0: bx0, x1: bx1, z0: bz0, z1: bz1 });
      const t = kmN(cz), e = (bcx - centerAt(cz)) / (widthAt(cz) / 2);
      const band = nbhBand(t, e);
      if (band.base <= 26 && !band.superChance) {
        // ROWHOUSE FABRIC (Village, Harlem, Heights, Inwood): two contiguous
        // party-wall street walls facing the streets, courtyard gap between
        for (const front of [true, false]) {
          let x = bx0;
          while (x < bx1 - 8) {
            let w = 16 + rand() * 26;                    // 16-42 m lots
            if (x + w > bx1 - 8) w = bx1 - x;            // corner lot takes the tail
            const d = 20 + rand() * 6;                   // ~30 m real lot depth
            placeBuilding(x, x + w, front ? bz0 : bz1 - d, front ? bz0 + d : bz1,
              nbhHeight(band), true);
            x += w;
          }
        }
      } else if (band.base <= 55 && !band.superChance) {
        // MID-RISE (Tribeca, Chelsea, UES/UWS): wider frontage segments,
        // occasional side gaps, still built to the street line
        for (const front of [true, false]) {
          let x = bx0;
          while (x < bx1 - 12) {
            let w = 34 + rand() * 44;
            if (x + w > bx1 - 12) w = bx1 - x;
            const d = 24 + rand() * 7;
            placeBuilding(x, x + w, front ? bz0 : bz1 - d, front ? bz0 + d : bz1,
              nbhHeight(band), false);
            x += w + (rand() < 0.3 ? 5 : 0);
          }
        }
      } else {
        // OFFICE/TOWER BLOCKS (FiDi, Midtown, Hudson Yards): 1-3 big slabs
        // with plaza gaps; supertalls get slender footprints
        const nb = 1 + Math.floor(rand() * 3);
        const gap = 10, slotW = (bx1 - bx0 - gap * (nb - 1)) / nb;
        for (let s = 0; s < nb; s++) {
          let w = slotW * (0.8 + rand() * 0.2);
          let d = (bz1 - bz0) * (0.75 + rand() * 0.25);
          const h = nbhHeight(band);
          if (h > 300) { w *= 0.55; d *= 0.7; }
          const cx = bx0 + s * (slotW + gap) + slotW / 2;
          placeBuilding(cx - w / 2, cx + w / 2, cz - d / 2, cz + d / 2, h, false);
        }
      }
    }
  }
})();

// spatial hashes (cell 48 m) for anchors and building AABBs
const CELL = 48;
const aHash = new Map(), bHash = new Map();
const hk = (cx, cz) => cx * 100000 + cz;
const bucket = (m, k) => { let a = m.get(k); if (!a) m.set(k, a = []); return a; };
anchors.forEach((a, i) => {
  bucket(aHash, hk(Math.floor(a.x / CELL), Math.floor(a.z / CELL))).push(i);
});
buildings.forEach((b, i) => {
  for (let cx = Math.floor(b.x0 / CELL); cx <= Math.floor(b.x1 / CELL); cx++)
    for (let cz = Math.floor(b.z0 / CELL); cz <= Math.floor(b.z1 / CELL); cz++)
      bucket(bHash, hk(cx, cz)).push(i);
});
function nearBuildings(x, z, r) {
  const out = [];
  for (let cx = Math.floor((x - r) / CELL); cx <= Math.floor((x + r) / CELL); cx++)
    for (let cz = Math.floor((z - r) / CELL); cz <= Math.floor((z + r) / CELL); cz++) {
      const arr = bHash.get(hk(cx, cz));
      if (arr) for (const i of arr) if (!out.includes(i)) out.push(i);
    }
  return out;
}

// --- rope-vs-building geometry ---------------------------------------------
// All in 2D top-down: obstacles are AABBs and bends happen on vertical edges.
const SHRINK = 0.25;   // rope tests use slightly shrunk boxes so wall contacts don't
                       // false-positive; must stay well below the anchor outset `o` (0.5)
                       // and the 0.3 bend nudge — those gaps keep pivots off the test rects
const wrapStats = { wrap: 0, unwrap: 0, snap: 0, losReject: 0 };

// Liang-Barsky segment-vs-rect clip. Returns {t0, t1, axis} (axis = entered
// face: 0 x0-side, 1 x1-side, 2 z0-side, 3 z1-side) or null if no overlap.
function clip2D(px, pz, qx, qz, b) {
  const rx0 = b.x0 + SHRINK, rx1 = b.x1 - SHRINK, rz0 = b.z0 + SHRINK, rz1 = b.z1 - SHRINK;
  const dx = qx - px, dz = qz - pz;
  const p = [-dx, dx, -dz, dz];
  const q = [px - rx0, rx1 - px, pz - rz0, rz1 - pz];
  let t0 = 0, t1 = 1, axis = -1;
  for (let i = 0; i < 4; i++) {
    if (Math.abs(p[i]) < 1e-9) { if (q[i] < 0) return null; continue; }
    const r = q[i] / p[i];
    if (p[i] < 0) { if (r > t1) return null; if (r > t0) { t0 = r; axis = i; } }
    else { if (r < t0) return null; if (r < t1) t1 = r; }
  }
  return { t0, t1, axis };
}
function segBoxes(px, pz, qx, qz) {
  const out = new Set();
  const cx0 = Math.floor(Math.min(px, qx) / CELL), cx1 = Math.floor(Math.max(px, qx) / CELL);
  const cz0 = Math.floor(Math.min(pz, qz) / CELL), cz1 = Math.floor(Math.max(pz, qz) / CELL);
  for (let cx = cx0; cx <= cx1; cx++) for (let cz = cz0; cz <= cz1; cz++) {
    const arr = bHash.get(hk(cx, cz));
    if (arr) for (const i of arr) out.add(i);
  }
  return out;
}
// is the 3D segment p→q cut by any building (i.e. below a roof where it crosses)?
function segBlocked(p, q) {
  for (const i of segBoxes(p.x, p.z, q.x, q.z)) {
    const b = buildings[i];
    const c = clip2D(p.x, p.z, q.x, q.z, b);
    if (!c) continue;
    const y0 = p.y + (q.y - p.y) * c.t0, y1 = p.y + (q.y - p.y) * c.t1;
    if (Math.min(y0, y1) < b.h - 0.05) return true;
  }
  return false;
}
// The rope from p to its pivot got cut: bend it around the vertical edge of
// the first box it enters — the corner of the entered face nearest the entry
// point, nudged outward so the new segment doesn't immediately re-collide.
function findBend(p, piv) {
  let bestT = Infinity, bend = null;
  for (const i of segBoxes(p.x, p.z, piv.x, piv.z)) {
    const b = buildings[i];
    const c = clip2D(p.x, p.z, piv.x, piv.z, b);
    if (!c || c.axis < 0 || c.t0 >= bestT) continue;
    const y0 = p.y + (piv.y - p.y) * c.t0, y1 = p.y + (piv.y - p.y) * c.t1;
    if (Math.min(y0, y1) >= b.h - 0.05) continue;         // passes over the roof
    const ex = p.x + (piv.x - p.x) * c.t0, ez = p.z + (piv.z - p.z) * c.t0;
    let bx, bz;
    if (c.axis < 2) {         // entered an x face: corners differ in z
      bx = (c.axis === 0 ? b.x0 : b.x1) + (c.axis === 0 ? -0.3 : 0.3);
      bz = Math.abs(ez - b.z0) < Math.abs(ez - b.z1) ? b.z0 - 0.3 : b.z1 + 0.3;
    } else {                  // entered a z face: corners differ in x
      bz = (c.axis === 2 ? b.z0 : b.z1) + (c.axis === 2 ? -0.3 : 0.3);
      bx = Math.abs(ex - b.x0) < Math.abs(ex - b.x1) ? b.x0 - 0.3 : b.x1 + 0.3;
    }
    bestT = c.t0;
    bend = new THREE.Vector3(bx, Math.min(b.h - 0.2, Math.max(1, y0)), bz);
  }
  return bend;
}

// support height (feet level) at a point: roof if inside a footprint, else
// lawn (parks are 0.2 m raised terraces — matches the decal height so the
// runner stands ON the grass, not shin-deep in it), else street
function supportAt(x, z) {
  let s = 0;
  const arr = bHash.get(hk(Math.floor(x / CELL), Math.floor(z / CELL)));
  if (arr) for (const i of arr) {
    const b = buildings[i];
    if (x >= b.x0 && x <= b.x1 && z >= b.z0 && z <= b.z1 && b.h > s) s = b.h;
  }
  if (s === 0 && inPark(x, z)) s = 0.2;
  return s;
}

// ---------------------------------------------------------------------------
// PLAYER STATE + SIM
// ---------------------------------------------------------------------------
const P = {
  pos: new THREE.Vector3(AV, 0, zk(6.5)),  // an avenue south of Midtown, running uptown
  vel: new THREE.Vector3(0, 0, RUN),
  heading: Math.atan2(0, 1),            // yaw, atan2(x, z) convention (faces +z at 0)
  grounded: true,
  coyote: 0,
  groundHold: 0,                        // steps grounded with a hand held (auto re-leap)
  ropes: { L: null, R: null },          // {pivots: [anchor V3, ...bends], usedLen, len, len0}
  held: { L: false, R: false },
  retry: { L: 0, R: 0 },
  splash: 0,                            // >0: splash freeze countdown (seconds)
  hang: 0,                              // steps spent dead-hanging on a rope
  time: 0, steps: 0,
};
let tiltInput = 0;      // -1..1, composed from gyro/keys/__dbg each step
let simRunning = false;

const V = {  // scratch vectors (sim allocates nothing per step)
  a: new THREE.Vector3(), b: new THREE.Vector3(), c: new THREE.Vector3(),
};

function moveDir(out) {
  const vh = Math.hypot(P.vel.x, P.vel.z);
  if (vh > 4) out.set(P.vel.x / vh, 0, P.vel.z / vh);
  else out.set(Math.sin(P.heading), 0, Math.cos(P.heading));
  return out;
}
// HANDEDNESS LAW: for travel dir f, anatomical/screen right = (-f.z, 0, f.x)
// (same rule as a camera facing f). V2 shipped this mirrored — ALL lateral
// math must go through this helper, never inline the formula.
const RIGHT = { x: 0, z: 0 };
function rightOf(f) { RIGHT.x = -f.z; RIGHT.z = f.x; return RIGHT; }

// Pick the best anchor for a hand. side: -1 left, +1 right.
function pickAnchor(side) {
  const md = moveDir(V.a);
  const r = rightOf(md);
  const rx = r.x, rz = r.z;                // right vector of travel
  const cand = [];
  const x0 = Math.floor((P.pos.x - ANCHOR_R) / CELL), x1 = Math.floor((P.pos.x + ANCHOR_R) / CELL);
  const z0 = Math.floor((P.pos.z - ANCHOR_R) / CELL), z1 = Math.floor((P.pos.z + ANCHOR_R) / CELL);
  for (let cx = x0; cx <= x1; cx++) for (let cz = z0; cz <= z1; cz++) {
    const arr = aHash.get(hk(cx, cz));
    if (!arr) continue;
    for (const i of arr) {
      const a = anchors[i];
      const dx = a.x - P.pos.x, dy = a.y - P.pos.y, dz = a.z - P.pos.z;
      if (dy < 6) continue;                                  // must be meaningfully above
      const len = Math.sqrt(dx * dx + dy * dy + dz * dz);
      if (len > ANCHOR_R || len < 8) continue;
      const hd = Math.hypot(dx, dz) || 0.001;
      const elev = Math.atan2(dy, hd);
      if (elev < MIN_ELEV) continue;
      const fx = dx / hd, fz = dz / hd;
      const fwd = fx * md.x + fz * md.z;                     // ahead vs behind
      const sd = (fx * rx + fz * rz) * side;                 // matches this hand's side?
      let score = 2.2 * fwd + 0.8 * sd
                - 0.8 * Math.abs(len - LEN_IDEAL) / LEN_IDEAL
                - 0.5 * Math.abs(elev - 0.9) / 0.9;
      if (fwd < 0) score -= 2.5;                             // forward-only game: behind is a last resort
      cand.push({ i, score });
    }
  }
  // best candidate with a clear line of sight — never start a rope through a building
  cand.sort((a, b) => b.score - a.score);
  const eye = { x: P.pos.x, y: P.pos.y + 1.5, z: P.pos.z };
  for (let k = 0; k < Math.min(10, cand.length); k++) {
    const a = anchors[cand[k].i];
    if (!segBlocked(eye, a)) return a;
    wrapStats.losReject++;
  }
  return null;
}

function tryAttach(side) {
  const a = pickAnchor(side === 'L' ? -1 : 1);
  if (a) {
    const len = P.pos.distanceTo(a) * 0.96;   // slight initial tug
    P.ropes[side] = { pivots: [a], usedLen: 0, len, len0: len };
    return true;
  }
  // whiff: show a fizzle where the web aimed (offset to that hand's side)
  const md = moveDir(V.b);
  const r = rightOf(md), off = side === 'L' ? -3 : 3;
  puff.position.copy(P.pos).addScaledVector(md, 6).add(V.c.set(r.x * off, 8, r.z * off));
  puffT = 0.18;
  return false;
}

function leap() {
  P.grounded = false;
  P.coyote = 0;
  P.vel.y = Math.max(P.vel.y, JUMP_V);
  P.groundHold = 0;
}

function press(side) {
  P.held[side] = true;
  if (P.grounded || P.coyote > 0) {
    leap();                     // web-leap: jump now, rope attaches on the next steps
    P.retry[side] = 2;
  } else if (!P.ropes[side]) {
    if (!tryAttach(side)) P.retry[side] = 8;
  }
}
function release(side) {
  P.held[side] = false;
  P.ropes[side] = null;
}

function doSplash() {
  P.splash = 0.9;
  splashRing.position.set(P.pos.x, -1.4, P.pos.z);
  splashRing.scale.setScalar(1);
  splashRing.material.opacity = 0.9;
  document.getElementById('fade').style.opacity = 0.85;
}
function respawn() {
  // walk toward the island spine at this latitude (clamped off the tips)
  // until we're on a street (support 0, on land)
  const tz = zk(Math.min(20.5, Math.max(1, kmN(P.pos.z))));
  const p = V.a.set(P.pos.x, 0, P.pos.z);
  const dir = V.b.set(centerAt(tz) - p.x, 0, tz - p.z).normalize();
  for (let i = 0; i < 400; i++) {
    p.addScaledVector(dir, 10);
    if (insideIsland(p.x, p.z) && supportAt(p.x, p.z) === 0 && !inPark(p.x, p.z)) break;
  }
  P.pos.set(p.x, 0, p.z);
  P.heading = Math.atan2(dir.x, dir.z);
  P.vel.set(dir.x * RUN, 0, dir.z * RUN);
  P.grounded = true;
  P.ropes.L = P.ropes.R = null;
  document.getElementById('fade').style.opacity = 0;
}

function step(dt) {
  P.time += dt; P.steps++;
  if (bot.on) botThink();

  if (P.splash > 0) {
    P.splash -= dt;
    if (P.splash <= 0) respawn();
    return;
  }

  // held with no rope: keep retrying so swings chain as soon as an anchor appears
  for (const s of ['L', 'R']) {
    if (P.held[s] && !P.ropes[s] && !P.grounded) {
      if (--P.retry[s] <= 0) { tryAttach(s); P.retry[s] = 8; }
    }
  }
  // holding on the ground re-leaps automatically → chained swings by just holding
  if (P.grounded && (P.held.L || P.held.R)) {
    if (++P.groundHold > 0.22 / dt) leap();
  } else P.groundHold = 0;

  if (P.grounded) {
    // auto-run: heading steered by tilt, excess landing speed bleeds off, never below RUN
    P.heading -= tiltInput * TURN_RATE * dt;
    P.heading = ((P.heading + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI;
    let hs = Math.hypot(P.vel.x, P.vel.z);
    hs = Math.max(RUN, hs - RUN_DECEL * dt);
    P.vel.set(Math.sin(P.heading) * hs, 0, Math.cos(P.heading) * hs);
    P.coyote = COYOTE;
  } else {
    P.vel.y -= G * dt;
    // tilt = lateral force toward the right of travel
    const md = moveDir(V.a);
    const rt = rightOf(md);
    P.vel.x += rt.x * tiltInput * AIR_STEER * dt;
    P.vel.z += rt.z * tiltInput * AIR_STEER * dt;
    // swing pump: a taut web is never a dead hang — below PUMP_MAX the
    // pendulum is driven forward along travel, fading out as speed builds
    const sp = P.vel.length();
    if ((P.ropes.L || P.ropes.R) && sp < PUMP_MAX) {
      const w = 1 - sp / PUMP_MAX;
      P.vel.x += md.x * PUMP * w * dt;
      P.vel.z += md.z * PUMP * w * dt;
    }
    // and if we still end up dead-hanging (e.g. pinned on a wall), the web
    // snaps — you fall, and the held-retry immediately hunts a fresh anchor
    if ((P.ropes.L || P.ropes.R) && sp < 3) {
      if (++P.hang > HANG_SNAP / dt) {
        P.ropes.L = P.ropes.R = null;
        P.retry.L = P.retry.R = 20;
        P.hang = 0;
      }
    } else P.hang = 0;
    // quadratic drag
    if (sp > 1) P.vel.addScaledVector(P.vel, -DRAG_K * sp * dt);
    if (P.coyote > 0) P.coyote--;
  }

  P.pos.addScaledVector(P.vel, dt);

  // corner wrap / unwrap, once per rope per step. The rope is a pivot chain
  // anchor → bends → player; the pendulum constraint acts from the LAST pivot
  // with whatever length remains past the wrapped segments — wrapping shortens
  // the radius, so cutting a corner slingshots you around it.
  for (const s of ['L', 'R']) {
    const r = P.ropes[s];
    if (!r) continue;
    // unwrap: the straight line to the previous pivot is clear again
    while (r.pivots.length > 1) {
      const prev = r.pivots[r.pivots.length - 2];
      if (segBlocked(P.pos, prev)) break;
      const bend = r.pivots.pop();
      r.usedLen -= prev.distanceTo(bend);
      wrapStats.unwrap++;
    }
    // wrap: the line to the active pivot got cut by a building → bend there
    const piv = r.pivots[r.pivots.length - 1];
    const bend = findBend(P.pos, piv);
    if (bend) {
      r.usedLen += piv.distanceTo(bend);
      r.pivots.push(bend);
      wrapStats.wrap++;
    }
    // wound down to nothing (or hopelessly tangled) → the web snaps
    if (r.pivots.length > 5 || r.len - r.usedLen < 5.5) {
      P.ropes[s] = null;
      P.retry[s] = 20;
      wrapStats.snap++;
      continue;
    }
    // reel while taut — this is where swing energy comes from
    r.len = Math.max(Math.max(10, r.len0 * 0.5), r.usedLen + 6, r.len - REEL * dt);
  }
  // constraint: position projection + kill outward radial velocity
  for (let iter = 0; iter < 2; iter++) {
    for (const s of ['L', 'R']) {
      const r = P.ropes[s];
      if (!r) continue;
      const piv = r.pivots[r.pivots.length - 1];
      const d = V.a.subVectors(P.pos, piv);
      const dist = d.length();
      // ratchet: the rope takes up slack — you can rise toward the anchor but
      // never fall back below the closest approach. This is what makes a
      // street-level web-leap engage the pendulum instead of a dead hop.
      if (iter === 0) r.len = Math.max(r.usedLen + 6, Math.min(r.len, r.usedLen + dist));
      const eff = r.len - r.usedLen;
      if (dist > eff) {
        d.multiplyScalar(1 / dist);
        P.pos.addScaledVector(d, -(dist - eff));
        const vr = P.vel.dot(d);
        if (vr > 0) P.vel.addScaledVector(d, -vr);
      }
    }
  }

  // --- collision ---
  // Walls first, grounded or not: you can never be inside a building more
  // than a mantle-step below its roof. (V2 only ran this airborne — a street
  // runner entering a footprint teleported to the roof via the support snap.)
  for (const i of nearBuildings(P.pos.x, P.pos.z, 1)) {
    const b = buildings[i];
    const R = 0.45;
    if (P.pos.x > b.x0 - R && P.pos.x < b.x1 + R && P.pos.z > b.z0 - R && P.pos.z < b.z1 + R
        && P.pos.y < b.h - 1.0) {
      const pxl = P.pos.x - (b.x0 - R), pxr = (b.x1 + R) - P.pos.x;
      const pzl = P.pos.z - (b.z0 - R), pzr = (b.z1 + R) - P.pos.z;
      const m = Math.min(pxl, pxr, pzl, pzr);
      if (m === pxl)      { P.pos.x = b.x0 - R; if (P.vel.x > 0) P.vel.x = 0; }
      else if (m === pxr) { P.pos.x = b.x1 + R; if (P.vel.x < 0) P.vel.x = 0; }
      else if (m === pzl) { P.pos.z = b.z0 - R; if (P.vel.z > 0) P.vel.z = 0; }
      else                { P.pos.z = b.z1 + R; if (P.vel.z < 0) P.vel.z = 0; }
    }
  }
  const sup = supportAt(P.pos.x, P.pos.z);   // after pushout
  if (!P.grounded) {
    // land only when arriving from within a mantle-step of the surface —
    // never snap up from deep below (that read as teleporting)
    if (P.vel.y <= 0 && P.pos.y <= sup + 0.02 && P.pos.y > sup - 1.0) {
      P.pos.y = sup;
      P.grounded = true;
      P.ropes.L = P.ropes.R = null;        // ropes never drag you along the ground
      let hs = Math.hypot(P.vel.x, P.vel.z);
      if (P.vel.y < -30) hs *= 0.8;        // hard landing: roll, keep most momentum
      if (hs > 1) P.heading = Math.atan2(P.vel.x, P.vel.z);
      hs = Math.max(RUN, hs);
      P.vel.set(Math.sin(P.heading) * hs, 0, Math.cos(P.heading) * hs);
    }
  } else {
    if (sup < P.pos.y - 0.5) P.grounded = false;    // ran off an edge
    else if (sup <= P.pos.y + 1.0) P.pos.y = sup;   // flat ground / small step
    // anything taller than a step was already resolved by the wall pushout
  }

  // water
  if (P.pos.y < -1.2 || (!insideIsland(P.pos.x, P.pos.z) && P.pos.y < 0.5)) doSplash();
}

// ---------------------------------------------------------------------------
// BOT — attract mode / headless verification autopilot
// ---------------------------------------------------------------------------
const bot = { on: new URLSearchParams(location.search).has('bot'), side: 'R' };
function botThink() {
  // steer back toward the island spine when drifting toward a shore or a tip
  const md = moveDir(V.c);
  const t = kmN(P.pos.z), c = centerAt(P.pos.z), w = widthAt(P.pos.z);
  let want = 0;
  if (Math.abs(P.pos.x - c) > w * 0.38 || t < 0.8 || t > 20.8) {
    const tz = zk(Math.min(20, Math.max(1.5, t)));
    const r = rightOf(md);
    const dotR = r.x * (c - P.pos.x) + r.z * (tz - P.pos.z);   // >0: spine is to the right
    want = dotR > 0 ? 0.7 : -0.7;
  }
  tiltOverride = want;
  const anyRope = P.ropes.L || P.ropes.R;
  if (!anyRope && !P.grounded && P.vel.y < 2 && !P.held.L && !P.held.R) {
    bot.side = bot.side === 'L' ? 'R' : 'L';
    press(bot.side);
  } else if (anyRope && P.vel.y > 5) {
    release('L'); release('R');
  } else if (P.grounded && !P.held.L && !P.held.R && P.steps % 90 === 0) {
    press(bot.side);
  }
}

// ---------------------------------------------------------------------------
// INPUT — touch halves, gyro tilt, keyboard fallback
// ---------------------------------------------------------------------------
const pointers = new Map();   // pointerId → {side, x0, dx}
canvas.addEventListener('pointerdown', e => {
  if (!simRunning) return;
  e.preventDefault();
  const side = e.clientX < innerWidth / 2 ? 'L' : 'R';
  if (pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { side, x0: e.clientX, dx: 0 });
  press(side);
});
window.addEventListener('pointermove', e => {
  const p = pointers.get(e.pointerId);
  if (p) p.dx = e.clientX - p.x0;
});
function endPointer(e) {
  const p = pointers.get(e.pointerId);
  if (p) { pointers.delete(e.pointerId); if (![...pointers.values()].some(q => q.side === p.side)) release(p.side); }
}
window.addEventListener('pointerup', endPointer);
window.addEventListener('pointercancel', endPointer);
canvas.addEventListener('contextmenu', e => e.preventDefault());

let gyro = 0, gyroCal = null, gyroOn = false, gyroLive = false;
function onOrient(e) {
  if (e.gamma == null) return;
  if (!gyroLive) {   // first real reading: gyro exists and was permitted
    gyroLive = true;
    hintEl.textContent = 'HOLD LEFT / RIGHT SIDE TO WEB · TILT TO STEER';
  }
  if (gyroCal === null) gyroCal = e.gamma;
  gyro = Math.max(-1, Math.min(1, (e.gamma - gyroCal) / 22));
}
function enableTilt() {
  gyroCal = null;
  const go = () => { if (!gyroOn) { window.addEventListener('deviceorientation', onOrient); gyroOn = true; } };
  if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission)
    DeviceOrientationEvent.requestPermission().then(s => { if (s === 'granted') go(); }).catch(() => {});
  else go();
}

const keys = {};
window.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  if (!simRunning) return;
  if (e.code === 'KeyF') press('L');
  if (e.code === 'KeyJ') press('R');
  if (e.code === 'Space') { press('L'); press('R'); e.preventDefault(); }
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'KeyF') release('L');
  if (e.code === 'KeyJ') release('R');
  if (e.code === 'Space') { release('L'); release('R'); }
});

let tiltOverride = null;   // bot / __dbg steering
function readTilt() {
  if (tiltOverride !== null) return tiltOverride;
  let t = gyro;
  // no working gyro (permission denied, or no sensor): dragging a held thumb
  // sideways steers instead, so the game is never unsteerable
  if (!gyroLive) for (const p of pointers.values()) t += p.dx / (innerWidth * 0.3);
  if (keys['KeyA'] || keys['ArrowLeft']) t -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) t += 1;
  return Math.max(-1, Math.min(1, t));
}

// ---------------------------------------------------------------------------
// VISUALS — pose spidey, draw webs, chase camera
// ---------------------------------------------------------------------------
const pose = { armL: new THREE.Quaternion(), armR: new THREE.Quaternion(), legL: 0, legR: 0, pitch: 0 };
const Q = new THREE.Quaternion(), DOWN = new THREE.Vector3(0, -1, 0), TMP = new THREE.Vector3();

function aimLimbAt(limbGroup, targetWorld, out) {
  limbGroup.getWorldPosition(TMP);
  V.a.subVectors(targetWorld, TMP).normalize();
  // undo the character's world rotation so the quaternion is in spidey-local space
  V.a.applyQuaternion(Q.copy(spidey.quaternion).invert());
  out.setFromUnitVectors(DOWN, V.a);
}

function updateSpidey(dt) {
  spidey.position.copy(P.pos);
  const hs = Math.hypot(P.vel.x, P.vel.z);
  // yaw follows travel
  const yaw = P.grounded ? P.heading : (hs > 2 ? Math.atan2(P.vel.x, P.vel.z) : P.heading);
  const dy = ((yaw - spidey.rotation.y + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
  spidey.rotation.y += dy * Math.min(1, 12 * dt);
  // pitch: dive when falling, lean back on the rise
  let tp = 0;
  if (!P.grounded) tp = Math.max(-1.0, Math.min(1.0, Math.atan2(-P.vel.y, Math.max(hs, 8)) * 0.7));
  else tp = 0.12;   // slight run lean
  pose.pitch += (tp - pose.pitch) * Math.min(1, 8 * dt);
  spidey.rotation.x = pose.pitch;

  const k = Math.min(1, 10 * dt);
  if (P.grounded) {
    const ph = P.time * (6 + hs * 0.55);
    const swing = Math.sin(ph) * 0.85;
    pose.legL += (swing - pose.legL) * k;  pose.legR += (-swing - pose.legR) * k;
    legL.rotation.x = pose.legL; legR.rotation.x = pose.legR;
    Q.setFromEuler(new THREE.Euler(-swing * 0.9, 0, -0.06)); armR.quaternion.slerp(Q, k);
    Q.setFromEuler(new THREE.Euler(swing * 0.9, 0, 0.06));   armL.quaternion.slerp(Q, k);
  } else {
    // legs trail together, slightly bent
    pose.legL += (-0.5 - pose.legL) * k; pose.legR += (-0.62 - pose.legR) * k;
    legL.rotation.x = pose.legL; legR.rotation.x = pose.legR;
    for (const [s, arm] of [['L', armL], ['R', armR]]) {
      const r = P.ropes[s];
      if (r) { aimLimbAt(arm, r.pivots[r.pivots.length - 1], Q); arm.quaternion.slerp(Q, Math.min(1, 18 * dt)); }
      else { Q.setFromEuler(new THREE.Euler(-2.5, 0, s === 'L' ? 0.5 : -0.5)); arm.quaternion.slerp(Q, k); } // arms up, skydive
    }
  }

  // web lines: polyline anchor → bends → hand; sag only on an unbent rope
  for (const [s, arm] of [['L', armL], ['R', armR]]) {
    const line = webLines[s], r = P.ropes[s];
    if (!r) { line.visible = false; continue; }
    line.visible = true;
    const last = r.pivots[r.pivots.length - 1];
    arm.getWorldPosition(TMP);
    TMP.addScaledVector(V.a.subVectors(last, TMP).normalize(), 0.62);   // hand ≈ arm tip
    const posAttr = line.geometry.attributes.position;
    if (r.pivots.length === 1) {
      const dist = TMP.distanceTo(last);
      const slack = Math.max(0, r.len - dist) * 0.35;
      for (let i = 0; i <= 10; i++) {
        const t = i / 10;
        V.b.lerpVectors(last, TMP, t);
        V.b.y -= Math.sin(t * Math.PI) * slack;
        posAttr.setXYZ(i, V.b.x, V.b.y, V.b.z);
      }
    } else {
      // walk the pivot chain by arc length so the 11 samples hug every bend
      const nodes = [...r.pivots, TMP];
      const lens = [0];
      for (let i = 1; i < nodes.length; i++) lens.push(lens[i - 1] + nodes[i - 1].distanceTo(nodes[i]));
      const total = lens[nodes.length - 1] || 1;
      let seg = 1;
      for (let i = 0; i <= 10; i++) {
        const d = (i / 10) * total;
        while (seg < nodes.length - 1 && lens[seg] < d) seg++;
        const t = (d - lens[seg - 1]) / Math.max(0.001, lens[seg] - lens[seg - 1]);
        V.b.lerpVectors(nodes[seg - 1], nodes[seg], t);
        posAttr.setXYZ(i, V.b.x, V.b.y, V.b.z);
      }
    }
    posAttr.needsUpdate = true;
  }
}

const camPos = new THREE.Vector3(AV, 6, zk(6.5) - 18), camLook = new THREE.Vector3(AV, 2, zk(6.5));
let fov = 78;
function updateCamera(dt) {
  const md = moveDir(V.a);
  const sp = P.vel.length();
  const back = 6.5 + Math.min(3.5, sp * 0.045);
  V.b.copy(P.pos).addScaledVector(md, -back);
  V.b.y = P.pos.y + 3.1 + Math.max(0, -P.vel.y) * 0.02;
  // march from the player toward the desired spot and stop before any wall,
  // so the camera never buries itself inside a building
  for (let i = 1; i <= 8; i++) {
    TMP.lerpVectors(P.pos, V.b, i / 8);
    TMP.y += 1.4;
    if (supportAt(TMP.x, TMP.z) > TMP.y) {
      V.b.lerpVectors(P.pos, V.b, Math.max(1, i - 1) / 8);
      break;
    }
  }
  // and keep it above whatever roof it's over
  const camSup = supportAt(V.b.x, V.b.z);
  if (V.b.y < camSup + 1.5) V.b.y = camSup + 1.5;
  camPos.lerp(V.b, 1 - Math.exp(-5 * dt));
  V.c.copy(P.pos).addScaledVector(P.vel, 0.22);
  V.c.y = P.pos.y + 1.4 + P.vel.y * 0.1;
  camLook.lerp(V.c, 1 - Math.exp(-8 * dt));
  camera.position.copy(camPos);
  camera.lookAt(camLook);
  const tf = 78 + Math.min(16, sp * 0.28);
  fov += (tf - fov) * Math.min(1, 4 * dt);
  if (Math.abs(camera.fov - fov) > 0.01) { camera.fov = fov; camera.updateProjectionMatrix(); }
}

// ---------------------------------------------------------------------------
// LOOP
// ---------------------------------------------------------------------------
function viewH() {
  // iOS standalone under-reports the viewport height; the physical screen
  // doesn't lie (pixelrun's fix — pairs with the standalone CSS height rule).
  // NOTE: the innerWidth-vs-screen comparison assumes a portrait-locked app.
  if (navigator.standalone && screen && screen.width) {
    const sMin = Math.min(screen.width, screen.height), sMax = Math.max(screen.width, screen.height);
    return innerWidth <= sMin ? sMax : sMin;
  }
  return innerHeight;
}
function resize() {
  const h = viewH();
  renderer.setSize(innerWidth, h, false);
  camera.aspect = innerWidth / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();
setTimeout(resize, 350);    // iOS standalone reports the real viewport late
setTimeout(resize, 1200);   // …and sometimes very late

const speedEl = document.querySelector('#speed b');
const hintEl = document.getElementById('hint');
let acc = 0, last = 0, hudT = 0, hintT = 0;

function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min(0.1, (now - last) / 1000 || 0);
  last = now;
  if (simRunning) {
    tiltInput = readTilt();
    acc += dt;
    let n = 0;
    while (acc >= SDT && n < 12) { step(SDT); acc -= SDT; n++; }
    if (n === 12) acc = 0;
  }
  updateSpidey(dt);
  updateCamera(dt);

  if (puffT > 0) { puffT -= dt; puff.material.opacity = Math.max(0, puffT / 0.18) * 0.8; }
  if (splashRing.material.opacity > 0) {
    splashRing.material.opacity -= dt * 1.4;
    splashRing.scale.multiplyScalar(1 + dt * 6);
  }
  hudT += dt;
  if (hudT > 0.12) {
    hudT = 0;
    speedEl.textContent = Math.round(P.vel.length() * 2.237);
    drawMini();
  }
  if (simRunning && (hintT += dt) > 6 && hintEl.style.opacity !== '0') hintEl.style.opacity = '0';

  renderer.render(scene, camera);
}
requestAnimationFrame(frame);

function start() {
  if (simRunning) return;
  simRunning = true;
  document.getElementById('title').style.display = 'none';
}
document.getElementById('startBtn').addEventListener('click', () => { enableTilt(); start(); });
if (bot.on || new URLSearchParams(location.search).has('autostart')) start();

// ---------------------------------------------------------------------------
// DEBUG HARNESS
// ---------------------------------------------------------------------------
window.__dbg = {
  errors: window.__errs,
  bootMs: Math.round(performance.now() - BOOT_T0),
  P, buildings, anchors, bot,
  start,
  stepN(n) { for (let i = 0; i < n; i++) step(SDT); return this.snapshot(); },
  snapshot() {
    return {
      pos: P.pos.toArray().map(v => +v.toFixed(2)),
      vel: P.vel.toArray().map(v => +v.toFixed(2)),
      speed: +P.vel.length().toFixed(2),
      grounded: P.grounded,
      ropes: { L: P.ropes.L ? P.ropes.L.pivots.length : 0, R: P.ropes.R ? P.ropes.R.pivots.length : 0 },
      wrapStats: { ...wrapStats },
      held: { ...P.held },
      splash: P.splash > 0,
      steps: P.steps,
    };
  },
  press, release,
  tilt(v) { tiltOverride = v; },
  clearTilt() { tiltOverride = null; },
  supportAt, pickAnchor, segBlocked, wrapStats,
  resetWrapStats() { wrapStats.wrap = wrapStats.unwrap = wrapStats.snap = wrapStats.losReject = 0; },
};

// ---------------------------------------------------------------------------
// SERVICE WORKER (shell-only; ?nosw=1 skips for local testing)
// ---------------------------------------------------------------------------
if ('serviceWorker' in navigator && !new URLSearchParams(location.search).has('nosw')) {
  addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
