<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Pixels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .canvas-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            min-height: 0;
        }

        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(25, 1fr);
            grid-template-rows: repeat(25, 1fr);
            background: #111;
            border: 2px solid #333;
            border-radius: 4px;
            aspect-ratio: 1;
            width: 100%;
            max-height: 100%;
            -webkit-user-select: none;
            user-select: none;
        }

        .pixel {
            border: 0.5px solid rgba(255,255,255,0.05);
            background: repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 8px 8px;
        }

        .pixel.painted {
            background: #111;
        }

        .toolbar {
            flex-shrink: 0;
            padding: 10px 12px 10px;
            background: #16213e;
            border-top: 1px solid #333;
        }

        .color-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .color-swatch:active {
            transform: scale(0.9);
        }

        .color-swatch.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pixels</h1>
    </div>

    <div class="canvas-wrapper">
        <div class="pixel-grid" id="grid"></div>
    </div>

    <div class="toolbar">
        <div class="color-row" id="palette"></div>
    </div>

    <script>
        const API_BASE = 'https://worker.polkiewicz.com';
        const GRID_SIZE = 25;
        const COLORS = [
            '#000000', '#ff4444', '#ff9900', '#ffdd00',
            '#44cc44', '#2299ff', '#9944ff', '#ff44aa',
            '#ffffff', '#888888', '#664422', '#00cccc'
        ];
        const EMPTY = '#111';

        let grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(EMPTY));
        let selectedColor = COLORS[0];
        let painting = false;
        let strokeChanges = null;

        const gridEl = document.getElementById('grid');
        const paletteEl = document.getElementById('palette');

        // Build grid
        const cells = [];
        for (let y = 0; y < GRID_SIZE; y++) {
            cells[y] = [];
            for (let x = 0; x < GRID_SIZE; x++) {
                const cell = document.createElement('div');
                cell.className = 'pixel';
                cell.dataset.x = x;
                cell.dataset.y = y;
                gridEl.appendChild(cell);
                cells[y][x] = cell;
            }
        }

        // Build palette
        COLORS.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'color-swatch';
            if (color === selectedColor) swatch.classList.add('selected');
            swatch.style.background = color;
            if (color === '#000000') {
                swatch.style.border = '2px solid #444';
                if (swatch.classList.contains('selected')) {
                    swatch.style.borderColor = '#fff';
                }
            }
            swatch.addEventListener('click', () => {
                selectedColor = color;
                updatePaletteSelection();
            });
            paletteEl.appendChild(swatch);
        });

        function updatePaletteSelection() {
            document.querySelectorAll('.color-swatch').forEach((s, i) => {
                const isSelected = COLORS[i] === selectedColor;
                s.classList.toggle('selected', isSelected);
                if (COLORS[i] === '#000000') {
                    s.style.borderColor = isSelected ? '#fff' : '#444';
                }
            });
        }

        function setCellColor(cell, color) {
            if (color === EMPTY) {
                cell.classList.remove('painted');
                cell.style.background = '';
            } else {
                cell.classList.add('painted');
                cell.style.background = color;
            }
        }

        function paintCell(x, y) {
            const color = selectedColor;
            if (grid[y][x] === color) return;

            if (!strokeChanges) strokeChanges = {};
            const key = `${x},${y}`;
            if (!(key in strokeChanges)) {
                strokeChanges[key] = { x, y };
            }

            grid[y][x] = color;
            setCellColor(cells[y][x], color);
        }

        function commitStroke() {
            if (!strokeChanges) return;
            const changes = Object.values(strokeChanges).map(c => ({
                x: c.x, y: c.y, color: grid[c.y][c.x]
            }));
            strokeChanges = null;
            if (changes.length === 0) return;

            fetch(`${API_BASE}/pixels`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ changes })
            }).catch(() => {});
        }

        function renderGrid(serverGrid) {
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    grid[y][x] = serverGrid[y][x];
                    setCellColor(cells[y][x], serverGrid[y][x]);
                }
            }
        }

        function loadGrid() {
            fetch(`${API_BASE}/pixels`)
                .then(r => r.json())
                .then(data => {
                    if (data.grid) renderGrid(data.grid);
                })
                .catch(() => {});
        }

        function getCellFromPoint(clientX, clientY) {
            const el = document.elementFromPoint(clientX, clientY);
            if (el && el.classList.contains('pixel')) {
                return { x: parseInt(el.dataset.x), y: parseInt(el.dataset.y) };
            }
            return null;
        }

        // Pointer events
        gridEl.addEventListener('pointerdown', e => {
            e.preventDefault();
            painting = true;
            strokeChanges = null;
            const cell = getCellFromPoint(e.clientX, e.clientY);
            if (cell) paintCell(cell.x, cell.y);
        });

        document.addEventListener('pointermove', e => {
            if (!painting) return;
            e.preventDefault();
            const cell = getCellFromPoint(e.clientX, e.clientY);
            if (cell) paintCell(cell.x, cell.y);
        });

        document.addEventListener('pointerup', e => {
            if (!painting) return;
            painting = false;
            commitStroke();
        });

        document.addEventListener('pointercancel', () => {
            if (!painting) return;
            painting = false;
            commitStroke();
        });

        // Prevent pinch-to-zoom (iOS ignores user-scalable=no)
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('gesturechange', e => e.preventDefault());
        document.addEventListener('gestureend', e => e.preventDefault());

        // Load shared canvas on start
        loadGrid();
    </script>
</body>
</html>
