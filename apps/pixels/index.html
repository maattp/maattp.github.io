<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Pixels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #eee;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .header-btn:active {
            background: rgba(255,255,255,0.2);
        }

        .header-btn:disabled {
            opacity: 0.3;
        }

        .canvas-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            min-height: 0;
        }

        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(25, 1fr);
            grid-template-rows: repeat(25, 1fr);
            background: #111;
            border: 2px solid #333;
            border-radius: 4px;
            aspect-ratio: 1;
            width: 100%;
            max-height: 100%;
            -webkit-user-select: none;
            user-select: none;
        }

        .pixel {
            border: 0.5px solid rgba(255,255,255,0.05);
            background: #111;
        }

        .toolbar {
            flex-shrink: 0;
            padding: 10px 12px 10px;
            background: #16213e;
            border-top: 1px solid #333;
        }

        .color-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .color-swatch:active {
            transform: scale(0.9);
        }

        .color-swatch.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }

        .eraser-swatch {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.1s;
            position: relative;
            overflow: hidden;
        }

        .eraser-swatch::before {
            content: '';
            position: absolute;
            inset: 2px;
            background: repeating-conic-gradient(#999 0% 25%, #555 0% 50%) 0 0 / 8px 8px;
            border-radius: 4px;
        }

        .eraser-swatch::after {
            content: '✕';
            position: relative;
            z-index: 1;
            font-size: 16px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .eraser-swatch:active {
            transform: scale(0.9);
        }

        .eraser-swatch.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pixels</h1>
        <div class="header-actions">
            <button class="header-btn" id="undo-btn" disabled title="Undo">↩</button>
            <button class="header-btn" id="redo-btn" disabled title="Redo">↪</button>
            <button class="header-btn" id="clear-btn" title="Clear">🗑</button>
        </div>
    </div>

    <div class="canvas-wrapper">
        <div class="pixel-grid" id="grid"></div>
    </div>

    <div class="toolbar">
        <div class="color-row" id="palette"></div>
    </div>

    <script>
        const GRID_SIZE = 25;
        const COLORS = [
            '#111111', '#ff4444', '#ff9900', '#ffdd00',
            '#44cc44', '#2299ff', '#9944ff', '#ff44aa',
            '#ffffff', '#888888', '#664422', '#00cccc'
        ];
        const EMPTY = '#111';

        let grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(EMPTY));
        let selectedColor = COLORS[0];
        let isEraser = false;
        let undoStack = [];
        let redoStack = [];
        let painting = false;
        let strokeChanges = null; // tracks pixels changed during a single stroke

        const gridEl = document.getElementById('grid');
        const paletteEl = document.getElementById('palette');
        const undoBtn = document.getElementById('undo-btn');
        const redoBtn = document.getElementById('redo-btn');
        const clearBtn = document.getElementById('clear-btn');

        // Build grid
        const cells = [];
        for (let y = 0; y < GRID_SIZE; y++) {
            cells[y] = [];
            for (let x = 0; x < GRID_SIZE; x++) {
                const cell = document.createElement('div');
                cell.className = 'pixel';
                cell.dataset.x = x;
                cell.dataset.y = y;
                gridEl.appendChild(cell);
                cells[y][x] = cell;
            }
        }

        // Build palette
        COLORS.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'color-swatch';
            if (color === selectedColor && !isEraser) swatch.classList.add('selected');
            swatch.style.background = color;
            if (color === '#111111') {
                swatch.style.border = '2px solid #444';
                if (swatch.classList.contains('selected')) {
                    swatch.style.borderColor = '#fff';
                }
            }
            swatch.addEventListener('click', () => {
                selectedColor = color;
                isEraser = false;
                updatePaletteSelection();
            });
            paletteEl.appendChild(swatch);
        });

        // Add eraser
        const eraserEl = document.createElement('div');
        eraserEl.className = 'eraser-swatch';
        eraserEl.addEventListener('click', () => {
            isEraser = true;
            updatePaletteSelection();
        });
        paletteEl.appendChild(eraserEl);

        function updatePaletteSelection() {
            document.querySelectorAll('.color-swatch').forEach((s, i) => {
                const isSelected = !isEraser && COLORS[i] === selectedColor;
                s.classList.toggle('selected', isSelected);
                if (COLORS[i] === '#111111') {
                    s.style.borderColor = isSelected ? '#fff' : '#444';
                }
            });
            eraserEl.classList.toggle('selected', isEraser);
        }

        function paintCell(x, y) {
            const color = isEraser ? EMPTY : selectedColor;
            if (grid[y][x] === color) return;

            if (!strokeChanges) strokeChanges = {};
            const key = `${x},${y}`;
            // Only record the original color on first touch of this pixel in the stroke
            if (!(key in strokeChanges)) {
                strokeChanges[key] = { x, y, from: grid[y][x] };
            }

            grid[y][x] = color;
            cells[y][x].style.background = color;
        }

        function commitStroke() {
            if (!strokeChanges) return;
            const changes = Object.values(strokeChanges);
            if (changes.length === 0) { strokeChanges = null; return; }

            // Record the 'to' color for each change
            changes.forEach(c => c.to = grid[c.y][c.x]);

            undoStack.push(changes);
            redoStack = [];
            updateUndoRedoButtons();
            strokeChanges = null;
        }

        function undo() {
            if (undoStack.length === 0) return;
            const changes = undoStack.pop();
            changes.forEach(c => {
                grid[c.y][c.x] = c.from;
                cells[c.y][c.x].style.background = c.from;
            });
            redoStack.push(changes);
            updateUndoRedoButtons();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const changes = redoStack.pop();
            changes.forEach(c => {
                grid[c.y][c.x] = c.to;
                cells[c.y][c.x].style.background = c.to;
            });
            undoStack.push(changes);
            updateUndoRedoButtons();
        }

        function clearGrid() {
            // Build changes for undo
            const changes = [];
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (grid[y][x] !== EMPTY) {
                        changes.push({ x, y, from: grid[y][x], to: EMPTY });
                    }
                }
            }
            if (changes.length === 0) return;

            undoStack.push(changes);
            redoStack = [];

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    grid[y][x] = EMPTY;
                    cells[y][x].style.background = EMPTY;
                }
            }
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            undoBtn.disabled = undoStack.length === 0;
            redoBtn.disabled = redoStack.length === 0;
        }

        function getCellFromPoint(clientX, clientY) {
            const el = document.elementFromPoint(clientX, clientY);
            if (el && el.classList.contains('pixel')) {
                return { x: parseInt(el.dataset.x), y: parseInt(el.dataset.y) };
            }
            return null;
        }

        // Pointer events for cross-platform support
        gridEl.addEventListener('pointerdown', e => {
            e.preventDefault();
            painting = true;
            strokeChanges = null;
            const cell = getCellFromPoint(e.clientX, e.clientY);
            if (cell) paintCell(cell.x, cell.y);
        });

        document.addEventListener('pointermove', e => {
            if (!painting) return;
            e.preventDefault();
            const cell = getCellFromPoint(e.clientX, e.clientY);
            if (cell) paintCell(cell.x, cell.y);
        });

        document.addEventListener('pointerup', e => {
            if (!painting) return;
            painting = false;
            commitStroke();
        });

        document.addEventListener('pointercancel', () => {
            if (!painting) return;
            painting = false;
            commitStroke();
        });

        undoBtn.addEventListener('click', undo);
        redoBtn.addEventListener('click', redo);
        clearBtn.addEventListener('click', clearGrid);
    </script>
</body>
</html>
