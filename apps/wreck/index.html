<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#8ed4f7">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Wreck &amp; Ruin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #8ed4f7;
    font-family: "Avenir Next", "Trebuchet MS", system-ui, -apple-system, sans-serif;
    color: #fff; -webkit-user-select: none; user-select: none; touch-action: none; }
  canvas#gl { position: fixed; inset: 0; display: block; touch-action: none; }

  /* ---------- HUD ---------- */
  #hud { position: fixed; inset: 0; pointer-events: none; display: none; z-index: 20; }
  #hud.on { display: block; }
  .chip { position: absolute; background: rgba(20,26,40,0.55); border-radius: 14px;
    padding: 8px 14px; font-weight: 800; letter-spacing: .5px; font-size: 17px;
    text-shadow: 0 2px 0 rgba(0,0,0,.25); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  #scoreChip { top: calc(env(safe-area-inset-top) + 10px); left: 50%; transform: translateX(-50%);
    font-size: 21px; min-width: 130px; text-align: center; }
  #coinChip { top: calc(env(safe-area-inset-top) + 10px); left: calc(env(safe-area-inset-left) + 12px); color: #ffd94a; }
  #comboChip { top: calc(env(safe-area-inset-top) + 52px); left: 50%; transform: translateX(-50%);
    color: #ffd94a; font-size: 16px; padding: 4px 12px; opacity: 0; transition: opacity .2s; }
  #comboChip.on { opacity: 1; }
  #pauseBtn { position: absolute; top: calc(env(safe-area-inset-top) + 10px);
    right: calc(env(safe-area-inset-right) + 12px); pointer-events: auto;
    width: 44px; height: 40px; text-align: center; line-height: 26px; font-size: 18px; }

  /* floating score popups */
  .pop { position: absolute; font-weight: 900; font-size: 20px; color: #fff;
    text-shadow: 0 2px 0 rgba(0,0,0,.4); pointer-events: none; white-space: nowrap;
    transform: translate(-50%, -50%); animation: popUp 1.1s ease-out forwards; }
  .pop.big { font-size: 30px; color: #ffd94a; }
  @keyframes popUp { 0% { opacity: 0; margin-top: 6px; } 12% { opacity: 1; }
    100% { opacity: 0; margin-top: -52px; } }

  /* ---------- touch sticks ---------- */
  .stick { position: absolute; bottom: calc(env(safe-area-inset-bottom) + 26px);
    width: 124px; height: 124px; border-radius: 50%; background: rgba(20,26,40,0.35);
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.22); pointer-events: auto; }
  #stickL { left: calc(env(safe-area-inset-left) + 26px); }
  #stickR { right: calc(env(safe-area-inset-right) + 26px); }
  .nub { position: absolute; left: 50%; top: 50%; width: 54px; height: 54px; border-radius: 50%;
    background: rgba(255,255,255,.85); box-shadow: 0 4px 10px rgba(0,0,0,.3);
    transform: translate(-50%, -50%); }
  .stickTag { position: absolute; left: 50%; top: -22px; transform: translateX(-50%);
    font-size: 11px; font-weight: 800; letter-spacing: 2px; opacity: .75; text-shadow: 0 1px 0 rgba(0,0,0,.4); }

  /* ---------- screens ---------- */
  .screen { position: fixed; inset: 0; z-index: 40; display: none; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: calc(env(safe-area-inset-top) + 16px) calc(env(safe-area-inset-right) + 20px)
             calc(env(safe-area-inset-bottom) + 16px) calc(env(safe-area-inset-left) + 20px); }
  .screen.show { display: flex; }
  #title { background: linear-gradient(180deg, rgba(30,40,70,.25), rgba(10,14,28,.55)); }
  .logo { font-weight: 900; line-height: .92; letter-spacing: 1px;
    font-size: clamp(40px, 11vh, 84px); color: #ffd94a;
    text-shadow: 0 3px 0 #b8860b, 0 8px 24px rgba(0,0,0,.45); }
  .logo .amp { color: #fff; text-shadow: 0 3px 0 #8a8f99, 0 8px 24px rgba(0,0,0,.45); }
  .tagline { margin-top: 8px; font-size: clamp(11px, 2.4vh, 15px); letter-spacing: 4px;
    font-weight: 700; opacity: .85; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,.5); }
  .btn { pointer-events: auto; cursor: pointer; border: none; font-family: inherit;
    font-weight: 800; letter-spacing: 1px; color: #3a2b00;
    background: linear-gradient(180deg, #ffe27a, #ffb400); padding: 14px 34px;
    border-radius: 16px; font-size: 19px; box-shadow: 0 6px 0 #b8860b, 0 12px 24px rgba(0,0,0,.35);
    text-transform: uppercase; }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
  .btn.ghost { background: rgba(255,255,255,.14); color: #fff; box-shadow: 0 6px 0 rgba(0,0,0,.35); }
  .btn.small { font-size: 14px; padding: 10px 22px; border-radius: 12px; }
  .btn-row { display: flex; gap: 16px; margin-top: 26px; flex-wrap: wrap; justify-content: center; }
  .statline { margin-top: 18px; font-weight: 700; font-size: 15px; color: #ffd94a;
    text-shadow: 0 2px 4px rgba(0,0,0,.5); }
  .hint { margin-top: 14px; font-size: 12px; opacity: .8; letter-spacing: 1px; line-height: 1.8; }
  #ver { position: absolute; right: calc(env(safe-area-inset-right) + 10px);
    bottom: calc(env(safe-area-inset-bottom) + 8px); font-size: 11px; opacity: .55; font-weight: 700; }

  /* ---------- garage ---------- */
  #garage { background: rgba(10,14,28,.82); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  #garage h2 { font-size: 26px; letter-spacing: 2px; color: #ffd94a; text-shadow: 0 2px 0 rgba(0,0,0,.4); }
  #garageCoins { margin: 6px 0 10px; font-weight: 800; color: #ffd94a; }
  #cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 92vw;
    max-height: 58vh; overflow-y: auto; pointer-events: auto; padding: 4px; }
  .card { width: 148px; background: rgba(255,255,255,.08); border-radius: 14px; padding: 12px 10px;
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,.14); }
  .card.equipped { box-shadow: inset 0 0 0 2.5px #ffd94a; }
  .card .nm { font-weight: 800; font-size: 14px; }
  .card .ds { font-size: 11px; opacity: .75; margin: 5px 0 9px; min-height: 28px; line-height: 1.4; }
  .card button { width: 100%; pointer-events: auto; }

  /* ---------- pause ---------- */
  #pause { background: rgba(10,14,28,.7); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }

  /* ---------- rotate gate ---------- */
  #rotate { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column; gap: 14px;
    align-items: center; justify-content: center; background: #10141f; font-weight: 800;
    font-size: 18px; letter-spacing: 1px; }
  #rotate .ph { font-size: 54px; animation: spinPh 1.6s ease-in-out infinite; }
  @keyframes spinPh { 0%, 20% { transform: rotate(0); } 60%, 100% { transform: rotate(90deg); } }
  @media (orientation: portrait) { #rotate { display: flex; } }

  #err { display: none; position: fixed; inset: 0; z-index: 999; padding: 22px; overflow: auto;
    background: rgba(12,8,20,.96); color: #ff8a8a; font: 12px/1.5 ui-monospace, Menlo, monospace;
    white-space: pre-wrap; }
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div id="hud">
  <div class="chip" id="coinChip">🪙 0</div>
  <div class="chip" id="scoreChip">0</div>
  <div class="chip" id="comboChip">COMBO ×1</div>
  <div class="chip" id="pauseBtn">II</div>
  <div class="stick" id="stickL"><div class="nub"></div><div class="stickTag">DRIVE</div></div>
  <div class="stick" id="stickR"><div class="nub"></div><div class="stickTag">CRANE</div></div>
</div>

<div class="screen show" id="title">
  <div class="logo">WRECK<br><span class="amp">&amp;</span> RUIN</div>
  <div class="tagline">Endless demolition company</div>
  <div class="btn-row">
    <button class="btn" id="playBtn">Start Wrecking</button>
    <button class="btn ghost" id="garageBtn">Garage</button>
  </div>
  <div class="statline" id="titleStats"></div>
  <div class="hint">LEFT STICK: DRIVE &nbsp;·&nbsp; RIGHT STICK: SWING + WINCH<br>
    CONTROLLER: STICKS + TRIGGERS &nbsp;·&nbsp; KEYS: WASD + ARROWS</div>
  <div id="ver">V1</div>
</div>

<div class="screen" id="garage">
  <h2>GARAGE</h2>
  <div id="garageCoins"></div>
  <div id="cards"></div>
  <div class="btn-row"><button class="btn small ghost" id="garageBack">Back</button></div>
</div>

<div class="screen" id="pause">
  <div class="logo" style="font-size:34px">PAUSED</div>
  <div class="btn-row">
    <button class="btn" id="resumeBtn">Resume</button>
    <button class="btn ghost" id="quitBtn">Title</button>
  </div>
</div>

<div id="rotate"><div class="ph">📱</div>ROTATE YOUR PHONE<br><span style="opacity:.6;font-size:13px">demolition is a landscape job</span></div>
<div id="err"></div>

<script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
  "rapier": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.19.3/rapier.mjs"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import RAPIER from 'rapier';

const VERSION = 1;   // bump once per PR (see CLAUDE.md)
try {

// ===================================================================
//  helpers
// ===================================================================
const $ = id => document.getElementById(id);
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
function mulberry32(seed) {
  let a = seed >>> 0;
  return () => {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const load = (k, d) => { try { const v = localStorage.getItem('wreck_' + k); return v === null ? d : JSON.parse(v); } catch (e) { return d; } };
const store = (k, v) => { try { localStorage.setItem('wreck_' + k, JSON.stringify(v)); } catch (e) {} };

// ===================================================================
//  economy / upgrades
// ===================================================================
const BALLS = [
  { id: 'iron',  nm: 'CAST IRON',      ds: 'The classic. Reliable, round, angry.', cost: 0,    r: 1.5, density: 4,  color: 0x3a4048, coinMul: 1 },
  { id: 'big',   nm: 'BIG BERTHA',     ds: 'Half a ton of extra persuasion.',      cost: 600,  r: 2.1, density: 5,  color: 0x51322a, coinMul: 1 },
  { id: 'spike', nm: 'SPIKE STAR',     ds: 'Bites into walls. Shatters on impact.', cost: 1400, r: 1.6, density: 4.5, color: 0x6e6e78, coinMul: 1, spike: true },
  { id: 'gold',  nm: 'GOLD GOLIATH',   ds: 'Heaviest. Shiniest. +50% coins.',      cost: 3200, r: 2.3, density: 6,  color: 0xffc24a, coinMul: 1.5 },
];
const CHAINS = [
  { id: 'chain1', nm: 'WORKS CHAIN',   ds: '8m of honest steel.',   cost: 0,   links: 7 },
  { id: 'chain2', nm: 'LONG CHAIN',    ds: '11m. Wider arcs, bigger swings.', cost: 500, links: 10 },
  { id: 'chain3', nm: 'CRANE KING',    ds: '14m. Wrecking-ball artillery.',   cost: 1100, links: 13 },
];
const ENGINES = [
  { id: 'eng1', nm: 'DIESEL 4',  ds: 'Gets you there. Eventually.', cost: 0,   speed: 11, accel: 14 },
  { id: 'eng2', nm: 'TURBO 8',   ds: 'Site-to-site in style.',      cost: 550, speed: 15, accel: 20 },
  { id: 'eng3', nm: 'MONSTER V12', ds: 'The truck becomes the weapon.', cost: 1300, speed: 20, accel: 28 },
];
const WINCHES = [
  { id: 'win1', nm: 'HAND WINCH', ds: 'Steady up, steady down.', cost: 0,   speed: 4.5 },
  { id: 'win2', nm: 'HYDRAULIC',  ds: 'Snappy height control.',  cost: 400, speed: 8 },
];
const SHOP = [
  { label: 'WRECKING BALLS', items: BALLS, slot: 'ball' },
  { label: 'CHAINS', items: CHAINS, slot: 'chain' },
  { label: 'ENGINES', items: ENGINES, slot: 'engine' },
  { label: 'WINCHES', items: WINCHES, slot: 'winch' },
];
const eco = {
  coins: load('coins', 0),
  best: load('best', 0),
  owned: new Set(load('owned', ['iron', 'chain1', 'eng1', 'win1'])),
  equip: Object.assign({ ball: 'iron', chain: 'chain1', engine: 'eng1', winch: 'win1' }, load('equip', {})),
};
const equipped = slot => SHOP.find(s => s.slot === slot).items.find(i => i.id === eco.equip[slot]) ||
  SHOP.find(s => s.slot === slot).items[0];
function saveEco() {
  store('coins', eco.coins); store('best', eco.best);
  store('owned', [...eco.owned]); store('equip', eco.equip);
}

// ===================================================================
//  audio — synthesized, unlocked on first gesture
// ===================================================================
const audio = { ctx: null, master: null, engineOsc: null, engineGain: null, muted: false };
function unlockAudio() {
  if (audio.ctx) { if (audio.ctx.state === 'suspended') audio.ctx.resume(); return; }
  try {
    const C = window.AudioContext || window.webkitAudioContext;
    audio.ctx = new C();
    audio.master = audio.ctx.createGain(); audio.master.gain.value = 0.5;
    audio.master.connect(audio.ctx.destination);
    // engine: filtered saw whose pitch follows speed
    const osc = audio.ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = 42;
    const lp = audio.ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 220; lp.Q.value = 2;
    const g = audio.ctx.createGain(); g.gain.value = 0;
    osc.connect(lp); lp.connect(g); g.connect(audio.master); osc.start();
    audio.engineOsc = osc; audio.engineGain = g;
  } catch (e) {}
}
function thump(force) {   // impact: noise burst + sub thump, scaled by force
  if (!audio.ctx) return;
  const t = audio.ctx.currentTime, k = clamp(force, 0, 1);
  const dur = 0.12 + 0.25 * k;
  const buf = audio.ctx.createBuffer(1, audio.ctx.sampleRate * dur, audio.ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
  const src = audio.ctx.createBufferSource(); src.buffer = buf;
  const f = audio.ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 400 + 2400 * k;
  const g = audio.ctx.createGain(); g.gain.value = 0.14 + 0.5 * k;
  src.connect(f); f.connect(g); g.connect(audio.master); src.start();
  const o = audio.ctx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(90 + 60 * k, t); o.frequency.exponentialRampToValueAtTime(34, t + dur);
  const og = audio.ctx.createGain();
  og.gain.setValueAtTime(0.5 * k + 0.1, t); og.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(og); og.connect(audio.master); o.start(t); o.stop(t + dur);
}
function chime(n) {   // coin / ui blips
  if (!audio.ctx) return;
  const t = audio.ctx.currentTime;
  const o = audio.ctx.createOscillator(); o.type = 'square'; o.frequency.value = n;
  const g = audio.ctx.createGain();
  g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
  o.connect(g); g.connect(audio.master); o.start(t); o.stop(t + 0.17);
}
const sfx = {
  ui: () => chime(660), coin: () => chime(1240), buy: () => { chime(880); setTimeout(() => chime(1320), 90); },
  deny: () => chime(180),
};

// ===================================================================
//  input — touch sticks + keyboard + gamepad, merged into one ctrl
// ===================================================================
const ctrl = { throttle: 0, steer: 0, slew: 0, winch: 0 };
const sticks = { L: { id: -1, x: 0, y: 0 }, R: { id: -1, x: 0, y: 0 } };
function bindStick(el, s) {
  const nub = el.querySelector('.nub');
  const setNub = () => { nub.style.transform = `translate(calc(-50% + ${s.x * 34}px), calc(-50% + ${s.y * 34}px))`; };
  const move = t => {
    const r = el.getBoundingClientRect();
    s.x = clamp((t.clientX - (r.left + r.width / 2)) / (r.width * 0.38), -1, 1);
    s.y = clamp((t.clientY - (r.top + r.height / 2)) / (r.height * 0.38), -1, 1);
    setNub();
  };
  el.addEventListener('touchstart', e => {
    e.preventDefault(); unlockAudio();
    if (s.id === -1) { s.id = e.changedTouches[0].identifier; move(e.changedTouches[0]); }
  }, { passive: false });
  window.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) if (t.identifier === s.id) { e.preventDefault(); move(t); }
  }, { passive: false });
  const end = e => {
    for (const t of e.changedTouches) if (t.identifier === s.id) { s.id = -1; s.x = s.y = 0; setNub(); }
  };
  window.addEventListener('touchend', end); window.addEventListener('touchcancel', end);
  // mouse fallback for desktop testing
  el.addEventListener('mousedown', e => { s.id = 99; move(e); });
  window.addEventListener('mousemove', e => { if (s.id === 99) move(e); });
  window.addEventListener('mouseup', () => { if (s.id === 99) { s.id = -1; s.x = s.y = 0; setNub(); } });
}
bindStick($('stickL'), sticks.L);
bindStick($('stickR'), sticks.R);

const keys = {};
window.addEventListener('keydown', e => {
  if (e.repeat) return;   // held P must not ping-pong pause/resume
  keys[e.code] = true;
  if (e.code === 'KeyP' || e.code === 'Escape') {
    if (state === 'play') pauseGame();
    else if (state === 'pause') resumeGame();
    else if ($('garage').classList.contains('show')) $('garageBack').click();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

const pad = { prev: {}, on: false };
function padPoll() {
  if (!navigator.getGamepads) return null;
  for (const g of navigator.getGamepads()) if (g && g.connected && g.buttons.length) { pad.on = true; return g; }
  return null;
}
function readInput() {
  // touch
  let th = -sticks.L.y, st = sticks.L.x, sl = sticks.R.x, wi = -sticks.R.y;
  // keys
  if (keys.KeyW) th += 1; if (keys.KeyS) th -= 1;
  if (keys.KeyD) st += 1; if (keys.KeyA) st -= 1;
  if (keys.ArrowRight) sl += 1; if (keys.ArrowLeft) sl -= 1;
  if (keys.ArrowUp) wi += 1; if (keys.ArrowDown) wi -= 1;
  // gamepad: left stick drive, right stick slew/winch, triggers = winch too
  const g = padPoll();
  if (g) {
    const dz = v => Math.abs(v) < 0.14 ? 0 : v;
    th += -dz(g.axes[1] || 0); st += dz(g.axes[0] || 0);
    sl += dz(g.axes[2] || 0); wi += -dz(g.axes[3] || 0);
    const bt = i => !!(g.buttons[i] && g.buttons[i].pressed);
    const val = i => (g.buttons[i] && g.buttons[i].value) || 0;
    wi += val(7) - val(6);                    // RT up, LT down
    const cur = { start: bt(9), a: bt(0) };
    const was = pad.prev; pad.prev = cur;
    const titleShowing = $('title').classList.contains('show');   // not the garage
    if (cur.start && !was.start) {
      if (state === 'play') pauseGame();
      else if (state === 'pause') resumeGame();
      else if (state === 'title' && titleShowing) startGame();
    }
    if (cur.a && !was.a) {
      if (state === 'title' && titleShowing) startGame();
      else if (state === 'pause') resumeGame();
    }
  }
  ctrl.throttle = clamp(th, -1, 1); ctrl.steer = clamp(st, -1, 1);
  ctrl.slew = clamp(sl, -1, 1); ctrl.winch = clamp(wi, -1, 1);
}

// ===================================================================
//  rapier boot
// ===================================================================
await RAPIER.init();
const world = new RAPIER.World({ x: 0, y: -22, z: 0 });   // heavy, gamey gravity
world.timestep = 1 / 60;
world.numSolverIterations = 8;   // the chain earns its keep
const eventQueue = new RAPIER.EventQueue(true);
// collision groups: (membership << 16) | filter
const G_WORLD = (0x0001 << 16) | 0x0007;   // ground+blocks: hit by everything
const G_CHAIN = (0x0002 << 16) | 0x0001;   // chain+ball: hit world only (not truck, not itself)
const G_TRUCK = (0x0004 << 16) | 0x0001;   // truck: pushes world stuff

// ===================================================================
//  renderer / scene
// ===================================================================
const renderer = new THREE.WebGLRenderer({ canvas: $('gl'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;   // flat Lambert colors read
renderer.toneMappingExposure = 1.0;                  // "basic" without it
const scene = new THREE.Scene();
// soft studio environment so Standard materials get real ambient reflections
{
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.06).texture;
  pmrem.dispose();
}
scene.fog = new THREE.Fog(0xbfe3f6, 125, 300);   // haze toward the horizon tint
// gradient sky dome (a flat clear-color sky was doing the game no favors)
{
  const cv = document.createElement('canvas'); cv.width = 2; cv.height = 256;
  const cx = cv.getContext('2d');
  const g = cx.createLinearGradient(0, 0, 0, 256);
  g.addColorStop(0, '#3f9de8'); g.addColorStop(0.55, '#8ed4f7');
  g.addColorStop(0.82, '#cfeafc'); g.addColorStop(1, '#e8f4d8');
  cx.fillStyle = g; cx.fillRect(0, 0, 2, 256);
  const tex = new THREE.CanvasTexture(cv);

const SEED = 1337;
const roadZ = x => 16 * Math.sin(x * 0.013) + 9 * Math.sin(x * 0.0053 + 2.1);
function hillH(x, z) {
  const dRoad = Math.abs(z - roadZ(x));
  let h = 2.6 * Math.sin(x * 0.021 + 1.7) * Math.cos(z * 0.017)
        + 1.7 * Math.sin(x * 0.043 + z * 0.031)
        + 4.2 * Math.sin(x * 0.0071) * Math.sin(z * 0.0087 + 3);
  h += clamp((dRoad - 26) * 0.09, 0, 6);              // valley: hills rise away from the road
  const flat = clamp(1 - dRoad / 13, 0, 1);           // road bed

}

function lotAt(k) {

  const x = k * 30 + (rng() - 0.5) * 8;

}

  let h = hillH(x, z);

  for (let k = k0 - 1; k <= k0 + 1; k++) {
    const L = lotAt(k);
    const d = Math.hypot(x - L.x, z - L.z);
    if (d < L.r + 6) {
      const padH = hillH(L.x, L.z);
      const t = clamp((d - L.r) / 6, 0, 1);
      h = lerp(padH, h, t * t * (3 - 2 * t));

}

const builtLots = new Map();   // k -> block array
function buildLot(k) {
  if (builtLots.has(k)) return;
  const L = lotAt(k);
  const padH = hillH(L.x, L.z);
  const out = [];
  const arch = ARCHETYPES[Math.floor(L.rng() * ARCHETYPES.length)];
  arch(out, L.rng);
  furnish(out, L.rng);
  const yaw = (L.rng() - 0.5) * 0.5 + (L.side < 0 ? Math.PI : 0);
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const list = [];
  const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
  for (const s of out) {
    const x = L.x + s.x * cy - s.z * sy;
    const z = L.z + s.x * sy + s.z * cy;
    // s.y is the block CENTER height above the pad
    const b = spawnBlock(x, padH + s.y, z, s.sx, s.sy, s.sz, s.c, s.d, k);
    if (b) {
      if (Math.abs(yaw) > 0.01) b.body.setRotation({ x: q.x, y: q.y, z: q.z, w: q.w }, false);
      b.body.sleep();
      syncBlock(b);
      list.push(b);
    }
  }
  builtLots.set(k, list);
}
function removeLot(k) {
  const list = builtLots.get(k);
  if (!list) return;
  for (const b of [...list]) removeBlock(b);   // copy: removeBlock splices this very list
  builtLots.delete(k);
}

  const p = b.body.translation(), r = b.body.rotation();
  tmpM4.compose(tmpV.set(p.x, p.y, p.z), tmpQ.set(r.x, r.y, r.z, r.w), tmpS.set(b.sx, b.sy, b.sz));
  blockMesh.setMatrixAt(b.inst, tmpM4);
}

    pist.scale.y = len * 0.52; rod.scale.y = len * 0.55;
    pist.position.copy(p0).addScaledVector(dir, len * 0.27);
    rod.position.copy(p0).addScaledVector(dir, len * 0.72);
  }
  truck.group.add(g);
}

// ---- chain + ball (rebuilt when garage equipment changes) ----
const rig = { tip: null, links: [], ball: null, joints: [], linkMeshes: [], ballMesh: null, cable: null,
  linkL: 1.15, linkR: 0.15, ballDef: null, chainDef: null, tipPos: new THREE.Vector3(), resets: 0 };
const chainMat = new THREE.MeshStandardMaterial({ color: 0x555c66, roughness: 0.42, metalness: 0.65 });
function boomTipWorld(out) {   // where the hoist cable leaves the boom
  const t = out.set(crane.boomLen, 0.25, 0);
  crane.boom.localToWorld(t);
  return t;
}
function buildRig() {
  // tear down
  for (const j of rig.joints) world.removeImpulseJoint(j, true);
  for (const l of rig.links) world.removeRigidBody(l);
  if (rig.ball) world.removeRigidBody(rig.ball);
  if (rig.tip) world.removeRigidBody(rig.tip);
  for (const m of rig.linkMeshes) scene.remove(m);
  if (rig.ballMesh) scene.remove(rig.ballMesh);
  if (rig.cable) scene.remove(rig.cable);
  rig.joints = []; rig.links = []; rig.linkMeshes = [];
  rig.ballDef = equipped('ball'); rig.chainDef = equipped('chain');
  const LINKS = rig.chainDef.links, L = rig.linkL;
  const ballMass = (4 / 3) * Math.PI * rig.ballDef.r ** 3 * rig.ballDef.density;
  const linkVol = Math.PI * rig.linkR ** 2 * (L - rig.linkR * 2) + (4 / 3) * Math.PI * rig.linkR ** 3;
  const linkDensity = ballMass / 10 / linkVol;
  const tp = boomTipWorld(tmpV);
  rig.tipPos.set(tp.x, tp.y - 1, tp.z);
  rig.tip = world.createRigidBody(RAPIER.RigidBodyDesc.kinematicPositionBased()
    .setTranslation(tp.x, tp.y - 1, tp.z));
  let prev = rig.tip, prevAnchor = { x: 0, y: 0, z: 0 };
  for (let i = 0; i < LINKS; i++) {
    const y = tp.y - 1 - (i + 0.5) * L;
    const rb = world.createRigidBody(RAPIER.RigidBodyDesc.dynamic()
      .setTranslation(tp.x, y, tp.z).setCcdEnabled(true)
      .setAngularDamping(0.7).setLinearDamping(0.06));
    // links are absurdly dense on purpose: the solver can only hold a joint
    // chain together when the ball outweighs a link by ~10x, not ~100x —
    // so link mass scales with whatever ball is equipped
    world.createCollider(RAPIER.ColliderDesc.capsule(L / 2 - rig.linkR, rig.linkR)
      .setDensity(linkDensity).setCollisionGroups(G_CHAIN), rb);
    rig.joints.push(world.createImpulseJoint(
      RAPIER.JointData.spherical(prevAnchor, { x: 0, y: L / 2, z: 0 }), prev, rb, true));
    prev = rb; prevAnchor = { x: 0, y: -L / 2, z: 0 };
    rig.links.push(rb);
    const lm = new THREE.Mesh(new THREE.CapsuleGeometry(rig.linkR, L - rig.linkR * 2, 3, 8), chainMat);
    lm.castShadow = true; scene.add(lm); rig.linkMeshes.push(lm);
  }
  const R = rig.ballDef.r;
  rig.ball = world.createRigidBody(RAPIER.RigidBodyDesc.dynamic()
    .setTranslation(tp.x, tp.y - 1 - LINKS * L - R, tp.z).setCcdEnabled(true)
    .setAngularDamping(0.5).setLinearDamping(0.03));
  const bc = world.createCollider(RAPIER.ColliderDesc.ball(R)
    .setDensity(rig.ballDef.density).setCollisionGroups(G_CHAIN)
    .setActiveEvents(RAPIER.ActiveEvents.CONTACT_FORCE_EVENTS)
    .setContactForceEventThreshold(300), rig.ball);
  rig.ballColl = bc.handle;
  rig.joints.push(world.createImpulseJoint(
    RAPIER.JointData.spherical(prevAnchor, { x: 0, y: R * 0.92, z: 0 }), prev, rig.ball, true));
  // ball visual
  const bm = new THREE.Mesh(new THREE.SphereGeometry(R, 22, 16),
    new THREE.MeshStandardMaterial({ color: rig.ballDef.color, metalness: 0.65, roughness: 0.38 }));
  bm.castShadow = true;
  if (rig.ballDef.spike) {
    const sp = new THREE.ConeGeometry(R * 0.16, R * 0.5, 6);
    const sm = new THREE.MeshStandardMaterial({ color: 0x9aa0ab, metalness: 0.7, roughness: 0.3 });
    for (let i = 0; i < 14; i++) {
      const c = new THREE.Mesh(sp, sm);
      const dir = new THREE.Vector3().setFromSphericalCoords(1, Math.acos(1 - 2 * (i + 0.5) / 14), i * 2.399);
      c.position.copy(dir).multiplyScalar(R * 0.98);
      c.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
      bm.add(c);
    }
  }
  scene.add(bm); rig.ballMesh = bm;
  // straight hoist cable from boom tip to the winch anchor
  const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1, 6),
    new THREE.MeshBasicMaterial({ color: 0x30343c }));
  scene.add(cable); rig.cable = cable;
}

const game = { state: 'title', score: 0, combo: 0, comboT: 0, shake: 0, hitstop: 0, runCoins: 0 };
let state = 'title';
const hud = { score: $('scoreChip'), coins: $('coinChip'), combo: $('comboChip') };
function popText(worldPos, txt, big) {
  const v = tmpV.copy(worldPos).project(camera);
  if (v.z > 1) return;
  const el = document.createElement('div');
  el.className = 'pop' + (big ? ' big' : '');
  el.textContent = txt;
  el.style.left = ((v.x * 0.5 + 0.5) * innerWidth) + 'px';
  el.style.top = ((-v.y * 0.5 + 0.5) * innerHeight) + 'px';
  $('hud').appendChild(el);
  setTimeout(() => el.remove(), 1100);
}
function addScore(n, pos, big) {
  const mult = Math.min(6, 1 + Math.floor(game.combo / 5));
  game.score += n * mult;
  game.comboT = 120; game.combo++;
  if (game.combo >= 5) {
    hud.combo.textContent = 'COMBO ×' + mult;
    hud.combo.classList.add('on');
  }
  if (pos) popText(pos, '+' + (n * mult) + (big ? ' SMASH!' : ''), big);
  hud.score.textContent = game.score;
}
function earnCoins(n, pos) {
  const m = Math.round(n * (rig.ballDef ? rig.ballDef.coinMul : 1));
  game.runCoins += m; eco.coins += m;
  hud.coins.textContent = '🪙 ' + eco.coins;
  if (pos && Math.random() < 0.4) { popText(pos, '🪙+' + m); sfx.coin(); }
}
// impact fragments: chunky shards that fly off big hits and crumbling blocks
const FRAGS = 90;
const fragMesh = new THREE.InstancedMesh(new THREE.BoxGeometry(0.3, 0.24, 0.3),
  new THREE.MeshStandardMaterial({ roughness: 0.85, envMapIntensity: 0.3 }), FRAGS);
fragMesh.castShadow = true;
scene.add(fragMesh);
const frags = Array.from({ length: FRAGS }, () => ({ life: 0, p: new THREE.Vector3(), v: new THREE.Vector3(), rx: 0, rz: 0, s: 1 }));
let fragCursor = 0;
for (let i = 0; i < FRAGS; i++) fragMesh.setMatrixAt(i, ZERO_M4);
function burst(x, y, z, color, n, speed) {
  for (let i = 0; i < n; i++) {
    const f = frags[fragCursor];
    fragMesh.setColorAt(fragCursor, tmpC.set(color).offsetHSL(0, 0, (Math.random() - 0.5) * 0.1));
    fragCursor = (fragCursor + 1) % FRAGS;
    f.life = 1;
    f.p.set(x, y, z);
    const a = Math.random() * Math.PI * 2, up = 0.35 + Math.random() * 0.8;
    f.v.set(Math.cos(a), up, Math.sin(a)).normalize().multiplyScalar(speed * (0.5 + Math.random()));
    f.rx = (Math.random() - 0.5) * 14; f.rz = (Math.random() - 0.5) * 14;
    f.s = 0.6 + Math.random() * 0.9;
  }
  if (fragMesh.instanceColor) fragMesh.instanceColor.needsUpdate = true;
}
function fragTick(dt) {
  let any = false;
  for (let i = 0; i < FRAGS; i++) {
    const f = frags[i];
    if (f.life <= 0) continue;
    any = true;
    f.life -= dt * 0.8;
    f.v.y -= 30 * dt;
    f.p.addScaledVector(f.v, dt);
    const gy = terrainH(f.p.x, f.p.z);
    if (f.p.y < gy + 0.1) { f.p.y = gy + 0.1; f.v.y *= -0.3; f.v.x *= 0.7; f.v.z *= 0.7; }
    const s = f.s * Math.min(1, f.life * 2.5);
    tmpQ.setFromEuler(new THREE.Euler(f.rx * f.life, 0, f.rz * f.life));
    tmpM4.compose(f.p, tmpQ, tmpS.set(s, s, s));
    fragMesh.setMatrixAt(i, tmpM4);
    if (f.life <= 0) fragMesh.setMatrixAt(i, ZERO_M4);
  }
  if (any) fragMesh.instanceMatrix.needsUpdate = true;
}
// dust puffs: tiny sprite pool
const dustGeo = new THREE.SphereGeometry(1, 6, 4);
const dustMat = new THREE.MeshBasicMaterial({ color: 0xd8cfae, transparent: true, opacity: 0.55 });
const dust = [];
function puff(x, y, z, s) {
  let d = dust.find(d => !d.visible);
  if (!d) {
    if (dust.length > 40) return;
    d = new THREE.Mesh(dustGeo, dustMat.clone());
    scene.add(d); dust.push(d);
  }
  d.visible = true; d.position.set(x, y, z);
  d.scale.setScalar(s * 0.5); d.userData = { life: 1, grow: s };
  d.material.opacity = 0.5;
}

// ===================================================================
//  streaming — lots + chunks follow the truck; debris lifecycle
// ===================================================================
function streamWorld() {
  const cx = Math.floor(truck.x / CHUNK), cz = Math.floor(truck.z / CHUNK);
  for (let dx = -2; dx <= 2; dx++) for (let dz = -2; dz <= 2; dz++) buildChunk(cx + dx, cz + dz);
  for (const [key, c] of chunks)
    if (Math.abs(c.cx - cx) > 3 || Math.abs(c.cz - cz) > 3) removeChunk(key);
  const k0 = Math.round(truck.x / 30);
  for (let k = k0 - 4; k <= k0 + 4; k++) buildLot(k);
  for (const k of [...builtLots.keys()])
    if (Math.abs(k - k0) > 5) removeLot(k);
}
function debrisTick() {
  let awake = 0;
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (b.body.isSleeping()) {
      if (b.scored) {
        b.wreckT++;
        if (b.wreckT > 360) {   // settled rubble fades away
          const p = b.body.translation();
          puff(p.x, p.y, p.z, 1.2);
          removeBlock(b);
        }
      }
      continue;
    }
    awake++;
    syncBlock(b);
    if (!b.scored && state === 'play') {   // idling on the title must never bank points
      const p = b.body.translation(), h = b.home;
      if ((p.x - h.x) ** 2 + (p.y - h.y) ** 2 + (p.z - h.z) ** 2 > 1.2) {
        b.scored = true;
        addScore(5 + b.coin * 3, p);
        earnCoins(b.coin, p);
        burst(p.x, p.y, p.z, b.c, 3, 5);   // crumble shards
      }
    }
  }
  // hard body budget: too much rubble → retire scored sleepers, a few per step
  // (bounded — a full filter sweep every step went quadratic in the biggest combos)
  if (awake > 420) {
    let toDrop = 8;
    for (let i = blocks.length - 1; i >= 0 && toDrop > 0; i--) {
      const b = blocks[i];
      if (b.scored && b.body.isSleeping()) { removeBlock(b); toDrop--; }
    }
  }
  blockMesh.instanceMatrix.needsUpdate = true;
}

// ===================================================================
//  main sim step
// ===================================================================
const camPos = new THREE.Vector3(-14, 10, 0), camLook = new THREE.Vector3();
const v3a = new THREE.Vector3(), v3b = new THREE.Vector3(), qa = new THREE.Quaternion();
function step(dt) {
  readInput();
  if (state !== 'play') { ctrl.throttle = ctrl.steer = ctrl.slew = ctrl.winch = 0; }
  if (window.__dbg && window.__dbg.auto) Object.assign(ctrl, window.__dbg.auto);   // headless bot override
  const eng = equipped('engine'), win = equipped('winch');
  // ---- drive (arcade kinematics on the height function) ----
  const target = ctrl.throttle * eng.speed;
  truck.speed = lerp(truck.speed, target, 1 - Math.exp(-dt * eng.accel * 0.16));
  if (Math.abs(truck.speed) > 0.2)
    truck.yaw -= ctrl.steer * dt * (1.1 + Math.abs(truck.speed) * 0.04) * Math.sign(truck.speed);
  truck.x += Math.cos(truck.yaw) * truck.speed * dt;
  truck.z -= Math.sin(truck.yaw) * truck.speed * dt;
  // pose on terrain: sample 3 points for pitch/roll
  const hC = terrainH(truck.x, truck.z);
  const hF = terrainH(truck.x + Math.cos(truck.yaw) * 2.6, truck.z - Math.sin(truck.yaw) * 2.6);
  const hS = terrainH(truck.x + Math.sin(truck.yaw) * 1.4, truck.z + Math.cos(truck.yaw) * 1.4);
  const pitch = Math.atan2(hF - hC, 2.6), roll = Math.atan2(hS - hC, 1.4);
  truck.group.position.set(truck.x, hC, truck.z);
  truck.group.rotation.set(0, truck.yaw, 0, 'YXZ');
  truck.group.rotateZ(pitch); truck.group.rotateX(-roll);
  // crane slew + winch — slew ACCELERATES rather than snapping to full rate:
  // instant reversals whip-crack the chain (the failsafe caught one in testing)
  truck.slewV = lerp(truck.slewV || 0, ctrl.slew * 1.5, 1 - Math.exp(-dt * 5));
  truck.cabYaw += truck.slewV * dt;
  crane.group.rotation.y = truck.cabYaw;
  truck.winchT = clamp(truck.winchT + ctrl.winch * dt * win.speed * -0.12, 0, 1);
  // kinematic bodies follow
  truck.body.setNextKinematicTranslation({ x: truck.x, y: hC + 1.3, z: truck.z });
  qa.setFromEuler(new THREE.Euler(0, truck.yaw, 0));
  truck.body.setNextKinematicRotation({ x: qa.x, y: qa.y, z: qa.z, w: qa.w });
  const tip = boomTipWorld(v3a);
  // winch: the anchor rides a virtual rail from just under the boom tip down
  // to near the ground (letting the ball drag and plough is deliberate fun)
  const anchorY = lerp(tip.y - 0.6, terrainH(tip.x, tip.z) + 1.4, truck.winchT);
  // the anchor CHASES its target with a speed cap — teleporting it across the
  // boom's arc in one step is what detonated the joint chain
  v3b.set(tip.x, anchorY, tip.z).sub(rig.tipPos);
  const tl = v3b.length(), MAXSTEP = 0.42;
  if (tl > MAXSTEP) v3b.multiplyScalar(MAXSTEP / tl);
  rig.tipPos.add(v3b);
  rig.tip.setNextKinematicTranslation({ x: rig.tipPos.x, y: rig.tipPos.y, z: rig.tipPos.z });
  // ball speed ceiling: collision ejections can inject huge energy in one
  // step, and it compounds through the joints — clamp before it cascades
  {
    const bv = rig.ball.linvel();
    const sp2 = bv.x * bv.x + bv.y * bv.y + bv.z * bv.z;
    if (sp2 > 55 * 55) {
      const s = 55 / Math.sqrt(sp2);
      rig.ball.setLinvel({ x: bv.x * s, y: bv.y * s, z: bv.z * s }, true);
    }
  }
  // failsafe: if the solver ever loses the chain anyway, quietly rebuild it
  {
    const bp = rig.ball.translation();
    const maxLen = (rig.chainDef.links * rig.linkL + rig.ballDef.r * 2 + 4) * 2.5;
    const dx = bp.x - rig.tipPos.x, dy = bp.y - rig.tipPos.y, dz = bp.z - rig.tipPos.z;
    if (!isFinite(dx + dy + dz) || dx * dx + dy * dy + dz * dz > maxLen * maxLen) {
      rig.resets++;
      buildRig();
    }
  }
  // wheels spin; kick up dust when hustling off-road
  for (const c of truck.group.children) if (c.userData.wheel) c.rotation.y += truck.speed * dt * 1.6;
  if (Math.abs(truck.speed) > 6 && Math.abs(truck.z - roadZ(truck.x)) > 6 && Math.random() < 0.3)
    puff(truck.x - Math.cos(truck.yaw) * 3, hC + 0.5, truck.z + Math.sin(truck.yaw) * 3, 0.9);
  // engine sound
  if (audio.engineGain) {
    audio.engineGain.gain.value = state === 'play' ? 0.05 + Math.abs(truck.speed) * 0.006 : 0;
    audio.engineOsc.frequency.value = 40 + Math.abs(truck.speed) * 5 + Math.abs(ctrl.slew) * 12;
  }

  // ---- physics ----
  world.step(eventQueue);
  eventQueue.drainContactForceEvents(ev => {
    const c1 = ev.collider1(), c2 = ev.collider2();
    if (c1 !== rig.ballColl && c2 !== rig.ballColl) return;
    const hitBlock = collMap.get(c1 === rig.ballColl ? c2 : c1);
    const f = ev.totalForceMagnitude();
    const p = rig.ball.translation();
    const k = clamp(f / 9000, 0, 1);
    if (!hitBlock) {           // dirt / truck: a dull thud, never score — the ball
      if (f > 4500) { thump(k * 0.4); puff(p.x, p.y - 1, p.z, 1.2); }   // dragging must not farm points
      return;
    }
    thump(k);
    if (f > 2500) {
      game.shake = Math.max(game.shake, k * 0.9);
      if (f > 6500) {
        addScore(Math.round(20 + 60 * k), v3b.set(p.x, p.y + 1.5, p.z), true);
        burst(p.x, p.y, p.z, hitBlock.c, Math.round(6 + 8 * k), 9 + 8 * k);
        if (rig.ballDef.spike) {   // spike ball: shockwave impulse to nearby blocks
          for (const b of blocks) {
            const q = b.body.translation();
            const d2 = (q.x - p.x) ** 2 + (q.y - p.y) ** 2 + (q.z - p.z) ** 2;
            if (d2 < 30) {
              b.body.wakeUp();
              const m = 14 / (1 + d2);
              b.body.applyImpulse({ x: (q.x - p.x) * m, y: m * 0.7, z: (q.z - p.z) * m }, true);
            }
          }
        }
        puff(p.x, p.y, p.z, 2.6);
      }
    }
  });

  // ---- combo decay ----
  if (game.comboT > 0) { game.comboT--; if (game.comboT === 0) { game.combo = 0; hud.combo.classList.remove('on'); } }

  streamWorld();
  debrisTick();
}

// ===================================================================
//  render sync
// ===================================================================
function syncVisuals(dt) {
  // chain + ball meshes track bodies
  for (let i = 0; i < rig.links.length; i++) {
    const p = rig.links[i].translation(), r = rig.links[i].rotation();
    rig.linkMeshes[i].position.set(p.x, p.y, p.z);
    rig.linkMeshes[i].quaternion.set(r.x, r.y, r.z, r.w);
  }
  const bp = rig.ball.translation(), br = rig.ball.rotation();
  rig.ballMesh.position.set(bp.x, bp.y, bp.z);
  rig.ballMesh.quaternion.set(br.x, br.y, br.z, br.w);
  // beacon blink (faster while moving)
  beacon.t += dt * (2 + Math.abs(truck.speed) * 0.4);
  beacon.mesh.material.color.setHex((beacon.t | 0) % 2 === 0 ? 0xff7a00 : 0x6b3200);
  // hoist cable: stretch a cylinder from boom tip to winch anchor
  const tip = boomTipWorld(v3a);
  const an = rig.tip.translation();
  v3b.set(an.x, an.y, an.z);
  hookMesh.position.copy(v3b);
  hookMesh.rotation.y = truck.yaw + truck.cabYaw;
  const mid = new THREE.Vector3().addVectors(tip, v3b).multiplyScalar(0.5);
  rig.cable.position.copy(mid);
  const len = tip.distanceTo(v3b);
  rig.cable.scale.set(1, Math.max(0.001, len), 1);
  rig.cable.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0),
    new THREE.Vector3().subVectors(v3b, tip).normalize());
  // dust
  for (const d of dust) {
    if (!d.visible) continue;
    d.userData.life -= dt * 1.4;
    d.scale.addScalar(dt * d.userData.grow * 2.2);
    d.material.opacity = Math.max(0, d.userData.life * 0.5);
    if (d.userData.life <= 0) d.visible = false;
  }
  // camera: chase the truck, peek toward the ball
  const back = 19.5, up = 11;
  v3b.set(truck.x - Math.cos(truck.yaw) * back, terrainH(truck.x, truck.z) + up, truck.z + Math.sin(truck.yaw) * back);
  camPos.lerp(v3b, 1 - Math.exp(-dt * 3.2));
  const sh = game.shake;
  if (sh > 0.01) {
    camPos.x += (Math.random() - 0.5) * sh; camPos.y += (Math.random() - 0.5) * sh * 0.7;
    game.shake *= Math.pow(0.02, dt);
  }
  camera.position.copy(camPos);
  camLook.lerp(v3b.set(truck.x * 0.6 + bp.x * 0.4, (terrainH(truck.x, truck.z) + 3) * 0.65 + bp.y * 0.35,
    truck.z * 0.6 + bp.z * 0.4), 1 - Math.exp(-dt * 4));
  camera.lookAt(camLook);
  // sun + shadow box follow; sky dome and mountains ride along (infinitely far)
  sun.position.set(truck.x + 30, 60, truck.z + 18);
  sun.target.position.set(truck.x, 0, truck.z);
  window.__skyDome.position.copy(camera.position);
  mountains.position.set(truck.x, 0, truck.z);
  sunDisc.position.set(truck.x + 190, 150, truck.z + 105);
  sunDisc.lookAt(camera.position);
}

  sfx.ui();
}
function pauseGame() { if (state !== 'play') return; state = 'pause'; show('pause'); }
function resumeGame() { if (state !== 'pause') return; state = 'play'; show(''); }
function quitToTitle() {
  state = 'title';
  if (game.score > eco.best) eco.best = game.score;
  saveEco();
  $('hud').classList.remove('on');
  refreshTitle(); show('title');
}
function refreshTitle() {
  $('titleStats').textContent =
    `🪙 ${eco.coins}   ·   BEST SCORE ${eco.best}`;
}
$('playBtn').addEventListener('click', () => { unlockAudio(); startGame(); });
$('garageBtn').addEventListener('click', () => { unlockAudio(); openGarage(); });
$('garageBack').addEventListener('click', () => { saveEco(); refreshTitle(); show('title'); sfx.ui(); });
$('pauseBtn').addEventListener('click', pauseGame);
$('resumeBtn').addEventListener('click', resumeGame);
$('quitBtn').addEventListener('click', quitToTitle);

function openGarage() {
  // NOTE: the garage deliberately reuses state === 'title' — the idle sim keeps
  // running behind the panel. Don't "fix" this into its own state.
  show('garage'); sfx.ui();
  $('garageCoins').textContent = '🪙 ' + eco.coins;
  const cards = $('cards');
  cards.innerHTML = '';
  for (const sec of SHOP) {
    const h = document.createElement('div');
    h.style.cssText = 'width:100%;font-weight:800;font-size:12px;letter-spacing:2px;opacity:.7;margin-top:6px';
    h.textContent = sec.label;
    cards.appendChild(h);
    for (const item of sec.items) {
      const owned = eco.owned.has(item.id);
      const equippedNow = eco.equip[sec.slot] === item.id;
      const card = document.createElement('div');
      card.className = 'card' + (equippedNow ? ' equipped' : '');
      card.innerHTML = `<div class="nm">${item.nm}</div><div class="ds">${item.ds}</div>`;
      const btn = document.createElement('button');
      btn.className = 'btn small' + (owned && !equippedNow ? ' ghost' : '');
      btn.textContent = equippedNow ? 'EQUIPPED' : owned ? 'EQUIP' : `🪙 ${item.cost}`;
      btn.addEventListener('click', () => {
        if (equippedNow) return;
        if (!owned) {
          if (eco.coins < item.cost) { sfx.deny(); btn.animate([{ transform: 'translateX(-4px)' }, { transform: 'translateX(4px)' }, { transform: 'none' }], { duration: 160 }); return; }
          eco.coins -= item.cost; eco.owned.add(item.id); sfx.buy();
        } else sfx.ui();
        eco.equip[sec.slot] = item.id;
        saveEco();
        if (sec.slot === 'ball' || sec.slot === 'chain') buildRig();
        openGarage();
      });
      card.appendChild(btn);
      cards.appendChild(card);
    }
  }
}
refreshTitle();
hud.coins.textContent = '🪙 ' + eco.coins;

// ===================================================================
//  boot world + main loop
// ===================================================================
streamWorld();
buildRig();
// settle the rig a few frames so the title scene looks right
for (let i = 0; i < 30; i++) world.step();

let last = 0, acc = 0;
const STEP = 1 / 60;
const dbgErrors = [];
window.addEventListener('error', e => dbgErrors.push(String(e.message)));
function frame(ts) {
  requestAnimationFrame(frame);
  const t = ts / 1000;
  if (!last) last = t;
  let dt = Math.min(t - last, 0.1);
  last = t;
  if (state === 'play' || state === 'title') {
    acc += dt;
    let n = 0;
    while (acc >= STEP && n < 4) { step(STEP); acc -= STEP; n++; }
    if (n === 4) acc = 0;
  } else {
    readInput();   // paused/garage: the sim is stopped but the controller must still navigate
  }
  fragTick(dt);
  syncVisuals(dt);
  renderer.render(scene, camera);
}
requestAnimationFrame(frame);

// ===================================================================
//  debug harness (headless verification)
// ===================================================================
window.__dbg = {
  get state() { return state; },
  get score() { return game.score; },
  get coins() { return eco.coins; },
  get truck() { return truck; },
  ctrl, world, blocks, rig, errors: dbgErrors, lotAt, terrainH,
  start: startGame,
  stepN(n) { for (let i = 0; i < n; i++) step(STEP); syncVisuals(STEP); },
  terrainProbe() {   // heightfield vs function agreement — only chunk colliders count
    const chunkBodies = new Set([...chunks.values()].map(c => c.body.handle));
    let worst = 0, hits = 0;
    for (let i = 0; i < 40; i++) {
      const x = truck.x - 40 + i * 2, z = roadZ(x);
      const ray = new RAPIER.Ray({ x, y: 60, z }, { x: 0, y: -1, z: 0 });
      const hit = world.castRay(ray, 200, true, undefined, undefined, undefined, undefined,
        coll => chunkBodies.has(coll.parent().handle));
      if (!hit) continue;
      hits++;
      const toi = hit.timeOfImpact !== undefined ? hit.timeOfImpact : hit.toi;
      worst = Math.max(worst, Math.abs((60 - toi) - terrainH(x, z)));
    }
    return { worst: +worst.toFixed(3), hits };
  },
  snapshot() {
    const bp = rig.ball.translation();
    return { state, score: game.score, coins: eco.coins, truckX: +truck.x.toFixed(1), truckZ: +truck.z.toFixed(1),
      ball: { x: +bp.x.toFixed(1), y: +bp.y.toFixed(1), z: +bp.z.toFixed(1) },
      blocks: blocks.length, awake: blocks.filter(b => !b.body.isSleeping()).length,
      lots: builtLots.size, chunks: chunks.size, rigResets: rig.resets, errors: dbgErrors };
  },
};

// iOS wants a real gesture for audio; any canvas touch counts
$('gl').addEventListener('pointerdown', unlockAudio);
// background: pause the wrecking, bank the coins
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (state === 'play') pauseGame();
    if (game.score > eco.best) eco.best = game.score;
    saveEco();
  }
});
window.addEventListener('pagehide', () => { if (game.score > eco.best) eco.best = game.score; saveEco(); });

// service worker
if ('serviceWorker' in navigator && location.protocol !== 'file:')
  navigator.serviceWorker.register('sw.js').catch(() => {});

} catch (e) {
  const el = document.getElementById('err');
  el.style.display = 'block';
  el.textContent = 'BOOT FAILED\n\n' + (e && e.stack || e);
}
</script>
</body>
</html>
