<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wreck &amp; Ruin has moved</title>
<style>
  html, body { height: 100%; margin: 0; background: #10141f; color: #fff;
    font-family: "Avenir Next", "Trebuchet MS", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center; text-align: center; }
  a { color: #ffd94a; font-weight: 800; font-size: 22px; text-decoration: none; }
  p { opacity: .75; font-size: 14px; line-height: 1.6; padding: 0 24px; }
</style>
</head>
<body>
<div>
  <div style="font-size:44px">🏗️</div>
  <p><b>Wreck &amp; Ruin moved.</b><br>
  If you had it on your home screen, delete that icon and add the new one.</p>
  <a href="../ruin/">PLAY AT THE NEW ADDRESS →</a>
</div>
<script>
// scrub the old install: drop every wreck-* cache and unregister any worker
// still claiming this scope, then send the visitor on
(async () => {
  try {
    const keys = await caches.keys();
    await Promise.all(keys.filter(k => k.startsWith('wreck-')).map(k => caches.delete(k)));
    if (navigator.serviceWorker) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
  } catch (e) {}
  location.replace('../ruin/');
})();
</script>
</body>
</html>
