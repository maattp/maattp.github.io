<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#63b9ff">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon.png">
<title>Pixel Run</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  /* the page bg is what iOS paints in the safe-area strips; JS retints per world —
     html gets the sky, body gets the DIRT color (any exposed strip is at the
     bottom of the screen, where the game shows ground) */
  html, body { height:100vh; width:100%; overflow:hidden; background:#63b9ff; overscroll-behavior:none; }
  body { touch-action:none; -webkit-user-select:none; user-select:none; }
  #game {
    /* In-browser: dvh tracks the viewport fluidly. */
    position:fixed; top:0; left:0;
    width:100vw; height:100vh; height:100dvh;
    touch-action:none;
    image-rendering:pixelated; image-rendering:crisp-edges;
  }
  /* iOS standalone + black-translucent lays the document out shifted UP by the
     status-bar inset, so anything sized to the viewport ends that many px short
     of the physical bottom — THE bottom bar. Documented fix: extend document and
     canvas by env(safe-area-inset-top). */
  @media (display-mode: standalone) {
    html, body { height: calc(100vh + env(safe-area-inset-top)); }
    #game { height: calc(100vh + env(safe-area-inset-top)); }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<!-- iOS haptic hack: clicking a rendered native switch fires the system selection tap -->
<label id="hap" aria-hidden="true" style="position:absolute;left:-9999px;top:0;opacity:0;pointer-events:none">
  <input type="checkbox" switch tabindex="-1">
</label>
<script>
'use strict';
/* ============================================================
   PIXEL RUN — an infinite scrolling platform runner
   One thumb: tap = jump, tap in air = double jump,
   swipe down in air = slam. Stomp everything. Go far.
   ============================================================ */

// ---------- constants ----------
const TILE = 16;
const STEP = 1000 / 60;              // fixed 60 Hz simulation
const GRAV = 0.28;
// Jump apex ≈ v²/(2·g·0.78 hold-factor) ≈ 4.9 tiles held, ~3.5 tapped. The terrain
// generator's contracts depend on these: ?-block rows at +4 (head-bumpable), pipes
// ≤3 single-jump / 4 = double-jump, gaps ≤6 tiles, enemy trains 2.8-4.2 tiles apart
// (one stomp-bounce arc). Retune JUMP_V/GRAV and those pattern heights must follow.
const JUMP_V = -5.9;
const DJUMP_V = -5.2;
const MAX_FALL = 7.4;
const SLAM_V = 8.2;
const COYOTE = 7;                    // frames of grace off a ledge
const JUMP_BUFFER = 8;               // frames a tap is remembered
const BASE_SPEED = 1.62;
const MAX_SPEED = 3.05;
const PIT_Y = 11 * TILE;             // below this = pit death
const WORLD_LEN = 500;               // tiles per world before the flag
const SAVE = 'pixelrun_';
const VERSION = 17;                  // shown on the title screen — bump once per PR (see CLAUDE.md)

// ---------- utils ----------
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
// offline: cache the whole app via service worker (see sw.js)
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

const urlSeed = new URLSearchParams(location.search).get('seed');
let rng = mulberry32(urlSeed ? +urlSeed : (Math.random() * 1e9) | 0);
const R = (a, b) => a + rng() * (b - a);
const RI = (a, b) => Math.floor(a + rng() * (b - a + 1));  // int in [a,b], floor (not |0) so negative ranges stay uniform
const pick = arr => arr[(rng() * arr.length) | 0];
function store(k, v) { try { localStorage.setItem(SAVE + k, JSON.stringify(v)); } catch (e) {} }
function load(k, d) { try { const v = localStorage.getItem(SAVE + k); return v == null ? d : JSON.parse(v); } catch (e) { return d; } }

// ---------- canvas & scaling ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 240, H = 420, SCALE = 2;
let lastSize = '';
function resize() {
  const dpr = window.devicePixelRatio || 1;
  // measure the element and every viewport report, take the largest —
  // iOS standalone lags these at launch/rotation
  const vv = window.visualViewport;
  const rect = canvas.getBoundingClientRect();
  let cw = Math.round(Math.max(window.innerWidth, vv ? vv.width : 0, rect.width));
  let chh = Math.round(Math.max(window.innerHeight, vv ? vv.height : 0, rect.height));
  // Some iOS versions size the standalone layout viewport SHORT of the home
  // indicator, so 100dvh / inset:0 / innerHeight all agree on a height that ends
  // above the screen bottom (the bar). The physical screen doesn't lie: extend the
  // canvas to it — fixed elements paint into the inset zone under viewport-fit=cover,
  // and the inset math below then measures the home-indicator gap naturally.
  if (navigator.standalone && screen && screen.width) {
    const sMin = Math.min(screen.width, screen.height), sMax = Math.max(screen.width, screen.height);
    if (chh >= cw) { cw = Math.max(cw, sMin); chh = Math.max(chh, sMax); }
    else { cw = Math.max(cw, sMax); chh = Math.max(chh, sMin); }
  }
  // insets are cheap — refresh them on EVERY call. env() resolves late on iOS,
  // and if the first size measurement is already correct no further resize fires,
  // so gating this behind the size guard left safeTop stuck at 0 (HUD under the clock)
  readInsets(cw, chh);
  const sig = cw + 'x' + chh + '@' + dpr;
  if (sig === lastSize) return;
  lastSize = sig;
  const portrait = chh >= cw;
  SCALE = portrait
    ? Math.max(1, Math.round(cw * dpr / 250))
    : Math.max(1, Math.round(chh * dpr / 270));
  W = Math.ceil(cw * dpr / SCALE);
  H = Math.ceil(chh * dpr / SCALE);
  canvas.width = W; canvas.height = H;
  if (navigator.standalone) {   // only standalone needs the physical-screen override;
    canvas.style.width = cw + 'px'; canvas.style.height = chh + 'px';
  }                             // in-browser the CSS dvh keeps tracking the viewport fluidly
  ctx.imageSmoothingEnabled = false;
  readInsets(cw, chh);          // again with the fresh SCALE
}
let safeTop = 0, safeBot = 0, safeL = 0, safeR = 0;
function readInsets(cw, chh) {
  // notch/home-indicator overlay the canvas in standalone mode; keep UI clear of them
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;top:env(safe-area-inset-top);bottom:env(safe-area-inset-bottom);' +
    'left:env(safe-area-inset-left);right:env(safe-area-inset-right);pointer-events:none;visibility:hidden;';
  document.body.appendChild(probe);
  const r = probe.getBoundingClientRect();
  probe.remove();
  let topCss = r.top;
  let botCss = Math.max(0, chh - r.bottom);
  // env() can report 0 before iOS settles; in a standalone app that is never true —
  // fall back to device-class status-bar / home-indicator heights until it resolves
  if (navigator.standalone) {
    const notched = Math.max(screen.width, screen.height) >= 780;
    if (topCss < 20) topCss = notched ? 47 : 20;
    if (notched && botCss < 10) botCss = 34;
  }
  const s = (window.devicePixelRatio || 1) / SCALE;
  safeTop = Math.ceil(topCss * s);
  safeBot = Math.ceil(botCss * s);
  safeL = Math.ceil(r.left * s);
  safeR = Math.ceil(Math.max(0, cw - r.right) * s);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 250));
window.addEventListener('pageshow', () => setTimeout(resize, 60));
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
setTimeout(resize, 350);        // iOS standalone reports the real viewport late
setTimeout(resize, 1200);       // …and sometimes very late
resize();
function tintPage() {
  // camouflage any strip the canvas can't reach: html gets the sky (top/side
  // strips), body gets the DIRT color — an exposed strip sits at the BOTTOM of
  // the screen, where the game is showing ground, so dirt blends and sky glares.
  // Android standalone can't draw under the status-bar/camera strip at all —
  // Chrome live-updates it from the theme-color meta, so tint that to the sky too
  document.documentElement.style.background = THEMES[game.themeIdx].skyTop;
  document.body.style.background = THEMES[game.themeIdx].dirt;
  const tc = document.querySelector('meta[name="theme-color"]');
  if (tc) tc.content = THEMES[game.themeIdx].skyTop;
}

  Y:'101101010010010',Z:'111001010100111',
  '0':'111101101101111','1':'010110010010111','2':'111001111100111','3':'111001011001111',
  '4':'101101111001001','5':'111100111001111','6':'111100111101111','7':'111001001010010',
  '8':'111101111101111','9':'111101111001111',
  '!':'010010010000010','?':'111001011000010','.':'000000000000010',',':'000000000010100',
  ':':'000010000010000','-':'000000111000000','+':'000010111010000',"'":'010010000000000',
  '/':'001001010100100','♥':'101111111010010','↑':'010111010010010','↓':'010010010111010',
  '×':'000101010101000','(':'010100100100010',')':'010001001001010'
};
function textW(str, s) { return str.length * 4 * s - s; }
function drawText(c, str, x, y, s, color, shadow) {
  str = String(str).toUpperCase();
  if (shadow) drawText(c, str, x + s, y + s, s, shadow);
  c.fillStyle = color;
  for (let i = 0; i < str.length; i++) {
    const g = FONT[str[i]];
    if (!g) continue;
    for (let r = 0; r < 5; r++) for (let col = 0; col < 3; col++)
      if (g[r * 3 + col] === '1') c.fillRect(x + i * 4 * s + col * s, y + r * s, s, s);
  }
}
function drawTextC(c, str, cx, y, s, color, shadow) {
  drawText(c, str, Math.round(cx - textW(str, s) / 2), y, s, color, shadow);
}

// ---------- haptics ----------
const hapEl = document.getElementById('hap');
let hapticsOn = load('haptics', true);
let lastHap = 0;
function buzz(n) {
  if (!hapticsOn) return;
  const now = performance.now();
  if (now - lastHap < 22) return;
  lastHap = now;
  n = Math.min(n || 1, 4);
  if (navigator.vibrate) { navigator.vibrate(n * 12); return; }
  for (let i = 0; i < n; i++) setTimeout(() => { try { hapEl.click(); } catch (e) {} }, i * 24);
}

// ---------- pixel art ----------
// sprites are string grids; chars index into a palette. '.' = transparent.
const PAL = {
  k:'#1a1c2c',            // outline
  O:'#ff9a3c', D:'#d9641f', // cap orange
  s:'#ffd6a8', S:'#e8a06c', // skin
  e:'#20242c',            // eye
  b:'#7a4a24',            // hair brown
  t:'#2fb6b0', T:'#1a7d84', // overalls teal
  w:'#ffffff',            // glove / teeth
  B:'#8a5426',            // boot
  y:'#ffd93c', Y:'#c8900f', // gold
  r:'#e8453c', R:'#9e1c30', // red
  p:'#c86bde', P:'#83349c', // purple
  n:'#3e7f3a', N:'#2a5a2a', // green dark
  G:'#7ddc5a',            // green light
  m:'#f5f8ff', M:'#9fb7d8', // ghost white
  a:'#59c8ff', A:'#2a7fd4'  // ice blue
};
function sprite(rows, flip) {
  const h = rows.length, w = rows[0].length;
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const c = cv.getContext('2d');
  for (const r of rows) if (r.length !== w) throw new Error('sprite row width mismatch');
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    const ch = rows[y][flip ? w - 1 - x : x];
    if (ch === '.') continue;
    c.fillStyle = PAL[ch] || '#f0f';
    c.fillRect(x, y, 1, 1);
  }
  return cv;
}

// --- parallax layers: prerendered strips per theme ---
function makeParallax(theme, idx) {
  const layers = [];
  // far layer
  const far = document.createElement('canvas');
  far.width = 512; far.height = 220;
  let c = far.getContext('2d');
  const r2 = mulberry32(1234 + idx * 77);
  if (idx === 2) { // caves: stalactites hang from top
    c.fillStyle = theme.far;
    for (let x = 0; x < 512; x += 24) {
      const h = 30 + r2() * 60;
      c.beginPath(); c.moveTo(x, 0); c.lineTo(x + 12, h); c.lineTo(x + 24, 0); c.fill();
    }
    c.fillStyle = theme.far2;
    for (let x = 12; x < 512; x += 40) {
      const h = 80 + r2() * 70;
      c.beginPath(); c.moveTo(x, 0); c.lineTo(x + 10, h); c.lineTo(x + 20, 0); c.fill();
    }
  } else if (idx === 5) { // castle: battlements + windows
    c.fillStyle = theme.far;
    c.fillRect(0, 90, 512, 130);
    for (let x = 0; x < 512; x += 16) if ((x / 16) % 2 === 0) c.fillRect(x, 78, 16, 12);
    c.fillStyle = theme.far2;
    for (let x = 20; x < 512; x += 56) { c.fillRect(x, 110, 10, 22); c.fillRect(x + 2, 106, 6, 4); }
    c.fillStyle = '#ffb45c';
    for (let x = 20; x < 512; x += 112) c.fillRect(x + 3, 116, 4, 8);
  } else if (idx === 4) { // sky: distant cloud banks
    c.fillStyle = theme.far;
    for (let x = 0; x < 512; x += 90) {
      const y = 120 + r2() * 60, w2 = 50 + r2() * 40;
      c.fillRect(x, y, w2, 12); c.fillRect(x + 8, y - 8, w2 - 16, 8);
    }
  } else if (idx === 3) { // tidal cove: rolling swells and far islets
    c.fillStyle = theme.far;
    c.fillRect(0, 150, 512, 70);
    for (let x = -20; x < 512; x += 48) {
      c.beginPath(); c.moveTo(x, 152); c.quadraticCurveTo(x + 24, 138, x + 48, 152); c.lineTo(x + 48, 160); c.lineTo(x, 160); c.fill();
    }
    c.fillStyle = theme.far2;
    for (let x = 30; x < 512; x += 150) {
      const w2 = 40 + r2() * 40;
      c.beginPath(); c.moveTo(x, 152); c.quadraticCurveTo(x + w2 / 2, 118 - r2() * 14, x + w2, 152); c.fill();
    }
  } else { // hills / dunes
    c.fillStyle = theme.far;
    for (let x = -40; x < 512; x += 96) {
      const h = 60 + r2() * 50;
      c.beginPath(); c.moveTo(x, 220); c.quadraticCurveTo(x + 48, 220 - h * 2, x + 96, 220); c.fill();
    }
  }
  layers.push(far);
  // near layer
  const near = document.createElement('canvas');
  near.width = 512; near.height = 140;
  c = near.getContext('2d');
  if (idx === 2) {
    c.fillStyle = theme.near;
    for (let x = 0; x < 512; x += 30) {
      const h = 20 + r2() * 55;
      c.beginPath(); c.moveTo(x, 140); c.lineTo(x + 15, 140 - h); c.lineTo(x + 30, 140); c.fill();
    }
    c.fillStyle = '#8a5ccc';
    for (let x = 8; x < 512; x += 74) { c.fillRect(x, 122, 4, 18); c.fillRect(x + 1, 118, 2, 4); }
  } else if (idx === 4) {
    c.fillStyle = theme.near;
    for (let x = 0; x < 512; x += 70) {
      const y = 60 + r2() * 50, w2 = 40 + r2() * 30;
      c.fillRect(x, y, w2, 10); c.fillRect(x + 6, y - 6, w2 - 12, 6);
    }
  } else if (idx === 5) {
    c.fillStyle = theme.near;
    for (let x = 0; x < 512; x += 34) {
      const h = 30 + r2() * 60;
      c.fillRect(x, 140 - h, 22, h);
      c.fillRect(x + 4, 140 - h - 6, 14, 6);
    }
    c.fillStyle = '#ff6a3c';
    for (let x = 10; x < 512; x += 68) c.fillRect(x, 132, 3, 8);
  } else if (idx === 3) { // tidal cove: dune grass and beach palms
    c.fillStyle = theme.near;
    for (let x = -20; x < 512; x += 60) {
      const h = 24 + r2() * 26;
      c.beginPath(); c.moveTo(x, 140); c.quadraticCurveTo(x + 30, 140 - h * 2, x + 60, 140); c.fill();
    }
    for (let x = 26; x < 512; x += 130) {
      c.fillStyle = '#8a6a3e';
      c.fillRect(x, 92 + r2() * 8, 4, 48);
      c.fillStyle = '#2e8f5c';
      c.fillRect(x - 10, 86, 24, 5); c.fillRect(x - 6, 80, 16, 6); c.fillRect(x - 2, 92, 8, 4);
    }
  } else {
    c.fillStyle = theme.near;
    for (let x = -20; x < 512; x += 64) {
      const h = 40 + r2() * 45;
      c.beginPath(); c.moveTo(x, 140); c.quadraticCurveTo(x + 32, 140 - h * 2, x + 64, 140); c.fill();
    }
  }
  layers.push(near);
  return layers;
}

// ---------- audio: chiptune engine ----------
const NOTE_IDX = { c:0, 'c#':1, d:2, 'd#':3, e:4, f:5, 'f#':6, g:7, 'g#':8, a:9, 'a#':10, b:11 };
function nfreq(tok) {
  const m = /^([a-g]#?)(\d)$/.exec(tok);
  if (!m) return 0;
  const semis = NOTE_IDX[m[1]] + (+m[2] + 1) * 12;
  return 440 * Math.pow(2, (semis - 69) / 12);
}
function parseTrack(str) {
  const ev = []; let t = 0;
  for (const tok of str.trim().split(/\s+/)) {
    const [n, d] = tok.split(':');
    const len = +d || 1;
    if (n !== 'r') ev.push({ t, f: nfreq(n), d: len });
    t += len;
  }
  return { ev, len: t };
}

function song(bpm, opts, lead, harm, bass, drum) {
  for (const [name, arr] of [['lead', lead], ['harm', harm], ['bass', bass]])
    arr.forEach((bar, i) => {
      if (parseTrack(bar).len !== 16) MUSIC_ERRORS.push(name + ' bar ' + i + ' = ' + parseTrack(bar).len);
    });
  if (Array.isArray(drum)) {
    drum.forEach((bar, i) => { if (bar.length !== 16) MUSIC_ERRORS.push('drum bar ' + i); });
    drum = drum.join('');
  }
  if (drum.length % 16) MUSIC_ERRORS.push('drum len ' + drum.length);
  return Object.assign({ bpm, lead: lead.join(' '), harm: harm.join(' '), bass: bass.join(' '), drum }, opts);
}
// bass riff for MAGMA KEEP: driving root octaves, two per bar
function riff(n, o) {
  const lo = n + o, hi = n + (o + 1);
  const half = lo + ':1 ' + lo + ':1 ' + hi + ':1 ' + lo + ':1 ' + lo + ':1 ' + hi + ':1 ' + lo + ':1 ' + hi + ':1';
  return half + ' ' + half;
}

// ---------- run / reset ----------
function startRun() {
  ground = new Map(); tiles = new Map(); qmeta = new Map(); bumps = new Map(); water = new Map();
  ents = []; coins = []; parts = []; floats = [];
  rng = mulberry32(urlSeed ? +urlSeed : (Math.random() * 1e9) | 0);
  game.state = 'play'; game.frame = 0; game.score = 0; game.coins = 0; game.dist = 0;
  game.themeIdx = 0; game.worldNum = 1; game.speed = BASE_SPEED;
  tintPage();
  game.hearts = 3; game.combo = 0; game.star = 0; game.magnet = 0; game.invuln = 0;
  game.wings = 0; game.giga = 0; game.moon = 0; game.rain = 0; game.wonder = 0;
  game.shake = 0; game.newBest = false; game.themeFade = 0; game.recordFete = false;
  game.hitstop = 0; game.heartFlash = 0; game.heartPop = 0;
  sfxState.coinStreak = 0; sfxState.coinFrame = -99;
  input.jumpBuf = 0; input.slamReq = false; input.held = false;
  game.inBonus = null;
  gen.x = -6; gen.g = 0; gen.nextFlag = WORLD_LEN; gen.sinceEnemy = 0; gen.totalTiles = 0;
  gen.lastWarp = -999;
  for (let i = 0; i < 24; i++) C(0);             // opening runway
  player.x = 40; player.y = -player.h; player.vy = 0;
  player.onGround = true; player.coyote = 0; player.dj = true; player.slam = false;
  player.mode = 'run'; player.runT = 0; player.inWater = false;
  cam.x = player.x - camOffX(); cam.y = camBaseY();
  announce('WORLD 1  ' + THEMES[0].name, 120);
  playSong('hills');
}
function announce(txt, t) { game.announce = txt; game.announceT = t; game.announceMax = t; }
function camOffX() { return Math.round(W * (W > H ? 0.35 : 0.30)); }
function camBaseY() { return Math.max(70, Math.round(H * 0.24)) - H; }

// ---------- juice ----------
function burst(x, y, color, n, spread, grav) {
  for (let i = 0; i < n; i++) {
    const a = R(0, Math.PI * 2), sp = R(0.4, spread || 2.2);
    parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1, life: RI(14, 30),
      color, size: rng() < 0.3 ? 2 : 1, grav: grav === undefined ? 0.12 : grav });

function addFloat(x, y, txt, color) { floats.push({ x, y, txt, color: color || '#fff', life: 42 }); }
function addScore(n, x, y, label) {

// ---------- update ----------
const THEME_SONGS = ['hills', 'dunes', 'caves', 'tide', 'sky', 'keep'];
const HOSTILE = new Set(['chomp', 'rollo', 'spiny', 'bat', 'snap', 'wisp', 'finn', 'puffer']);
const STOMPABLE = new Set(['chomp', 'rollo', 'bat']);
function genThemeIdx() { return Math.floor(Math.max(0, gen.x) / WORLD_LEN) % THEMES.length; }

function prect() { return { x: player.x, y: player.y, w: player.w, h: player.h }; }
function erect(e) {
  if (e.type === 'snap') return { x: e.x - 6, y: e.y, w: 12, h: 16 };
  return { x: e.x + e.ox, y: e.y + e.oy, w: e.w, h: e.h };

function overlap(a, b, pad) {
  pad = pad || 0;
  return a.x < b.x + b.w - pad && a.x + a.w > b.x + pad && a.y < b.y + b.h - pad && a.y + a.h > b.y + pad;

function update() {
  game.frame++;
  if (game.announceT > 0) game.announceT--;
  if (game.themeFade > 0) game.themeFade--;
  if (game.shake > 0) game.shake *= 0.85;
  if (game.invuln > 0) game.invuln--;
  if (game.heartFlash > 0) game.heartFlash--;
  if (game.heartPop > 0) game.heartPop--;
  if (game.magnet > 0) game.magnet--;
  if (game.star > 0) {
    game.star--;
    if (game.star === 0 && game.state === 'play')
      playSong(THEME_SONGS[game.inBonus ? game.inBonus.theme : game.themeIdx]);
    if (game.frame % 3 === 0)   // rainbow trail (sim-side so 120Hz displays don't double it)
      parts.push({ x: player.x + R(0, 10), y: player.y + R(0, 14), vx: R(-0.5, 0.5), vy: R(-1, 0),
        life: 18, color: 'hsl(' + ((game.frame * 14 + 120) % 360) + ',95%,70%)', size: 1, grav: 0 });
  }
  if (game.wings > 0) game.wings--;
  if (game.giga > 0) game.giga--;
  if (game.moon > 0) {
    game.moon--;
    if (game.frame % 5 === 0)   // dreamy drifting sparkles
      parts.push({ x: cam.x + rng() * W, y: cam.y + rng() * H * 0.7, vx: R(-0.2, 0.2), vy: 0.25,
        life: 50, color: '#d8c8ff', size: 1, grav: 0 });
  }
  if (player.inWater && player.mode === 'run' && game.frame % 24 === 0)
    parts.push({ x: player.x + 11, y: player.y + 3, vx: R(-0.2, 0.1), vy: -0.5,
      life: 34, color: '#bfeaff', size: 1, grav: -0.01 });
  if (game.wonder > 0) {
    game.wonder--;
    if (game.frame % 4 === 0)   // rainbow confetti drifting through the dream
      parts.push({ x: cam.x + rng() * W, y: cam.y - 8, vx: R(-0.4, 0.4), vy: R(0.5, 1.1),
        life: RI(60, 120), color: 'hsl(' + ((game.frame * 7) % 360) + ',95%,65%)',
        size: rng() < 0.4 ? 2 : 1, grav: 0, sway: 1 });
  }
  if (game.rain > 0 && !game.inBonus) {   // countdown pauses in bonus rooms so a
    game.rain--;                          // grotto-granted rain isn't silently wasted
    if (game.frame % 5 === 0) {           // it's raining money — LEAD THE RUNNER:
      // compute each coin's fall time and drop it where the player WILL be,
      // plus 20-250px — otherwise everything lands behind you at run speed
      const fall = 3 + rng() * 1.2;
      const spawnY = cam.y + 26;
      let gt = groundTopPx(Math.floor((player.x + 80) / TILE));
      if (!Number.isFinite(gt)) gt = 0;
      const T = Math.max(20, (gt - 6 - spawnY) / fall);
      coins.push({ x: player.x + game.speed * T + 20 + rng() * 230, y: spawnY,
        vx: 0, vy: 0, fall, taken: 0 });
    }
  }
  updatePlayer();
  updateEnts();
  updateCoins();
  updateFx();
  ambient();
  // camera
  cam.x = player.x - camOffX();
  const cy0 = camBaseY();
  const thresh = cy0 + H * 0.28;
  const target = player.y < thresh ? player.y - H * 0.28 : cy0;
  cam.y += (target - cam.y) * 0.10;
  ensureTerrain();
  // inBonus: the main world must survive the detour untouched, and speed would
  // go haywire fed the bonus room's negative x
  if (game.frame % 90 === 0 && !game.inBonus) cleanup();
  game.dist = Math.max(game.dist, Math.floor(player.x / TILE));
  // dust kicked up at speed
  if (player.onGround && player.mode === 'run' && game.speed > 2.1 && game.frame % 12 === 0)
    parts.push({ x: player.x - 2, y: player.y + player.h - 1, vx: R(-0.7, -0.3), vy: R(-0.4, -0.1),
      life: RI(10, 18), color: 'rgba(230,225,210,0.6)', size: 1, grav: 0.02 });
  // crossing your own record, live: a moment worth celebrating
  if (!game.recordFete && game.bestDist > 60 && game.dist > game.bestDist && game.state === 'play') {
    game.recordFete = true;
    addFloat(player.x - 8, player.y - 26, 'NEW RECORD!', '#ffe93c');
    for (let i = 0; i < 18; i++)
      parts.push({ x: player.x + R(-10, 20), y: player.y - R(0, 30), vx: R(-1.4, 1.4), vy: R(-2.2, -0.4),
        life: RI(28, 55), color: pick(['#ffd93c', '#7dffb0', '#59c8ff', '#ff8a9a']), size: 2, grav: 0.06 });
    sfx.power(); buzz(3); game.hitstop = 4;
  }
  if (!game.inBonus) game.speed = Math.min(MAX_SPEED,
    BASE_SPEED + player.x / TILE * 0.0006 + Math.floor((game.worldNum - 1) / THEMES.length) * 0.15);
}

function updatePlayer() {
  if (player.mode === 'dead') { player.vy += GRAV; player.y += player.vy; return; }
  if (player.mode === 'pipein') {
    player.pipeT++; player.y += 0.8;
    if (player.pipeT >= 34) startBonus();
    return;
  }
  if (player.mode === 'pipeout') {
    player.pipeT++; player.y -= 0.8;
    if (player.pipeT >= 34) {
      player.mode = 'run'; player.y = game.inBonus.capY - player.h; player.vy = 0;
      player.onGround = true; player.dj = true; game.invuln = 45;
      game.inBonus = null;
    }
    return;
  }
  if (player.mode === 'bubble') { updateBubble(); return; }
  if (player.stompT > 0) player.stompT--;
  if (player.flipT > 0) player.flipT--;
  if (player.landT > 0) player.landT--;
  if (player.stretchT > 0) player.stretchT--;
  if (player.slam) player.spinA += 0.38;

  // --- water state ---
  const wsurf = waterSurfaceAt(player.x + 5);
  const nowWater = wsurf !== undefined && player.y + 8 > wsurf;
  if (nowWater !== player.inWater) {
    const sy2 = wsurf !== undefined ? wsurf : player.y + 8;
    for (let i = 0; i < 10; i++)
      parts.push({ x: player.x + R(-2, 12), y: sy2 + R(-2, 2), vx: R(-1.2, 1.2), vy: R(-2.2, -0.4),
        life: RI(14, 26), color: i % 3 ? '#bfeaff' : '#ffffff', size: rng() < 0.3 ? 2 : 1, grav: 0.16 });
    sfx.splash(); buzz(1);
    if (nowWater) { player.slam = false; player.flipT = 0; player.vy *= 0.35; player.dj = true; }
    player.inWater = nowWater;
  }

  // --- horizontal ---
  const sp = game.speed * (player.slam ? 0.4 : player.inWater ? 0.72 : 1);
  player.x += sp;
  const rtx = Math.floor((player.x + player.w) / TILE);
  if (game.giga > 0) {   // giga plows straight through brickwork
    for (let ty = Math.floor(player.y / TILE) - 1; ty <= Math.floor((player.y + player.h - 1) / TILE); ty++) {
      const id = tiles.get(K(rtx, ty));
      if (id === T_BRICK) breakBrick(rtx, ty);
      else if (id === T_QBLOCK) openQBlock(rtx, ty);
    }
  }
  let blockTy = null;
  for (let ty = Math.floor(player.y / TILE); ty <= Math.floor((player.y + player.h - 1) / TILE); ty++) {
    if (solidAt(rtx, ty)) { blockTy = blockTy === null ? ty : Math.min(blockTy, ty); }
  }
  if (blockTy !== null) {
    const stepH = (player.y + player.h) - blockTy * TILE;
    // glide up single-tile ledges instead of face-planting into them
    if (player.onGround && stepH <= TILE + 2 && !solidAt(rtx, blockTy - 1) &&
        !solidAt(rtx - 1, blockTy - 1) && tileAt(rtx, blockTy) !== T_PLAT) {
      player.y = blockTy * TILE - player.h;
    } else {
      player.x = rtx * TILE - player.w - 0.01;
    }
  }

  // --- jumping ---
  if (input.jumpBuf > 0) input.jumpBuf--;
  if (player.coyote > 0) player.coyote--;
  if (input.jumpBuf > 0) {
    const jm = game.moon > 0 ? 0.85 : 1;   // moon: gentler launch, way longer hang
    if (player.inWater) {
      input.jumpBuf = 0; player.dj = true;
      if (wsurf !== undefined && player.y + 8 < wsurf + 14) {
        // near the surface: leap clean out of the water
        player.vy = -5.4; player.stretchT = 8;
        sfx.jump(); buzz(1);
        for (let i = 0; i < 8; i++)
          parts.push({ x: player.x + R(-2, 12), y: wsurf + R(-2, 2), vx: R(-1, 1), vy: R(-2.4, -0.6),
            life: RI(12, 24), color: '#bfeaff', size: 1, grav: 0.16 });
      } else {
        // swim stroke
        player.vy = -2.35; player.stretchT = 5;
        sfx.swim();
        parts.push({ x: player.x + R(2, 8), y: player.y + R(2, 8), vx: -0.3, vy: -0.5,
          life: 26, color: '#bfeaff', size: 1, grav: -0.01 });
      }
    } else if (player.onGround || player.coyote > 0) {
      player.vy = JUMP_V * jm; player.onGround = false; player.coyote = 0; input.jumpBuf = 0;
      player.dj = true; player.stretchT = 8;
      sfx.jump(); buzz(1);
      burst(player.x + 5, player.y + player.h, '#e8e4d8', 4, 1.2, 0.05);
    } else if (player.dj && !player.slam) {
      player.vy = DJUMP_V * jm; player.dj = false; input.jumpBuf = 0;
      player.flipT = 22; player.stretchT = 6;      // front flip!
      sfx.djump(); buzz(1);
      burst(player.x + 5, player.y + player.h, '#9adfff', 7, 1.6, 0.02);
    }
  }
  if (input.slamReq) {
    input.slamReq = false;
    if (!player.onGround && !player.slam && player.mode === 'run') {
      player.slam = true; player.vy = Math.max(player.vy, 2.4);
      player.spinA = 0; player.flipT = 0;
      burst(player.x + 5, player.y + 6, '#fff', 3, 1, 0);
    } else if (player.onGround && player.mode === 'run' && !game.inBonus) {
      // swipe down while standing on a warp pipe: go in
      const w = warpUnderfoot();
      if (w) { enterPipe(w); return; }
    }
  }

  // --- gravity ---
  if (player.inWater && !player.slam) {
    player.vy += 0.07;                                        // gentle sink
    player.vy = clamp(player.vy, -3, 1.5);
  } else if (player.slam) player.vy = Math.min(player.vy + (player.inWater ? 0.5 : 0.9), player.inWater ? 4.2 : SLAM_V);
  else {
    const gm = game.moon > 0 ? 0.5 : 1;
    if (!input.held && player.vy < -2.4) player.vy = -2.4;   // variable jump height
    player.vy += GRAV * gm * (player.vy < 0 && input.held ? 0.78 : 1);
    player.vy = Math.min(player.vy, game.moon > 0 ? MAX_FALL * 0.55 : MAX_FALL);
    if (game.wings > 0 && input.held && !player.onGround && player.vy > 0.6) {
      player.vy = 0.6;                                       // feathered glide
      if (game.frame % 4 === 0)
        parts.push({ x: player.x + R(-2, 8), y: player.y + R(6, 14), vx: R(-0.8, -0.3), vy: R(0, 0.3),
          life: 22, color: '#f0f6ff', size: 1, grav: 0.01 });
    }
  }

  player.y += player.vy;
  const wasGround = player.onGround;
  player.onGround = false;

  // --- vertical collide ---
  const tx0 = Math.floor((player.x + 1) / TILE), tx1 = Math.floor((player.x + player.w - 1) / TILE);
  if (player.vy >= 0) {
    const tyB = Math.floor((player.y + player.h) / TILE);
    for (let tx = tx0; tx <= tx1; tx++) {
      const id = tileAt(tx, tyB);
      const top = tyB * TILE;
      if (SOLID.has(id)) { land(top, wasGround); break; }
      if (id === T_PLAT && prevBottom <= top + 3) { land(top, wasGround); break; }
    }

    const tyT = Math.floor(player.y / TILE);
    let bumped = false;
    for (let tx = tx0; tx <= tx1; tx++) {
      const id = tileAt(tx, tyT);
      if (id === T_QBLOCK) { openQBlock(tx, tyT); bumped = true; }
      else if (id === T_BRICK) { breakBrick(tx, tyT); bumped = true; }
      else if (SOLID.has(id)) { bumped = true; sfx.bump(); }
    }
    if (bumped) { player.y = (tyT + 1) * TILE + 0.01; player.vy = 0.5; }
  }

  // --- bonus exit: crossing into the portal (grounded or airborne) sends you home ---
  // mode guard: enterPipe can fire mid-frame from slamLand, and this line would
  // otherwise still run in that same frame with the placeholder exitX
  if (game.inBonus && player.mode === 'run' && player.x + player.w / 2 > game.inBonus.exitX + 6) {
    leaveBonus();
    return;
  }

  // --- hazard pass: spikes bite whatever occupies them, any velocity ---
  outer:
  for (let tx = tx0; tx <= tx1; tx++) {
    for (let ty = Math.floor(player.y / TILE); ty <= Math.floor((player.y + player.h) / TILE); ty++) {
      if (tileAt(tx, ty) === T_SPIKE && player.y + player.h > ty * TILE + 7) {
        if (game.giga > 0) {   // giga crushes spikes flat
          tiles.delete(K(tx, ty));
          burst(tx * TILE + 8, ty * TILE + 10, '#c8ccd8', 8, 2, 0.15);
          sfx.brick(); game.shake = Math.max(game.shake, 2);
          continue;
        }
        player.vy = -4.2;
        if (player.slam) player.slam = false;
        hurt();
        break outer;
      }
    }
  }

  // --- pit ---
  if (player.y > PIT_Y) {
    if (game.hearts > 1) { game.hearts--; sfx.hurt(); buzz(3); startBubble(); }
    else die();
  }
}

function land(top, wasGround) {
  const impact = player.vy;
  player.y = top - player.h; player.vy = 0; player.onGround = true; player.dj = true;
  player.flipT = 0;
  if (player.slam) slamLand();
  else if (!wasGround) {
    game.combo = 0;
    player.landT = 7;
    if (impact > 3.2) sfx.thud();
    burst(player.x + 5, player.y + player.h, '#d8d4c8', 3, 1, 0.05);
    if (game.giga > 0) {   // every giga landing is a small earthquake
      game.shake = Math.max(game.shake, 3);
      sfx.stomp(); buzz(2);
      const feetY = player.y + player.h;
      for (const e of ents) {
        if (e.dead || !HOSTILE.has(e.type) || e.type === 'wisp' || e.type === 'bat') continue;
        const r = erect(e);
        if (Math.abs(r.x + r.w / 2 - (player.x + 5)) < 36 && Math.abs(r.y + r.h - feetY) < 22)
          killEnemy(e, 100);
      }
    }
  } else game.combo = 0;
}
function slamLand() {
  player.slam = false;
  // slamming onto a warp pipe dives straight in — the natural gesture
  if (!game.inBonus) {
    const w = warpUnderfoot();
    if (w) { enterPipe(w); return; }
  }
  player.landT = 9;
  game.shake = 6;
  sfx.slam(); buzz(3);
  burst(player.x + 5, player.y + player.h, '#e8dcc8', 14, 2.6, 0.1);
  const feetY = player.y + player.h;
  // shockwave kills grounded enemies nearby (spiny's one weakness)
  for (const e of ents) {
    if (e.dead || !HOSTILE.has(e.type) || e.type === 'wisp' || e.type === 'bat') continue;
    const r = erect(e);
    if (Math.abs(r.x + r.w / 2 - (player.x + 5)) < 52 && Math.abs(r.y + r.h - feetY) < 26)
      killEnemy(e, 150);
  }
  // crack bricks and pop ? blocks underfoot
  const tyB = Math.floor((feetY + 2) / TILE);
  for (let tx = Math.floor(player.x / TILE) - 1; tx <= Math.floor(player.x / TILE) + 1; tx++) {
    const id = tiles.get(K(tx, tyB));
    if (id === T_BRICK) breakBrick(tx, tyB);
    else if (id === T_QBLOCK) openQBlock(tx, tyB);
  }
}

function openQBlock(tx, ty) {
  const k = K(tx, ty);
  tiles.set(k, T_USED); bumps.set(k, 10);
  const what = qmeta.get(k) || 'coin';
  const bx = tx * TILE + 8, by = ty * TILE - 6;
  if (what === 'coin' || what === 'coins') {
    const n = what === 'coins' ? 3 : 1;
    game.coins += n; addScore(50 * n, bx - 8, by - 8);
    burst(bx, by, '#ffd93c', 6 * n, 2, 0.15);
    sfx.coin(); buzz(1);
  } else {
    // grant instantly — a walking pickup is uncatchable at run speed
    applyPow(what, bx - 6, by - 6);
    ents.push({ type: 'powfx', kind: what, x: tx * TILE + 2, y: ty * TILE - 4,
      w: 12, h: 12, ox: 0, oy: 0, dead: 0, t: 0 });
  }
}
function breakBrick(tx, ty) {
  const k = K(tx, ty);
  tiles.delete(k);
  const th = THEMES[game.themeIdx];
  burst(tx * TILE + 8, ty * TILE + 8, th.brick, 10, 2.4, 0.2);
  burst(tx * TILE + 8, ty * TILE + 8, th.brickDk, 5, 1.8, 0.2);
  addScore(10, undefined);
  sfx.brick(); buzz(1); game.shake = Math.max(game.shake, 2);
}

// ---------- warp pipes / bonus rooms ----------
// The room is built at far-negative tile coords so it can never collide with the
// main world; cleanup() is paused while inBonus so the world you left stays intact.
const BONUS_TX = -4000;
function enterPipe(w) {
  game.inBonus = { retX: w.x, capY: w.y, theme: game.themeIdx, exitX: Infinity };
  player.mode = 'pipein'; player.pipeT = 0;
  player.x = w.x + 16 - player.w / 2;
  player.slam = false; player.vy = 0; player.onGround = false;
  burst(w.x + 16, w.y - 2, '#d8f4d8', 8, 1.6, 0.02);
  sfx.pipe(); buzz(2);
}
const SPECIALS = ['star', 'wings', 'giga', 'moon', 'rain', 'wonder'];
function startBonus() {
  // one hand-built design per world, each with its own palette and reward shape
  const layout = (game.worldNum - 1) % 6;
  const b = BONUS_TX;
  const LEN = [40, 40, 42, 42, 44, 42][layout];
  const CEIL = [-7, -9, -8, -7, -11, -8][layout];
  const PALETTE = [2, 5, 1, 2, 4, 5][layout];
  const NAMES = ['OLD CELLAR!', 'PYRAMID VAULT!', 'GILDED HALL!', 'SUNKEN GROTTO!', 'CLOUD VAULT!', 'SPIKE VAULT!'];
  // sealed box: floor, walls both ends, ceiling all the way across
  for (let i = 0; i < LEN; i++) ground.set(b + i, 0);
  for (let ty = -1; ty >= CEIL + 1; ty--) { put(b + 1, ty, T_STONE); put(b + LEN - 2, ty, T_STONE); }
  for (let i = 1; i < LEN - 1; i++) put(b + i, CEIL, T_STONE);
  // blocks and terrain first, coins second — coinAt skips occupied cells
  if (layout === 0) {          // OLD CELLAR — humble mounds of gold
    for (const m of [12, 25]) { put(b + m, -1, T_STONE); put(b + m + 1, -1, T_STONE); }
    qblock(b + 8, -4, 'heart');
    qblock(b + 31, -4, qContents());
    coinRow(b + 5, -1, 6);
    coinRow(b + 11, -4, 4);
    coinRow(b + 16, -1, 8);
    coinRow(b + 24, -4, 4);
    coinRow(b + 29, -1, 5);
  } else if (layout === 1) {   // PYRAMID VAULT — treasure on top
    const ph = [1, 2, 3, 3, 2, 1];
    ph.forEach((h, i) => { for (let r = 1; r <= h; r++) put(b + 15 + i, -r, T_STONE); });
    qblock(b + 8, -4, 'heart');
    qblock(b + 17, -6, pick(SPECIALS));
    ph.forEach((h, i) => coinAt(b + 15 + i, -h - 1));
    coinRow(b + 5, -1, 6);
    coinRow(b + 24, -1, 8);
    coinRow(b + 26, -4, 5);
  } else if (layout === 2) {   // GILDED HALL — double-deck brick shelves
    for (let i = 8; i <= 18; i++) put(b + i, -4, T_BRICK);
    for (let i = 15; i <= 27; i++) put(b + i, -6, T_BRICK);
    qblock(b + 12, -6, 'heart');          // bump it from the lower shelf
    qblock(b + 31, -4, pick(SPECIALS));
    coinRow(b + 5, -1, 8);
    coinRow(b + 9, -5, 8);
    coinRow(b + 16, -7, 10);
    coinRow(b + 22, -1, 8);
  } else if (layout === 3) {   // SUNKEN GROTTO — a quiet pool to dive
    for (let i = 12; i <= 27; i++) { ground.set(b + i, -3); water.set(b + i, TILE); }
    qblock(b + 19, -3, 'heart');          // leap from the water and bump it
    qblock(b + 7, -4, qContents());
    coinRow(b + 14, 1, 8);
    coinRow(b + 16, 2, 5);
    coinRow(b + 30, -1, 5);
    const fy = 34;
    ents.push({ type: 'finn', x: (b + 14) * TILE, y: fy, y0: fy, vx: -0.45,
      w: 12, h: 6, ox: 2, oy: 6, dead: 0, t: 0,
      minX: (b + 13) * TILE, maxX: (b + 26) * TILE });
  } else if (layout === 4) {   // CLOUD VAULT — a climb through floating platforms
    for (const [px2, py2] of [[8, -3], [13, -5], [18, -7], [23, -5], [28, -3]])
      for (let i = 0; i < 3; i++) put(b + px2 + i, py2, T_PLAT);
    qblock(b + 19, -9, pick(SPECIALS));   // top of the climb
    qblock(b + 34, -4, 'heart');
    coinRow(b + 8, -4, 3);
    coinRow(b + 13, -6, 3);
    coinRow(b + 18, -8, 3);
    coinRow(b + 23, -6, 3);
    coinRow(b + 28, -4, 3);
    coinRow(b + 5, -1, 4);
  } else {                     // SPIKE VAULT — risk it for double treasure
    for (const s of [10, 11, 12, 13, 22, 23, 24, 25]) put(b + s, -1, T_SPIKE);
    for (let i = 10; i <= 13; i++) put(b + i, -4, T_PLAT);
    for (let i = 22; i <= 25; i++) put(b + i, -4, T_PLAT);
    qblock(b + 6, -4, 'heart');
    qblock(b + 17, -4, pick(SPECIALS));
    qblock(b + 30, -4, pick(SPECIALS));
    coinRow(b + 10, -2, 4);
    coinRow(b + 22, -2, 4);
    coinRow(b + 10, -5, 4);
    coinRow(b + 22, -5, 4);
    coinRow(b + 16, -1, 5);
    coinRow(b + 28, -1, 2);
  }
  // full-height EXIT portal at the end wall — run into it any way you like
  const ex = b + LEN - 4;
  ents.push({ type: 'portal', x: ex * TILE, y: 0, w: 24, h: 96, ox: 0, oy: 0, dead: 0, t: 0 });
  game.inBonus.exitX = ex * TILE;
  player.x = (b + 3) * TILE; player.y = -player.h - 70; player.vy = 0;
  player.mode = 'run'; player.dj = true; player.onGround = false; player.pipeT = 0;
  game.prevTheme = game.themeIdx;
  game.themeIdx = PALETTE;
  game.themeFade = 0;
  tintPage();
  cam.x = player.x - camOffX();
  announce(NAMES[layout], 90);
}
function leaveBonus() {
  const b = game.inBonus;
  player.mode = 'pipeout'; player.pipeT = 0; player.inWater = false;
  player.x = b.retX + 16 - player.w / 2;
  player.y = b.capY + 4;                          // rises out of the pipe you entered
  player.vy = 0; player.onGround = false;
  game.themeIdx = b.theme; game.themeFade = 0;
  tintPage();
  cam.x = player.x - camOffX();
  burst(b.retX + 16, b.capY - 2, '#d8f4d8', 8, 1.6, 0.02);
  sfx.pipe(); buzz(2);
}

function startBubble() {
  player.mode = 'bubble'; player.bubbleT = 0; player.vy = 0; player.slam = false;
  player.targetX = null;
  addFloat(player.x, cam.y + H * 0.4, '-1♥', '#ff6a7a');
}
function updateBubble() {
  player.bubbleT++;
  input.jumpBuf = 0;                 // taps while bubbled don't bank a ghost jump
  const wantY = cam.y + H * 0.30;
  player.y += (wantY - player.y) * 0.06;
  if (player.targetX === null) {
    // find the next stretch of 3 safe columns
    let tx = Math.floor(player.x / TILE) + 3;
    for (; tx < gen.x - 3; tx++) {
      if (ground.get(tx) !== undefined && ground.get(tx + 1) !== undefined && ground.get(tx + 2) !== undefined) {
        player.targetX = (tx + 1) * TILE; break;
      }
    }
  }
  player.x += player.targetX !== null && player.x > player.targetX - 8 ? 0 : 1.6;
  player.y += Math.sin(player.bubbleT * 0.12) * 0.4;
  if (player.targetX !== null && player.x >= player.targetX - 8 && player.bubbleT > 40) {
    player.mode = 'run'; player.vy = 0; game.invuln = 130; player.dj = true;
    sfx.pop(); burst(player.x + 5, player.y + 8, '#bfe8ff', 10, 2, 0.05);
  }
}

function hurt() {
  if (game.invuln > 0 || game.star > 0 || game.giga > 0 || player.mode !== 'run') return;
  game.hearts--;
  sfx.hurt(); buzz(2); game.shake = 5;
  game.hitstop = 8; game.heartFlash = 16;
  if (game.hearts <= 0) { die(); return; }
  game.invuln = 100;
  player.vy = Math.min(player.vy, -3.4);
  addFloat(player.x, player.y - 10, '-1♥', '#ff6a7a');
}
function die() {
  if (player.mode === 'dead') return;
  player.mode = 'dead'; game.state = 'dying'; game.stateT = 0;
  player.vy = -6.4; game.star = 0; game.magnet = 0;
  game.wings = 0; game.giga = 0; game.moon = 0; game.rain = 0; game.wonder = 0;
  game.hitstop = 10;
  playSong('over'); buzz(4); game.shake = 7;
}
function gameOver() {
  game.state = 'over'; game.stateT = 0;
  game.coinsAll += game.coins; store('coinsAll', game.coinsAll);
  game.newBest = game.score > game.best;
  if (game.newBest) { game.best = game.score; store('best', game.best); }
  if (game.dist > game.bestDist) { game.bestDist = game.dist; store('bestDist', game.bestDist); }
}

function killEnemy(e, pts, squash) {
  if (e.dead) return;
  e.dead = squash ? 2 : 1; e.deadT = 22;
  if (e.dead === 1) e.vy = -2.6;
  const r = erect(e);
  addScore(pts, pts > 0 ? r.x : undefined, r.y - 8);
  burst(r.x + r.w / 2, r.y + r.h / 2, '#fff', 6, 1.8, 0.1);
  parts.push({ x: r.x + r.w / 2, y: r.y + r.h / 2, vx: 0, vy: 0, life: 12,
    color: '#ffffff', size: 1, grav: 0, ring: 2 });
}

function updateEnts() {
  // giga's contact zone matches the drawn giant, not the small physics box
  const pr = game.giga > 0
    ? { x: player.x - 9, y: player.y + player.h - 30, w: 28, h: 30 }
    : prect();
  for (const e of ents) {
    if (e.dead) {
      e.deadT--;
      if (e.dead === 1) { e.vy += GRAV; e.y += e.vy; e.x -= 0.3; }
      continue;
    }
    e.t++;
    if (e.type === 'powfx') {          // cosmetic: reward rises out of the block and fades
      e.y -= e.t < 14 ? 0.7 : 0.35;
      if (e.t > 45) { e.dead = 2; e.deadT = 0; }
      continue;
    }
    if (e.type === 'chomp' || e.type === 'rollo' || e.type === 'spiny' || e.type === 'shell') {
      // walkers with gravity
      if (e.type === 'shell') {
        e.rot = (e.rot || 0) + 0.55;               // kicked shells spin
        if (e.t % 3 === 0)
          parts.push({ x: e.x - 2, y: e.y + 10 + rng() * 4, vx: -1.2, vy: 0,
            life: 10, color: 'rgba(190,230,255,0.7)', size: 1, grav: 0 });
      } else if (e.type === 'chomp' && !e.noticed && player.x < e.x && e.x - player.x < 120) {
        e.noticed = 1; e.vy = -1.8;                // startled hop: "someone's coming!"
        addFloat(e.x + 2, e.y - 10, '!', '#fff');
      }
      e.x += e.vx;
      // turn at walls
      const dir = e.vx > 0 ? 1 : -1;
      const ftx = Math.floor((e.x + 8 + dir * 7) / TILE);
      const fty = Math.floor((e.y + 12) / TILE);
      if (solidAt(ftx, fty)) {
        if (e.type === 'shell') { burst(e.x + 8, e.y + 8, '#59c8ff', 10, 2.4, 0.15); e.dead = 2; e.deadT = 1; sfx.kick(); }
        else { e.vx = -e.vx; e.x += e.vx * 2; }
      }
      e.vy = Math.min(e.vy + GRAV, MAX_FALL);
      e.y += e.vy;
      const tyB = Math.floor((e.y + 16) / TILE);
      for (let tx = Math.floor((e.x + 3) / TILE); tx <= Math.floor((e.x + 13) / TILE); tx++) {
        const id = tileAt(tx, tyB);
        if (SOLID.has(id) || (id === T_PLAT && e.vy >= 0 && e.y + 16 - e.vy <= tyB * TILE + 3)) {
          e.y = tyB * TILE - 16; e.vy = 0; break;
        }
      }
    } else if (e.type === 'bat') {
      if (e.sleep === 1) {                         // roosting: hold still until prey nears
        if (Math.abs(player.x - e.x) < 110) {
          e.sleep = 2; e.wakeT = 0;
          addFloat(e.x + 2, e.y - 10, '!', '#c86bde');
        }
      } else if (e.sleep === 2) {                  // wake: swoop down to cruising height
        e.wakeT++;
        e.x += e.vx * 1.6;
        e.y0 += (e.cruiseY - e.y0) * 0.08;
        e.y = e.y0;
        if (e.wakeT > 40) e.sleep = 0;
      } else {
        e.x += e.vx;
        e.y = e.y0 + Math.sin(e.t * 0.045) * 26;
      }
    } else if (e.type === 'finn') {
      e.x += e.vx;
      if (e.x < e.minX || e.x > e.maxX) e.vx = -e.vx;
      e.y = e.y0 + Math.sin(e.t * 0.06) * 6;
      if (e.t % 46 === 0)
        parts.push({ x: e.x + 8, y: e.y + 6, vx: 0, vy: -0.4, life: 26, color: '#bfeaff', size: 1, grav: -0.01 });
    } else if (e.type === 'puffer') {
      e.y = e.y0 + Math.sin(e.t * 0.045) * 9;
      // puff up when the player closes in — a fair warning that also looks great
      const near = Math.abs(player.x + 5 - (e.x + 8)) < 70 && Math.abs(player.y - e.y) < 60;
      e.inf = clamp((e.inf || 0) + (near ? 0.09 : -0.05), 0, 1);
    } else if (e.type === 'snap') {
      // pipe plant cycle; shy when the player is close
      const near = Math.abs(player.x - e.x) < 42 && e.phase === 0;
      if (!near) e.phase++;
      if (e.phase < 30) e.out = e.phase / 30;
      else if (e.phase < 150) {
        e.out = 1;
        if (e.phase % 34 === 0)                    // spores drift from the open bloom
          parts.push({ x: e.x + R(-5, 5), y: e.y + 2, vx: R(-0.3, 0.3), vy: 0.25,
            life: 40, color: '#c86bde', size: 1, grav: 0.005, sway: 1 });
      }
      else if (e.phase < 180) e.out = 1 - (e.phase - 150) / 30;
      else { e.out = 0; if (e.phase > 240) e.phase = 0; }
      e.y = e.capY - e.out * 22;
    } else if (e.type === 'wisp') {
      const dx = (player.x + 5) - (e.x + 8), dy = (player.y - 6) - (e.y + 8);
      const mag = e.scared > 0 ? -0.8 : 0.62 + difficulty() * 0.25;
      if (e.scared > 0) e.scared--;
      e.x += clamp(dx * 0.02, -1, 1) * mag + (mag > 0 ? game.speed * 0.32 : -0.6);
      e.y += clamp(dy * 0.02, -0.7, 0.7);
      e.y += Math.sin(e.t * 0.08) * 0.3;
      if (e.t % 4 === 0) {                         // ghostly afterimages
        e.trail = e.trail || [];
        e.trail.unshift({ x: e.x, y: e.y });
        if (e.trail.length > 3) e.trail.pop();
      }
    } else if (e.type === 'jumpfish') {            // cosmetic: leaping in the background
      e.x += e.vx; e.vy += 0.11; e.y += e.vy;
      if (e.vy > 0 && e.y >= e.surfY) {
        for (let i = 0; i < 6; i++)
          parts.push({ x: e.x + 8 + R(-3, 3), y: e.surfY, vx: R(-0.8, 0.8), vy: R(-1.6, -0.4),
            life: RI(10, 20), color: '#bfeaff', size: 1, grav: 0.14 });
        e.dead = 2; e.deadT = 0;
      }
      continue;
    } else if (e.type === 'bird') {                // cosmetic: crossing the sky
      e.x += e.vx;
      e.y = e.y0 + Math.sin(e.t * 0.05) * 4;
      continue;
    } else if (e.type === 'warp') {
      if (e.t % 26 === 0 && !game.inBonus)
        parts.push({ x: e.x + 4 + rng() * 24, y: e.y - 2, vx: 0, vy: -0.35,
          life: 24, color: '#ffe97a', size: 1, grav: 0 });
      continue;
    } else if (e.type === 'portal') {
      if (e.t % 7 === 0)
        parts.push({ x: e.x + 4 + rng() * 16, y: -rng() * 90, vx: R(-0.3, 0.3), vy: R(-0.5, -0.1),
          life: 30, color: rng() < 0.5 ? '#7dffb0' : '#59c8ff', size: 1, grav: 0 });
      continue;
    } else if (e.type === 'flag') {
      if (!e.hit && player.x > e.x) worldTransition(e);
      continue;
    }
    if (e.type === 'shell') {
      for (const o of ents) {
        if (o !== e && !o.dead && HOSTILE.has(o.type) && o.type !== 'wisp' && overlap(erect(e), erect(o))) {
          killEnemy(o, 100); sfx.kick(); game.shake = Math.max(game.shake, 2);
        }
      }
      continue;
    }
    // --- player vs enemy ---
    if (!HOSTILE.has(e.type)) continue;
    if (e.type === 'snap' && e.out < 0.35) continue;
    const r = erect(e);
    if (!overlap(pr, r, 1)) continue;
    if (game.star > 0 || game.giga > 0) { killEnemy(e, 200); sfx.kick(); buzz(2); continue; }
    if (player.slam && e.type !== 'wisp') { killEnemy(e, 150); sfx.stomp(); buzz(2); continue; }
    const stomp = player.vy > 0.5 && (player.y + player.h) - r.y < 7 + player.vy;
    if (stomp && STOMPABLE.has(e.type)) {
      game.combo++;
      const pts = 100 * Math.pow(2, Math.min(game.combo - 1, 5));
      addScore(pts, r.x, r.y - 10, false);
      addFloat(r.x, r.y - 10, game.combo > 1 ? pts + '  ×' + game.combo : '+' + pts, game.combo > 2 ? '#7dffb0' : '#ffe97a');
      if (e.type === 'rollo') {
        e.type = 'shell'; e.vx = game.speed + 1.9; e.t = 0;
        sfx.kick();
      } else killEnemy(e, 0, true);
      player.vy = input.held ? -6.3 : -4.5;

function updateCoins() {
  // giga draws the hero ~1.85x from the feet up; collect with the VISUAL body,
  // not the physics hitbox, or head-height coins brush past uncollected
  const giga = game.giga > 0;
  const pcx = player.x + 5;
  const pcy = giga ? player.y + player.h - 15 : player.y + 7;
  const rr = giga ? 361 : 121;         // radius² : 19px vs 11px
  for (const c of coins) {
    if (c.taken > 0) { c.taken++; c.y -= 1.2; continue; }
    if (c.fall) {                       // rain coins land and SETTLE — catching them
      c.y += c.fall;                    // mid-air was near-impossible; scooping a
      const gt = groundTopPx(Math.floor(c.x / TILE));   // trail off the ground is the fun
      if (Number.isFinite(gt) && c.y >= gt - 6) { c.y = gt - 6; c.fall = 0; }
      else if (c.y > 170) { c.taken = 9; continue; }    // fell into a pit: gone
    }
    if (game.magnet > 0) {
      const dx = pcx - c.x, dy = pcy - c.y, d2 = dx * dx + dy * dy;
      if (d2 < 4900) {
        const d = Math.sqrt(d2) || 1;
        c.vx += dx / d * 0.55; c.vy += dy / d * 0.55;
        c.vx *= 0.88; c.vy *= 0.88;
        c.x += c.vx; c.y += c.vy;

    const dx = pcx - c.x, dy = pcy - c.y;
    if (dx * dx + dy * dy < rr) {
      c.taken = 1;
      game.coins++; addScore(50, undefined);
      sfx.coin(); buzz(1);
      burst(c.x, c.y, '#ffd93c', 4, 1.4, 0.08);
    }
  }
}

  const hit = r => p && r && p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;

    }

      if (xi < 0) xi += W + 160;
      xi -= 80;

  if (wI > 0) {

    let jump = false;

    for (let i = 1; i <= 3; i++) if (!surfaceAt(tx + i)) { if (i <= (game.speed > 2.3 ? 3 : 2)) jump = true; break; }
    // wall / step / pipe ahead? (single-tile steps auto-glide, so look for 2+)
    for (let i = 1; i <= 2 && !jump; i++) {
      const g = ground.get(tx + i);
      if (g !== undefined && -g < feetTy) jump = true;
      for (let ty = feetTy; ty > feetTy - 3; ty--)
        if (SOLID.has(tiles.get(K(tx + i, ty)) ?? -1)) jump = true;
    }
    // stuck failsafe: if not moving, mash jump (and later double-jump)
    if (Math.abs(player.x - botLastX) < 0.2) botStill++; else botStill = 0;
    botLastX = player.x;
    if (botStill > 50) { jump = true; botStill = 30; }
    // spikes ahead?
    for (let i = 1; i <= 3 && !jump; i++)
      if (tileAt(tx + i, feetTy) === T_SPIKE || tileAt(tx + i, feetTy + 1) === T_SPIKE) jump = true;
    // enemy ahead?
    if (!jump) for (const e of ents) {
      if (e.dead || !HOSTILE.has(e.type)) continue;
      const r = erect(e);
      const dx = r.x - (player.x + player.w);
      if (dx > -4 && dx < 30 && Math.abs(r.y + r.h - (player.y + player.h)) < 30) { jump = true; break; }
    }
    if (jump) botJump();
    else if (botHold <= 0) input.held = false;
  } else {
    botHold--;
    if (player.stompT > 0) input.held = false;   // short bounce chains onto enemy trains
    // wall still ahead mid-air (tall pipes): spend the double jump to clear it
    if (player.dj && player.vy > -0.5) {
      for (let ty = feetTy; ty > feetTy - 2; ty--)
        if (SOLID.has(tileAt(tx + 1, ty)) || SOLID.has(tileAt(tx + 2, ty))) { botJump(); break; }
    }
    if (player.vy > 0.5 && player.dj) {
      // any floor below within 7 tiles?
      let floor = false;
      for (let dy = 0; dy <= 7 && !floor; dy++)
        for (let dx = 0; dx <= 1; dx++)
          if (SOLID.has(tileAt(tx + dx, feetTy + dy)) || tileAt(tx + dx, feetTy + dy) === T_PLAT) floor = true;
      if (!floor) botJump();
    }
  }
}
const DBG = window.__dbg = {
  bot: false, errors: [], stats: { hurts: [], deaths: [] },
  game, player, input, cam, gen,
  ents: () => ents, ground: () => ground, tiles: () => tiles, coins: () => coins,
  qmeta: () => qmeta, K, openQBlock, ui, musicErrors: MUSIC_ERRORS, water: () => water,
  toClient(r) { const dpr = window.devicePixelRatio || 1; return { x: (r.x + r.w / 2) * SCALE / dpr, y: (r.y + r.h / 2) * SCALE / dpr }; },
  startRun, step, botThink,
  stepN(n) { for (let i = 0; i < n; i++) { if (DBG.bot) botThink(); step(); } },
  snapshot() {
    return { state: game.state, score: game.score, coins: game.coins, dist: game.dist,
      hearts: game.hearts, world: game.worldNum, theme: THEMES[game.themeIdx].name,
      speed: +game.speed.toFixed(2), x: Math.round(player.x), y: Math.round(player.y),
      mode: player.mode, ents: ents.length, coinsOnMap: coins.length, frame: game.frame };
  }
};
window.addEventListener('error', e => DBG.errors.push(String(e.message) + ' @' + e.filename + ':' + e.lineno));
const _hurt = hurt, _die = die;
hurt = function () { const h = game.hearts; _hurt(); if (game.hearts < h) DBG.stats.hurts.push({ dist: game.dist, frame: game.frame }); };
die = function () { if (player.mode !== 'dead') DBG.stats.deaths.push({ dist: game.dist, frame: game.frame, world: game.worldNum }); _die(); };
if (new URLSearchParams(location.search).get('bot')) { DBG.bot = true; }

</script>
