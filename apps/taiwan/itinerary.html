<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Taiwan 2026 — Matt & Tingting</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121e;--card:#171725;--card-hover:#1c1c2e;
  --accent:#f0b429;--accent2:#4fc3f7;--accent3:#ab47bc;
  --text:#eeeef2;--text2:#b0b0c0;--dim:#6b6b80;
  --food:#ff6b4a;--sight:#4fc3f7;--transit:#ab47bc;--rest:#4caf8b;--book:#f0b429;
  --border:rgba(255,255,255,.06);--glow:rgba(240,180,41,.08);
  --r:16px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);--safe-r:env(safe-area-inset-right,0px);
}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,sans-serif;-webkit-text-size-adjust:100%;scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{padding-top:calc(60px + var(--safe-t));padding-bottom:calc(72px + var(--safe-b));min-height:100dvh;overflow-x:hidden}
a{color:var(--accent2);text-decoration:none}
a:active{opacity:.7}

/* ===== HEADER ===== */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(10,10,15,.85);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);padding:var(--safe-t) 0 0;border-bottom:1px solid var(--border)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px}
.hdr-title{font-size:19px;font-weight:800;letter-spacing:-.3px;background:linear-gradient(135deg,var(--accent) 0%,#fdd835 50%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-sub{font-size:11px;color:var(--dim);font-weight:500;letter-spacing:.2px;margin-top:1px}
.hdr-flag{font-size:28px;line-height:1}

/* ===== TAB BAR ===== */
.tbar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,15,.9);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--border);padding:0 var(--safe-l) var(--safe-b) var(--safe-r)}
.tbar-in{display:flex;justify-content:space-around;padding:6px 0 2px}
.tb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--dim);font-size:10px;font-weight:600;cursor:pointer;padding:6px 16px;-webkit-tap-highlight-color:transparent;transition:color .2s;letter-spacing:.2px;position:relative}
.tb.on{color:var(--accent)}
.tb svg{width:24px;height:24px;transition:transform .2s}
.tb.on svg{transform:scale(1.1)}
.tb-badge{position:absolute;top:0;right:8px;background:var(--food);color:#fff;font-size:8px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 4px}

/* ===== VIEWS ===== */
.vw{display:none;padding:0 16px 24px}
.vw.on{display:block}

/* ===== HERO BANNER ===== */
.hero{position:relative;margin:-0 -16px 20px;height:240px;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,15,.3) 50%,rgba(10,10,15,.1) 100%)}
.hero-text{position:absolute;bottom:20px;left:20px;right:20px}
.hero-text h2{font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1.15}
.hero-text p{font-size:14px;color:var(--text2);margin-top:6px;line-height:1.4}
.hero-countdown{font-size:48px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.hero-countdown-label{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* ===== STAT PILLS ===== */
.stats{display:flex;gap:8px;overflow-x:auto;padding:0 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:8px}
.stats::-webkit-scrollbar{display:none}
.stat{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;min-width:90px;text-align:center}
.stat-num{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ===== ROUTE VISUALIZATION ===== */
.route-strip{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.route-cities{display:flex;align-items:center;gap:0;min-width:max-content}
.route-city{text-align:center;flex-shrink:0}
.route-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);margin:0 auto 4px}
.route-dot.active{box-shadow:0 0 0 3px rgba(240,180,41,.3)}
.route-name{font-size:11px;font-weight:600;white-space:nowrap}
.route-nights{font-size:9px;color:var(--dim);margin-top:1px}
.route-line{width:32px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));flex-shrink:0;margin:0 0 16px}

/* ===== DAY CARDS ===== */
.day{background:var(--card);border-radius:var(--r);margin-bottom:16px;overflow:hidden;border:1px solid var(--border);transition:border-color .3s}
.day.today{border-color:var(--accent);box-shadow:0 0 0 1px rgba(240,180,41,.2),0 8px 32px rgba(240,180,41,.08)}
.day-hero{position:relative;height:160px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent}
.day-hero img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.day.open .day-hero img{transform:scale(1.05)}
.day-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(23,23,37,.95) 0%,rgba(23,23,37,.3) 60%,transparent 100%)}
.day-hero-top{position:absolute;top:12px;left:14px;display:flex;gap:6px}
.day-hero-text{position:absolute;bottom:12px;left:14px;right:50px}
.day-num-pill{font-size:10px;font-weight:700;background:rgba(240,180,41,.9);color:#0a0a0f;padding:3px 10px;border-radius:20px;letter-spacing:.5px}
.day-today-pill{font-size:10px;font-weight:700;background:rgba(79,195,247,.9);color:#0a0a0f;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.day-h-title{font-size:17px;font-weight:700;line-height:1.2}
.day-h-sub{font-size:12px;color:var(--text2);margin-top:3px}
.day-h-tags{display:flex;gap:4px;margin-top:6px}
.day-chev{position:absolute;bottom:14px;right:14px;width:28px;height:28px;background:rgba(255,255,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .3s}
.day.open .day-chev{transform:rotate(180deg)}
.day-chev svg{width:14px;height:14px;fill:var(--text)}

/* Day Body */
.day-body{display:none;padding:4px 16px 20px}
.day.open .day-body{display:block}

/* Tags */
.tg{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.tg-food{background:rgba(255,107,74,.15);color:var(--food)}
.tg-sight{background:rgba(79,195,247,.15);color:var(--sight)}
.tg-transit{background:rgba(171,71,188,.15);color:var(--transit)}
.tg-rest{background:rgba(76,175,139,.15);color:var(--rest)}
.tg-book{background:rgba(240,180,41,.15);color:var(--book)}

/* ===== ACTIVITIES ===== */
.act{position:relative;padding:14px 0 14px 20px;margin:0}
.act+.act{border-top:1px solid var(--border)}
.act::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px}
.act.food::before{background:var(--food)}.act.sight::before{background:var(--sight)}
.act.transit::before{background:var(--transit)}.act.rest::before{background:var(--rest)}
.act.book::before{background:var(--book)}
.act-time{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.3px;font-variant-numeric:tabular-nums}
.act-name{font-size:15px;font-weight:700;margin-top:3px;line-height:1.3}
.act-chinese{font-size:13px;color:var(--dim);margin-top:1px}
.act-detail{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.55}
.act-detail strong{color:var(--text);font-weight:600}
.act-detail em{color:var(--accent2);font-style:normal;font-weight:600}
.act-expand{display:none}
.act.expanded .act-expand{display:block}
.act-toggle{font-size:12px;color:var(--accent2);font-weight:600;cursor:pointer;margin-top:6px;display:inline-block;-webkit-tap-highlight-color:transparent}
.act-toggle:active{opacity:.6}

/* Photo strip within activity */
.act-photo{width:100%;height:120px;border-radius:10px;overflow:hidden;margin-top:10px}
.act-photo img{width:100%;height:100%;object-fit:cover;display:block}

/* Map embed */
.act-map{margin-top:10px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.act-map img{width:100%;height:140px;object-fit:cover;display:block}
.act-map-link{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:var(--surface);font-size:12px;font-weight:600;color:var(--accent2)}
.act-map-link svg{width:14px;height:14px;fill:currentColor}

/* Meta row */
.act-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.meta{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:3px}
.meta svg{width:11px;height:11px;fill:currentColor;flex-shrink:0}

/* ===== TRANSIT CARD ===== */
.tr-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin:12px 0}
.tr-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--transit);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tr-label svg{width:12px;height:12px;fill:currentColor}
.tr-steps{font-size:13px;line-height:1.6;color:var(--text2)}
.tr-steps strong{color:var(--text)}
.tr-stats{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.tr-stat{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:4px}
.tr-stat svg{width:12px;height:12px;fill:currentColor}

/* ===== DREAM MOMENT ===== */
.dream{position:relative;border-radius:12px;padding:16px;margin:12px 0;overflow:hidden;background:linear-gradient(135deg,rgba(240,180,41,.08),rgba(79,195,247,.08));border:1px solid rgba(240,180,41,.2)}
.dream::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(240,180,41,.15),transparent);border-radius:50%}
.dream-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);font-weight:700;margin-bottom:4px}
.dream-text{font-size:14px;font-style:italic;line-height:1.5;color:var(--text);position:relative}

/* ===== LUGGAGE ===== */
.luggage{background:rgba(171,71,188,.06);border:1px solid rgba(171,71,188,.2);border-radius:12px;padding:12px 14px;margin:8px 0;font-size:12px;color:var(--text2);line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.luggage svg{width:16px;height:16px;fill:var(--transit);flex-shrink:0;margin-top:1px}
.luggage strong{color:var(--text)}

/* ===== WARNING ===== */
.warn{background:rgba(255,107,74,.06);border:1px solid rgba(255,107,74,.2);border-radius:12px;padding:12px 14px;margin:8px 0;font-size:12px;color:var(--food);line-height:1.5}

/* ===== ACTION ITEMS ===== */
.ag{margin-bottom:28px}
.ag-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:10px 0 8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ag-count{font-size:11px;color:var(--dim);font-weight:400}
.ai{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start;-webkit-tap-highlight-color:transparent}
.ai:last-child{border:none}
.ai-chk{width:24px;height:24px;border:2px solid var(--border);border-radius:7px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.ai-chk.done{background:var(--rest);border-color:var(--rest)}
.ai-chk.done::after{content:'\\2713';color:#fff;font-size:14px;font-weight:700}
.ai.done .ai-text{opacity:.4}
.ai.done .ai-name{text-decoration:line-through}
.ai-text{flex:1;min-width:0}
.ai-name{font-size:14px;font-weight:600;line-height:1.3}
.ai-desc{font-size:12px;color:var(--dim);margin-top:4px;line-height:1.5}
.ai-foot{display:flex;gap:8px;align-items:center;margin-top:5px;flex-wrap:wrap}
.ai-pri{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:6px;letter-spacing:.3px}
.ai-pri.must{background:rgba(255,107,74,.15);color:var(--food)}
.ai-pri.should{background:rgba(240,180,41,.15);color:var(--accent)}
.ai-pri.nice{background:rgba(76,175,139,.15);color:var(--rest)}
.ai-dead{font-size:11px;color:var(--dim)}

/* ===== INFO ===== */
.info-s{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:16px;border:1px solid var(--border)}
.info-s h3{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:14px;text-transform:uppercase;letter-spacing:.6px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px}
.info-row:last-child{border:none}
.info-row .l{color:var(--dim);flex-shrink:0}
.info-row .v{font-weight:600;text-align:right;word-break:break-word}
.phrase{padding:10px 0;border-bottom:1px solid var(--border)}
.phrase:last-child{border:none}
.phrase-zh{font-size:18px;font-weight:600}
.phrase-py{font-size:12px;color:var(--accent2);margin-top:2px}
.phrase-en{font-size:12px;color:var(--dim);margin-top:1px}
.reminder-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5;color:var(--text2);display:flex;gap:8px;align-items:flex-start}
.reminder-item:last-child{border:none}
.reminder-item::before{content:'!';flex-shrink:0;width:18px;height:18px;background:rgba(240,180,41,.15);color:var(--accent);font-size:10px;font-weight:800;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:2px}
.ref-input{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:13px;width:100%;margin-top:6px;font-family:inherit;transition:border-color .2s}
.ref-input:focus{outline:none;border-color:var(--accent2)}
.ref-label{font-size:11px;color:var(--dim);margin-top:14px;font-weight:600}
.pts-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.pts-row:last-child{border:none}
.pts-val{font-weight:700;color:var(--accent2);font-variant-numeric:tabular-nums}
.budget-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.budget-row:last-child{border:none}
.budget-total{font-weight:700;font-size:14px;color:var(--accent);border-top:2px solid var(--border);margin-top:4px;padding-top:12px}

/* ===== PROGRESS BAR ===== */
.progress{height:3px;background:var(--border);border-radius:2px;margin:8px 0 16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .5s}

/* ===== RESPONSIVE ===== */
@media(min-width:600px){.vw{max-width:560px;margin:0 auto}}
@media(prefers-color-scheme:light){:root{--bg:#f5f5f8;--surface:#eeeef2;--card:#fff;--card-hover:#f8f8fc;--text:#1a1a2e;--text2:#555;--dim:#888;--border:rgba(0,0,0,.08)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr"><div class="hdr-in">
<div><div class="hdr-title">Taiwan 2026</div><div class="hdr-sub">Apr 18 – 27 &bull; Matt & Tingting</div></div>
<div class="hdr-flag">&#127481;&#127484;</div>
</div></div>

<!-- VIEWS -->
<div id="v-today" class="vw on"></div>
<div id="v-trip" class="vw"></div>
<div id="v-act" class="vw"></div>
<div id="v-info" class="vw"></div>

<!-- TAB BAR -->
<div class="tbar"><div class="tbar-in">
<button class="tb on" data-v="today" onclick="go('today')">
<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
Today</button>
<button class="tb" data-v="trip" onclick="go('trip')">
<svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
Full Trip</button>
<button class="tb" data-v="act" onclick="go('act')">
<svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
<span class="tb-badge" id="act-badge"></span>
Actions</button>
<button class="tb" data-v="info" onclick="go('info')">
<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
Info</button>
</div></div>

<script>
// ===== SVG ICONS =====
const ICONS = {
  pin:'<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>',
  clock:'<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm4.2 14.2L11 13V7h1.5v5.2l4.5 2.7-.8 1.3z"/></svg>',
  money:'<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>',

// ===== MAP HELPERS =====
function mapUrl(from,to){return 'https://www.google.com/maps/dir/'+encodeURIComponent(from)+'/'+encodeURIComponent(to)}
function mapStaticUrl(lat,lng,zoom){return 'https://maps.googleapis.com/maps/api/staticmap?center='+lat+','+lng+'&zoom='+zoom+'&size=600x200&scale=2&maptype=roadmap&style=feature:all|element:geometry|color:0x242f3e&style=feature:all|element:labels.text.fill|color:0x746855&style=feature:all|element:labels.text.stroke|color:0x242f3e&style=feature:road|element:geometry|color:0x38414e&style=feature:water|element:geometry|color:0x17263c'}
function mapLink(from,to,label){
  const url=mapUrl(from,to);
  return '<div class="act-map"><a href="'+url+'" target="_blank" rel="noopener" class="act-map-link">'+ICONS.nav+' Open directions in Google Maps: '+label+'</a></div>';
}
function simpleMapLink(url,label){
  return '<a href="'+url+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;color:var(--accent2);font-size:12px;font-weight:600;margin-top:4px">'+ICONS.nav+' '+label+'</a>';
}

// ===== RENDER ENGINE =====

function go(v){
  document.querySelectorAll('.vw').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(el=>el.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  document.querySelector('.tb[data-v="'+v+'"]').classList.add('on');
  window.scrollTo({top:0,behavior:'instant'});
}

function toggleD(el){el.closest('.day').classList.toggle('open')}

function fmtDate(s){const d=new Date(s+'T12:00:00+08:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function isToday(s){const n=new Date();const t=new Date(n.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));const ts=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');return ts===s}
function todayIdx(){for(let i=0;i<DAYS.length;i++)if(isToday(DAYS[i].date))return i;const n=new Date(),t=new Date(n.toLocaleString('en-US',{timeZone:'Asia/Taipei'})),ts=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');if(ts<DAYS[0].date)return -1;return DAYS.length}
function daysUntil(){const n=new Date(),t=new Date(n.toLocaleString('en-US',{timeZone:'Asia/Taipei'})),s=new Date(DAYS[0].date+'T00:00:00+08:00');return Math.ceil((s-t)/864e5)}

// Render activity
function rAct(a){
  let h='<div class="act '+a.type+'">';
  h+='<div class="act-time">'+a.t+'</div>';
  h+='<div class="act-name">'+a.name+'</div>';
  if(a.zh)h+='<div class="act-chinese">'+a.zh+'</div>';
  if(a.detail)h+='<div class="act-detail">'+a.detail+'</div>';
  if(a.dream)h+='<div class="dream"><div class="dream-label">\u2728 Dream Moment</div><div class="dream-text">'+a.dream+'</div></div>';
  if(a.book)h+='<div style="margin-top:6px"><span class="tg tg-book">Advance Booking Required</span></div>';
  if(a.photo)h+='<div class="act-photo"><img src="'+a.photo+'" alt="" loading="lazy"></div>';
  // Map links
  if(a.mapPlace)h+='<div style="margin-top:8px">'+simpleMapLink(a.mapPlace,'View on Google Maps')+'</div>';
  if(a.mapFrom&&a.mapTo)h+=mapLink(a.mapFrom,a.mapTo,a.mapFrom+' \u2192 '+a.mapTo);
  h+='</div>';
  return h;
}

// Render day card
function rDay(d,open){
  const today=isToday(d.date);
  let h='<div class="day'+(open?' open':'')+(today?' today':'')+'" id="day-'+d.day+'">';
  // Hero image
  h+='<div class="day-hero" onclick="toggleD(this)">';
  h+='<img src="'+d.photo+'" alt="'+d.title+'" loading="lazy">';
  h+='<div class="day-hero-grad"></div>';
  h+='<div class="day-hero-top"><span class="day-num-pill">Day '+d.day+'</span>';
  if(today)h+='<span class="day-today-pill">Today</span>';
  h+='</div>';
  h+='<div class="day-hero-text">';
  h+='<div class="day-h-title">'+d.title+'</div>';
  h+='<div class="day-h-sub">'+d.dow+', '+fmtDate(d.date)+' &bull; '+d.city+'</div>';
  h+='<div class="day-h-tags">'+d.tags.map(t=>'<span class="tg tg-'+t+'">'+t+'</span>').join('')+'</div>';
  h+='</div>';
  h+='<div class="day-chev"><svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></div>';
  h+='</div>';
  // Body
  h+='<div class="day-body">';
  if(d.luggage)h+='<div class="luggage">'+ICONS.luggage+'<div><strong>Luggage Plan:</strong> '+d.luggage+'</div></div>';
  d.acts.forEach(a=>{h+=rAct(a)});
  h+='</div></div>';
  return h;
}

// ===== TODAY VIEW =====
function renderToday(){
  const el=document.getElementById('v-today');
  const idx=todayIdx();
  const du=daysUntil();
  let h='';

  // Hero
  h+='<div class="hero"><img src="'+PHOTOS.hero+'" alt="Taiwan"><div class="hero-overlay"></div><div class="hero-text">';
  if(du>0){
    h+='<div class="hero-countdown">'+du+'</div>';
    h+='<div class="hero-countdown-label">days until Taiwan</div>';
  }else if(idx>=0&&idx<DAYS.length){
    h+='<h2>Day '+(idx+1)+' \u2014 '+DAYS[idx].title+'</h2>';
    h+='<p>'+DAYS[idx].sub+'</p>';
  }else{
    h+='<h2>Trip Complete!</h2>';
    h+='<p>What an adventure \u2764\ufe0f</p>';
  }
  h+='</div></div>';

  // Stats
  h+='<div class="stats">';
  h+='<div class="stat"><div class="stat-num">9</div><div class="stat-label">Days</div></div>';
  h+='<div class="stat"><div class="stat-num">3</div><div class="stat-label">Regions</div></div>';
  h+='<div class="stat"><div class="stat-num">4</div><div class="stat-label">Night Mkts</div></div>';
  h+='<div class="stat"><div class="stat-num">251k</div><div class="stat-label">Points</div></div>';
  h+='<div class="stat"><div class="stat-num">BIZ</div><div class="stat-label">Class</div></div>';
  h+='</div>';

  // Route strip
  h+='<div class="route-strip"><div class="route-cities">';
  const cities=[{n:'Seattle',nights:''},{n:'Taipei',nights:'4 nights'},{n:'Tainan',nights:'2 nights'},{n:'Alishan',nights:'1 night'},{n:'Taipei',nights:'1 night'},{n:'Seattle',nights:''}];
  cities.forEach((c,i)=>{
    if(i>0)h+='<div class="route-line"></div>';
    h+='<div class="route-city"><div class="route-dot"></div><div class="route-name">'+c.n+'</div>';
    if(c.nights)h+='<div class="route-nights">'+c.nights+'</div>';
    h+='</div>';
  });
  h+='</div></div>';

  // Show relevant day
  if(idx>=0&&idx<DAYS.length){
    h+=rDay(DAYS[idx],true);
  }else if(du>0){
    // Before trip: show first day preview
    h+=rDay(DAYS[0],false);
  }

  // Action items preview
  const checks=lc();
  let rem=0;
  ACTS_DATA.forEach(g=>g.items.forEach(i=>{if(!checks[i.id])rem++}));
  if(rem>0){
    h+='<div style="margin-top:4px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
    h+='<div style="font-size:15px;font-weight:700">Action Items</div>';
    h+='<div style="font-size:12px;color:var(--dim)">'+rem+' remaining</div></div>';
    const urgent=[];
    ACTS_DATA.forEach(g=>g.items.forEach(i=>{if(!checks[i.id])urgent.push(i)}));
    urgent.slice(0,4).forEach(item=>{h+=rAI(item,checks)});
    h+='<div style="text-align:center;padding:10px 0 0"><a href="#" onclick="go(\'act\');return false" style="font-weight:600;font-size:13px">View all '+rem+' items \u2192</a></div>';
    h+='</div>';
  }

  el.innerHTML=h;
}

// ===== TRIP VIEW =====
function renderTrip(){
  const el=document.getElementById('v-trip');
  let h='';
  h+='<div style="text-align:center;padding:8px 0 16px"><div style="font-size:22px;font-weight:800;letter-spacing:-.3px">The Full Itinerary</div><div style="font-size:13px;color:var(--dim);margin-top:4px">Seattle \u2192 Taipei \u2192 Tainan \u2192 Alishan \u2192 Taipei \u2192 Seattle</div></div>';

  // Route
  h+='<div class="route-strip"><div class="route-cities">';
  [{n:'SEA',nights:''},{n:'Taipei',nights:'4n'},{n:'Tainan',nights:'2n'},{n:'Alishan',nights:'1n'},{n:'Taipei',nights:'1n'},{n:'SEA',nights:''}].forEach((c,i)=>{
    if(i>0)h+='<div class="route-line"></div>';
    h+='<div class="route-city"><div class="route-dot"></div><div class="route-name">'+c.n+'</div>';
    if(c.nights)h+='<div class="route-nights">'+c.nights+'</div>';
    h+='</div>';
  });
  h+='</div></div>';

  DAYS.forEach(d=>{h+=rDay(d,false)});
  el.innerHTML=h;

  // Scroll to today if applicable
  const idx=todayIdx();
  if(idx>=0&&idx<DAYS.length){
    setTimeout(()=>{const e=document.getElementById('day-'+(idx+1));if(e)e.scrollIntoView({behavior:'smooth',block:'center'})},400);
  }
}

// ===== ACTIONS =====
function lc(){try{return JSON.parse(localStorage.getItem('tw_chk')||'{}')}catch(e){return{}}}
function sc(c){localStorage.setItem('tw_chk',JSON.stringify(c))}
function tc(id){const c=lc();c[id]=!c[id];sc(c);renderAct();renderToday();badge()}

function rAI(item,checks){
  const done=checks[item.id];
  let h='<div class="ai'+(done?' done':'')+'">';
  h+='<div class="ai-chk'+(done?' done':'')+'" onclick="tc(\''+item.id+'\')"></div>';
  h+='<div class="ai-text">';
  h+='<div class="ai-name">'+item.n+'</div>';
  h+='<div class="ai-desc">'+item.d+'</div>';
  h+='<div class="ai-foot"><span class="ai-pri '+item.pr+'">'+item.pr+'</span><span class="ai-dead">'+item.dl+'</span></div>';
  h+='</div></div>';
  return h;
}

function renderAct(){
  const el=document.getElementById('v-act');
  const checks=lc();
  let total=0,done=0;
  ACTS_DATA.forEach(g=>g.items.forEach(i=>{total++;if(checks[i.id])done++}));

  let h='<div style="text-align:center;padding:8px 0 4px"><div style="font-size:22px;font-weight:800">Action Items</div><div style="font-size:13px;color:var(--dim);margin-top:4px">'+done+' of '+total+' completed</div></div>';
  h+='<div class="progress"><div class="progress-fill" style="width:'+Math.round(done/total*100)+'%"></div></div>';

  ACTS_DATA.forEach(g=>{
    const gd=g.items.filter(i=>checks[i.id]).length;
    h+='<div class="ag"><div class="ag-title" style="color:'+g.color+'">'+g.group+' <span class="ag-count">'+gd+'/'+g.items.length+'</span></div>';
    g.items.forEach(item=>{h+=rAI(item,checks)});
    h+='</div>';
  });
  el.innerHTML=h;
}

function badge(){
  const checks=lc();let r=0;
  ACTS_DATA.forEach(g=>g.items.forEach(i=>{if(!checks[i.id])r++}));
  const b=document.getElementById('act-badge');
  if(r>0){b.textContent=r;b.style.display='flex'}else{b.style.display='none'}
}
